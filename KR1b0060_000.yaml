body:
  text: 書義矜式書類附録提要臣等謹案書義矜式六卷元王充耘撰充耘字與耕吉水人元統甲戌進士授永州同知所著四書經疑貫通已别著録充耘精于科舉之業又以書經登第其用功甚深此乃所作經義程式也自宋王安石變法始以經義取士當時如張才叔自靖人自獻于先王義學者稱為不可磨滅之文吕祖謙至為録入文鑑中元仁宗皇慶初復行科舉仍用經義一篇而其體式視宋為小變綜其格律有破題接題小講謂之冒子冒子後入官題官題下有原題有大講有餘意亦曰從講又有原經亦曰考經有結尾承襲既久作者以冗長繁複為可厭或稍稍變通之而大要有冒題原題講題結題則一定不可易充耘即所業之經篇摘數題各為程文以示標準雖于經㫖無所發明而一時場屋之體稱為最工存之亦可以見風尚所在且元代功令于書已用蔡𫝊而慎徽五典一篇乃引孔𫝊大録之文以相㕘考足知當時學者猶知旁覽注疏固不至如明季舉業家墨守講章於古書全未寓目也乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9d654c0bd9f939aedaa25b34012a7316ef15434550f8587d97f627af4b8e880f
