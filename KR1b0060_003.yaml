body:
  text: 書義矜式卷三商書元王充耘撰湯誓仲虺之誥惟王不邇聲色不殖貸利德懋懋官功懋懋賞用人惟己改過不吝聖人惟能絶夫私欲之纍故能公於人已之間蓋人主一心不能兩用欲於善則不欲於利故不為聲色貨利之所趍則其用人處己必無往而不當矣夫聲色人之所易狎者也而湯則不之邇焉貨利人之所同欲者也而湯則不之殖焉其能絶夫私欲之纍也審矣是以人之懋於德者則懋之以官人之懋於功者則懋之以賞用人惟己而人之有善無不容而已之不善無不改其能盡夫用人處己之道者皆由其絶夫聲色貨利之私者為之也宜乎仲虺以是贊之云云嘗謂人君尊為天子撫御萬邦德之當命功之當報善之當容不善之當改萃四事於一身必無一不盡其道而後可也然而宮庭之私眤易以惑其心內帑之玉帛易以移其志於是知有聚斂之事而不知功德之當報知縱耳目之欲而不知大德之為纍者多矣有能以理而勝私以道而制欲使其本源澄徹君德昭然則其不求偹於人不吝過於己而用人處己各盡其道也宜矣是故掌於樂師者皆聲也而戀情於此則不敢列於嬪御者皆色也而溺色於此則不暇天下之貨思與天下共之初不豐殖以為一己之資天下之利當與天下共之初不聚斂以為一己之致湯之抑私心也如此夫私心既去則公心日明是以賢者修德而我官之能者修業而我賞之三德而為大夫六德而為諸侯非私爵之也因其懋於德而懋之以官而車服以旌其功土田以錫其國亦非私與之也因其懋於功而懋之以賞所謂公於用人者如此然則好人之善如自己出而無一之不容己之不善無所係吝而無一之不改不忌人之能不吝己之過謂之公以處己者如此嗟夫成湯商之令主也其德大矣不邇不殖豈足以盡湯之德哉然此本源之地非能純乎天德而無一毫人欲之私者不能也云云佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌人君惟能遏惡而揚善斯有以致國家之盛強夫善善惡惡乃致治之先務也茍善善而不能用惡惡而不能去而欲致國家之盛治也難矣是以仲虺之勉成湯以為諸侯之賢德者則佑之輔之忠良者則顯之遂之所以善其善而揚之也諸侯之弱昧者兼之攻之亂亡者取之侮之所以惡其惡而遏之也惡者必亡從而推之善而能存從而固之如此萬邦之廣亦日進於盛強自有不期而然者矣天降甘露地出醴泉此國家極盛之符也然果何道以致之庶政修明百效振舉此國家隆平之徴也然果何修而臻此吾求諸古而一言以蔽之曰遏惡揚善而已蓋善者治之資其不善者治之蠧也進一善類已足以易否而為泰况忠良賢德凡有善者無不容一小人去已足以轉危而為安况弱昧亂亡凡不善者無不去如是必君子道長小人道消而治隆於上俗美於下國之興也勃然莫之能禦矣茍惟不善君子在野小人在位以是求治是猶却步而求前吾未見其可也宜仲虺之所以拳拳欲令列爵分土樹屏建侯固求以共成治功而已然人之賢否有不能齊而治之隆替每由於此有所謂賢德者矣又有所謂弱昧者焉有所謂忠良者矣又有所謂亂亡者焉賢德者踐履之精純忠良者職業之修舉四者善而能存者也佑輔顯遂所以固其存弱而不能自立昧而不能自眀亂而不能治亡而不能存四者惡而必亡者也兼攻取侮所以推其亡因其存而固之則尊賢尚功之政行而為善者知所勸因其亡而推之則誅亂禁暴之政舉而為惡者知所懲衆賢和朝萬邦作乂政治以之而修明紀綱由之而振舉國家之運可以有盛而無衰有隆而無替雖磐石不足以踰其固而泰山不足以踰其安謂之邦乃其昌信矣雖然善惡不難於懲勸而君心每纍於私情茍能公以察之則是非不謬而足以當人心茍出於私則賢否易位而其害有不可勝言者矣其何以保其國乎仲虺作誥以釋湯之慚而必拳拳於此者政以保邦之道不出乎此而已也不然殖有禮覆昏暴欽崇乎天道而永保乎天命何以於萹終復致意焉後之人君亦鑑於此而已矣王懋昭大德建中于民以義制事以禮制心垂裕後昆人君必勉於修已以率人其律己也嚴故垂法也逺矣夫人君所以為法於天下而可傳於後世者豈有他哉亦嚴於自治而已矣仲虺之告成湯所以特稱王而告之以起其聽也以為人君一身天下之所取則也故當勉明大德以立中道於天下然其要果何在哉以義制事使事得其宜以禮制心使心得其正內外合德而中道立矣中道既立則豈特為法於天下而已哉傳諸後世亦綽乎其有餘裕矣然則禮也義也即所謂德也而昭德乃所以建中也天下後世之所取法其不在於此歟云云嘗謂德者人之所同得也自其不偏不倚無過不及者而言則謂之中自其存心處事而各得其當者而言則謂之禮義他人之同有此德而拘於氣稟蔽於物欲始有冥然不知中道之所在者所貴乎人君者以一身為天下之凖使天下後世皆得以取法焉然亦無俟乎他求也易曰敬以直內義以方外敬義立而德不孤敬義夾持德不孤立而中道立於此矣舍此不務則己身不正固無以為正人之本者世之人且貿貿焉莫知所之又何以為後世子孫之法哉觀仲虺之意豈不曰人君一身中天下而立定四海之民民心罔中惟爾之中中道不可一日而不建也日新厥德斯可表正萬邦也懋敬厥德斯可以式於九圍也欲建中于民而不懋昭大德不可也然德之所以昭中之所以建又豈無其要哉見於事而為無過不及中之用也事以義制而動必適其宜焉則無一事之不中矣根於心而為不偏不倚中之體也心以禮制而非禮勿動焉則無一念之不中矣夫如是則豈特當世之民視效而無違在我後嗣子孫固可以遵守而勿失也豈特為生民立極而已哉固可以為萬世開太平也傳之無窮施之罔極豈不綽然有餘裕哉是知建中于民則聖人能以其行諸一身者逹諸天下垂裕後昆則聖人又以其行乎當世者垂法萬世中道不可一日而不建則君德其可一日而不明哉明明我祖萬邦之君有典有則貽厥子孫禹之所以為天下後世慮也至矣奈之何子孫弗率而陷民於塗炭焉則表正萬邦而纘禹舊服湯固不得以辭其責矣况湯為創業之主自治不力後嗣何觀是尤不可不加之意也湯能昭德以建中于民則可以無愧於禹無愧於禹則可以無愧於堯舜無愧於堯舜則可以無愧於天下後世矣何慚德之有哉此仲虺作誥所以不徒慰釋其慚而重有以為之勸也厥後武王下車訪道箕子而箕子拳拳於皇建其有極之言者其亦仲虺之心歟湯之建中武之建極先聖後聖其揆一也湯誥伊訓居上克明為下克忠臨下固貴於不惑事上尤貴於不欺惟聖人能盡其道也在昔伊尹稱湯以訓太甲言湯之為君而在上則能明以照下而無所惑為臣而在下則能忠以事上而無所欺居上克明而為下又克忠非聖人莫之能也云云居上為下各有其道而惟聖人為能盡之者豈有他哉亦循乎理之自然而各盡其職分之所當然耳故居上而臨下所貴者明也不明則有障蔽之患而失其君人之道矣為下以事上所貴者忠也不忠則必有欺謾之失而失其為臣之職矣然常人之情居尊位則必以逸欲蔽其明能聽覽不惑者鮮矣處下位則必以患得患失隳其忠其能純篤不二者寡矣此其所以為常人也惟聖人則不然深居九重而邪佞不能欺高拱南面而姦偽不能惑辨是非於萬里之外察事機於秋毫之末其居上如此不謂之克明可乎衣其衣則必憂其憂食其食則必事其事守職位則不二其心臨事變則不易所守其為下如此不謂之克忠可乎嗟乎聖人道全而德偹果安往而不盡善也哉自其臨下而謂之明明固此德也自其事上則謂之忠忠亦此德也居上為下本無二道克明克忠亦豈有二致哉伊尹於此特析而稱之所以見其道之全而德之傋也吾求之古而有得於舜之稱禹焉既曰克勤于邦矣又曰克儉于家夫在邦而能勤必居家能儉者也而稱之者必對舉而並言之所以見其賢之不可及也知舜之稱禹則知伊尹之稱湯矣且湯之德豈特見之居上為下而已哉與人不求備檢身若不及其處人己之間又如此是以其德盛業廣而天命歸之人心戴之自七十里而至於萬邦焉湯之所以得天命者如此太甲而嗣湯之天下可不思所以繼湯之德也歟伊尹所以拳拳以是告之也厥後太甲修厥身允德協于下惟明明后殆無忝於乃祖矣太甲其賢矣哉太甲上先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅理之存於心目者無或忘故誠之交於神明者無或間蓋誠心之所存即天理之所發見也使吾心之理有一息之昏蔽而欲吾心之敬隨所寓而形著難矣哉若昔成湯於理之命於天者常目在之而唯恐失墜其存是理而不忘者如此故以之承上下神祗者此祇肅之心以之任社禝宗廟者亦此祗肅之心其達是敬而無間又如此然則祗肅之至乃所以見其顧諟之深惟知顧諟而不忘所以能祇肅而無怠也斯其內外之相符也歟天之明命乃有生之同德而惟聖人能明而不昧故以之交於神明亦惟聖人為能敬而無失聖人豈有異於人哉心之所存皆純亦不已之天故身之所處皆緝熙敬止之地不見其有間也茍此心之天一為人欲所蔽而不能加提撕警省之功則出而主祭雖欲勉強修飾以造於整齊嚴肅之地其能常久而不變者鮮也聖人豈其然乎天之生物也賦之氣以成形必命之理以為性凡其日用動靜之間顯然而不可欺昭然而不可掩者孰非天之所命也常人莫不有是理而鮮能全之惟聖人也知付畀之為重則存飬之功不可以不加知利欲之易昏則省察之功不可以或替造次必於是顛沛必於是而天之所以與我者無頃刻之或忘故能見其參於前倚於衡而我之所以得於天者無須臾之或離此作聖之本原而主敬之極功也推此心以交於神明其有厭怠而不敬者乎吾見其潔齊豐盛而凜乎其臨之在上質之在旁也其在神祗者如此吾見其苾芬孝祀而竦然於神之格思不可度思也其在社禝宗廟又如此聖人於此豈勉強而為之哉蓋知天命無往而不存故罔不祗肅以祗肅之誠而為顧諟之實聖人之所以異於人者如此豈外為莊栗而實則怠慢暫焉收斂而久則怠荒者之比哉詩人之稱成湯曰聖敬日躋曰上帝是袛則其顧諟之誠祗肅之實可想而見矣此所以天監厥德使之集大命而撫安萬方也歟太甲既立而不明于德其視湯之顧諟明命為何如以欲敗度縱敗禮其視湯之罔不祇肅為何如伊尹以是告之固欲其率乃祖攸行亦所以藥其病而救其失也此太甲所以克終允德也歟慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行大臣告君以自治之方既以物理之不可妄發者為喻復以君身之不可妄動者為戒蓋射之與治事雖殊而理則一所以善於告君者既曲喻之於先復正戒之於後也昔者伊尹之告太甲以為必當謹其儉約之德惟懷永久之謀人君自治孰有先於此者乎其所以戒之者至矣然恐其泛然視之而君莫我聽也故又即物理以喻之以為譬若虞人之弩機既張而必往察其括之合夫法度然後發其不敢妄發也如此則人君之為治其可有一毫之妄動乎敬一心之所止率乃祖之所行如是而後可也誠知君身之不可妄動則所以謹其身而逺其謀者不難矣孔子曰以約失之者鮮矣是持身不可以不謹也又曰人無逺慮必有近憂是為謀不可以不長也况乎人君一身關四海之盛衰係生民之休戚於是而不加謹焉則輕舉妄動所以觖天下之望者多矣大臣告君宜無出此然君非生知之知茍不旁引曲喻使理之可明白昭晰於其前豈能必其坦然由之而無疑哉故即射以觀之而為治之理可見矣夫虞人之射其藝甚微其得失甚薄然猶臨事知戒未嘗廢法而妄動則人主之持身豈射者之不若乎其不可妄動也明矣夫事事物物莫不各有當止之地設施措注前王又有一定之法不此之守而欲慎其德而逺其謀吾未見其可也伊尹之告太甲其不曰驕奢縱侈非所以為德也必敬以持已而無一事之敢輕茍且自便又非所以為謀也必言而思其所終行而思其所弊而無一事之敢忽如是而後可也以是告君可謂切而要矣然猶以為晰理之不明則聽信之不篤故復即虞人之射以為喻焉夫虞者山澤之官以射獵為職者也射之為技有機有括機所以發其往括所以求其度機不戒而妄發則其發也必非所遇矢不省而遽釋則其遇也必非所中故必目存乎括心省乎度使心手相應而有以合乎度之中如是而後釋焉其不中者鮮矣射之微技志於得獸而所以慎者尚如此况握四海九州之權者哉是故動靜云為而吾心有本然之度也必肅恭收斂而求止其所當止紀綱法度先王有已然之法也必持循據守而行其所當行止所當止所以立本也行所當行所以致用也體用兼全本末具舉吾見其是為無動動而不合於法度者寡矣是則射之與治又豈有二理哉伊尹以為太甲告者誠以太甲所以欲敗度縱敗禮此蓋以奢侈失之而無長逺之慮者也故首以慎乃儉德惟懷永圖者言之喻言以曉之者欲其聽之審也正言以戒之者欲其行之篤也伊尹之心豈不以成湯所行無非大中至正之理可以為萬世凖的正猶機括之有法度也使太甲能以一心為機括以乃祖所行者為法度則其所以謹儉德而懷永圖者至矣吁太甲中先王子惠困窮民服厥命罔有不悅聖人有子民之實德故足以得天下之歡心蓋愛人者人恆愛之理之必然者也而况愛之有誠者乎宜其心悅而誠服也昔者成湯愛民如子而無間於困窮故民服其命而至於罔有不悅一感一應猶影響然是豈有他哉亦以其愛之心出於誠而已矣世率謂君尊也而民卑君貴也而民賤以尊臨卑以貴蒞賤於是視之猶草芥而惟恐芟夷之不加疾之如寇讎而惟恐斬刈之不力上之待下者如此則下之報上者從可知矣夫豈知天子惟君萬邦元后者又所以父母斯民也夫父母之於子賢者愛之不肖者憐之惟恐有一之不得其所也而况天下之罷癃殘疾惸獨鰥寡皆吾赤子之顛連無告者也而奈何其鄙夷之且賤惡之惡在其為民父母也故夫見孺子入井而有怵惕惻隱之心幼吾幼而知所以闕人之幼是心也人皆有之惟聖人為能闕聖人能以不忍人之心行不忍人之政闕之地所欲與聚所惡勿闕夫匹婦無一不被其澤其闕之政猶之罔極之恩者豈有闕而已矣夫至誠而不動者未之有闕也上以誠而愛其下闕愛之如父母敬之闕迫之致哉亦闕於誠而已矣故曰愛人者人恆愛之必然之理也且湯之子惠困窮也初非有心於服人也亦非每人而悅之也要亦盡吾君道之所當然者耳而民之歸之也猶水之就下沛然莫之能禦也前王之得民心如此則繼世以有天下者可不深思而敬守之哉宜夫伊尹重以為太甲告也吾今而後知撫我則后虐我則讎之説為不可渝也以民之無常惟惠之懷之言為不可易也彼有狗彘食人之食而不知檢塗有餓莩而不知發乃是望民之加多倉廪實府庫充使壯者散而之四方老者轉乎溝壑乃惡疾視長上之死而不救之二君者亦有子惠之實於其民者乎而欲民之悅服多見其不知量也反覆其君世主之行事觀之未嘗不三嘆古人之不可及也王懋乃德視乃烈祖無時豫怠奉先思孝接下思恭視遠惟明聽德惟聰朕承王之休無斁人君當勉於修己以法先王之勤惟事必究其心而無所忽則臣奉君之美於無窮夫修德而足以無耻於前王則其福固足以及其臣下矣是以伊尹之告太甲欲其勉於修德以法先王之勤不可頃刻安於豫怠也然修德之要豈有他哉奉先也當思所以盡其孝接下也當思所以致其恭視則欲逺而思明聽則在德而思聰凡此皆懋德之所從事也太甲果能究心於此而無所忽焉則修德於一已而福及於羣臣為之臣者固將承王之美而無有厭斁者矣於此見人君修德之道匪輕大臣輔弼之責至重君德既修而後臣責始盡其所係蓋如此夫人君一身係國家之安危關生民之休戚固當以修德為先而大臣者蓋與之共安危而均休戚尤以弼成君德為任后德為臣不德為臣其任不亦重乎况乎主聖則臣下得以蒙其休主為則臣下不得以辭其責茍君有善而不知所以順其美有過而不知所以救其惡耽樂怠荒輕舉妄動覆先王之令緒而有愧於烈祖則召危亡之辱而禍及於其臣固其勢之所必至也大臣蓋知此是以於上下視聽之間既備述其當然之道且以己之所仰賴者期之可謂善戒其君者矣夫人君為天下之表儀必疆於自治而後可以治人固當孜孜焉為善是求汲汲焉為德是務使己之德無愧於先王可也懋敬厥德先王所以修於己者如此則日新厥德後王可不思所以視效於此哉夫其宵衣旰食而無頃刻之安焦心勞思而無毫忽之怠先王所以勤於己者又如此而後王豈可安於豫怠以違其祖哉蓋繼志述事在孝子之心所當思祭之如存在孝子之心所當勉使孝敬之心無時而忽之則不敢有違其祖矣上而祖考固不敢以背違下而羣臣亦惡可得而易忽之哉此伊尹所以為善告君者歟太甲下惟天無親克敬惟親不可恃者上天眷顧之情所可恃者君心感格之道夫人君之格天舍敬其何以哉是以伊尹之告太甲謂天於君豈有常親之理其眷顧之情蓋不得而恃也然人君能盡一己之敬則天心雖無常親而亦未嘗不親之是其感格之道蓋有所在也謂之無親則有不可必者謂之惟親則固有甚可必者存焉亦顧君心之敬否何如耳可不知所以敬之哉嘗讀書至天難忱斯惟命靡常而後知天眷之無常及至皇天無親惟德是輔而後知格天之有道盡其道則可格乎天矣且吾有以知之天監厥德用集大命人知天之所以厚於成湯而不知湯所以得天者以其顧諟明命而罔不祗肅也皇天用訓厥道付畀四方人知天之所以眷文王也而不知文王之所以得乎天者亦以其能昭事上帝而小心翼翼也論至於此然後知人君未有敬謹而不足以得天心亦未有怠荒而能隆天眷者宜乎伊尹拳拳於太甲也今夫天高在上無形迹之可見無聲臭之可聞而其聰明不可欺明威不可測豫之而或奪之福之而或禍之是天固無常親也人君在上能使天之心與我為一者無他亦惟敬而已矣方其敬也出門如見大賔使民如承大祭視如對日星聽如驚雷霆坐如近記過之史行如隨糾非之吏兢兢焉無須臾之或慢業業焉無一事之敢忽君之盡其敬者如此則申命用休固非吾之有求乎天而其來也自不可辭純佑秉德亦非天之有私于我也而其至也自不容禦謂之克敬惟親非歟然則無親者天也惟親者吾使之也為君者茍以天無常親而不盡己之敬則非天之無親也實君不能致其親之之道也茍能盡其道則天與君渾然為一而無天人之間矣太甲既立不明于德至于以欲敗度縱敗禮蓋亦恃天命之可常矣而豈知天無常也哉故幸其一旦改悟而遽以是告之庶其能欽崇乎天道而永保乎天命也伊尹之忠愛何如哉咸有一德德無常師主善為師德之在人者無定名而取之于己者有定論夫人之德至不少也取諸人以為善惡可執一以為師哉亦惟主於善而已矣伊尹之告太甲謂德之在人非止於一端師之有要必為善是主茍非有以集天下之善則豈足以成一人之善也哉云云人君居天下之上必有首天下之德然不在於恃一己之長貴其能兼天下之善而已蓋天以一理賦之於人散為萬善人君合天下之萬善而後已之德可全故舜之德非不大也然善與人同樂取諸人以為善夫子之德非不高也然猶多聞多見擇其善者而從之凡其有諸己者蓋無非取諸人也是惡可執一以為師也茍自廣而狹人使匹夫匹婦不獲自盡則一善不備而人主無與成厥功矣此大臣之所深戒也且夫天下之理散殊多端博取諸人何者非益仁善為元固所當師也而有所謂行而宜之之義焉非禮勿履亦所當師也而又有所謂應變曲折之智焉大而三綱五常之道小而動靜云為之理其為德也不止於一二不止於十百不止於千萬也是亦何常師之有哉必也博取諸天下參酌乎吾心善者主之不善者舍之可者法之不可者去之使其德之未善也雖生乎吾前亦舍之而勿師使其德之誠善也雖生乎吾後亦師之而勿棄誠如是則人之有善無不容而已之德無不修矣大抵德者善之總稱善者德之實行故德兼衆善不主於善則無以得一本萬殊之理善原於一不協于一則無以達一本萬殊之妙故始焉主善固欲其博而求之不一之善終也協一則欲其約而會之至一之理此聖學始終條理之緒而人君取人為善之要也太甲改過之初伊尹以是告之其才固有大過人者歟雖然豈特伊尹之言為然前乎舜禹精一之傳後夫孔顔博約之旨同一揆也盤庚上汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德大臣無私而廣實德于今斯敢有言而揚積德于昔蓋今日之實德非一己之私心然後前日之積德非一己之私論况積德者世臣大族之所欲言者也惟私心未去而不能以施德於人為功則言辭之間不敢以積德而大其説爾必也私心不纍其實德而施於今日者無不周然後可證其積德而敢於言者無所愧不然實德有虧而所謂積德者乃妄矣雖欲言之其敢大言乎云云故盤庚誥我世家大族以遷殷而兩致意於德之一辭誠以世家大族雖不欲以實德為功而好以積德為論者也殊不知所行者皆私心則所言者皆妄論而非積德矣實德者所難行者也私心未去則不能遍行積德者所易忘者也而實德未行則不敢大言之言之非艱行之惟艱所行者皆私心所為而非實德之遍及則所言者尚敢以積德為誇大談也哉古人告戒之辭勸其施德於人則既勉其所不欲行者又以其所欲言者誘之則世家大族好以積德為説者自不能不以實德施于民矣且夫祖乙圯于耿而水患害于民則勢不得不遷也而世家大族安土重遷胥動浮言以害遷者則巨室之所以有言者必自恃以為民之所慕然不知以私心茍悅小民而害其遷則非實德也實德未施則不可謂其積德矣故必告之以實德而啓之以積德之論焉實德者學而有功者也積德者祖宗前日之所積者也欲以積德為言夫豈難於立論者而實德皆私心所為則其所言者皆私論爾惟夫勸民以遷都之利使實德施于一國之民至於婚姻僚友無不被其功澤然後乃敢大言而曰汝有積德其來非一日也汝今不能公心以施實德於人而乃欲大言其積德於己是何大言不慙而敢立論如此哉殷人巨室致使天子之尊而以大言誘之亦可謂頑矣而盤庚則誠賢君也以忠厚代斧鉞之誅以言論開人心之善亦先王之遺意也故卒使殷民之遷而厥德允修焉厥後周公遷殷民至于世三紀俗變風移而殷之庶士怙侈滅義驕淫矜誇不改乎前日之舊則世祿之家鮮克由禮亦已久矣然盤庚化之於前成王穆王化之於後則頑者又在於化之如何也然至煩於告戒之末而不能以心相孚則又世變之不得已也吁説命上若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨取諸物以喻其臣者其望切取諸天以喻其臣者其望深事之係於物者不若係於天者之為大也故人君擬臣於物必至於擬諸天而後止耳夫礪物也舟楫亦物也然金以之而利川以之而濟物之相資者然也况君之於臣乎此君之喻臣其望之切者如此然利取諸物曷若取諸天大旱天之所以困民也霖雨天之所以利民也以天之所利濟民之所困則其為用亦大矣君之喻臣有似於此則其望之深者何如既擬諸物又擬諸天於以見其言之愈切而意愈深也説命上篇曰云云此高宗所以望傅説者如此嘗謂有一物之利有一人之利有天下之利一物之利固不如一人之利一人之利又不如天下之利也以其利而言則雖有大小之殊其用之不可無則一而已然用之為利不以其順而以其􅊇以其異而不以其同逆者可以有成而異者可以相濟也故君望臣不以其依阿容恱之為忠而以其犯顔強諌之為直不以其諂諛將順之為美而以其繩愆糾繆之為賢是故金利器也然非有以淬之則無以成其利礪粗於金故可以為金之用也巨川險地也然非有以濟之則無以通其險舟乘於川故可以為川之用也君之喻臣而取諸此可謂切矣然未至於大也若嵗大旱陽氣之烈也茍無以遏之則生物為之枯稿生民為之憔悴霖雨陰氣之和也改而為雨積而為霖起枯稿而生榮化憔悴而愈悅其為用也不亦大乎君之喻臣而取諸此其所望者亦至矣蓋礪而為金之用一物之利也舟楫為巨川之用一人之利也霖雨為大旱之用天下之利也一人之利固大於一物之利而天下之利則又不止於一人之利而已爾是以君之於臣利於君之一事者未足善利於君之一身者為可嘉利於君之一身又不若澤及四海而天下利之者為可貴也故高宗之望傅説取喻於物其意固切取喻於天者其意尤深也然書之取物為喻多矣有曰若稽田而疆畎若作室而塗茨有曰若苗之有莠若粟之有秕未嘗直指人於其間而高宗之喻則不徒曰若金用利而必曰用汝作礪不徒曰巨川用舟楫大旱用霖雨而必曰用汝作舟楫霖雨異時酒醴之喻曰爾惟麴蘖和羮之喻曰爾惟鹽梅曰汝曰爾置諸兩物相資之間懇懇焉不釋諸口其所望之者不啻如飢之食渴之飲也及即傅説而觀之從繩之喻監憲之言作礪之用可見矣高宗以遁野罔顯之餘而一旦即聞勤學之訓作舟楫之用又可見矣至於四海之內咸仰朕德之譽則作霖雨之用又何如哉君臣之際其盡美矣説命中慮善以動動惟厥時有其善喪厥善矜其能喪厥功惟事事乃有備有備無患動必循理而欲合於時措之宜志不可滿而貴乎得思患預防之道此大臣之善戒其君者也大臣之有言於其君茍徒及於高逺之務而不責之以躬行之實則空言無施雖切何補昔傅説之告高宗蓋審乎此矣謂夫動者吉凶悔吝之所由生也慮善而動固云可也然而動非其時則是動為無益矣志者人之所易滿也不自滿假人之賢也蔽於矜伐則德喪而功隳矣事者人之所易忽也事其事者備而無患茍無其備則事至而患生矣吁於斯三者皆人君之所當戒者也亦不出乎躬行之實者也為高宗者可不念哉云云見於説命中篇其義如此嘗謂大臣愛君之心未有不極其至者也凡其所戒未有不出於正者也然將使其君樂於位而我不告之以事理之所宜當務之為急言雖多奚益哉夫君之動而或為無益者何也蓋理之甚當而未合於時者然也有己之善矜己之能此則志為自滿而道不加修者然也不事其事事至無備此則蓄疑敗謀怠忽荒政者然也凡世之人主而知有是戒者亦盍反其本矣今夫所謂善者當乎理也時者時措之宜也慮固欲其當乎理而動尤貴於得其宜動而非時猶無益也聖人酬酢斯世亦惟其時而已蓋嘗思之事固有善而非時之所宜者善如裘葛之良時如寒暑之時時非裘葛雖善何施惟未動審於慮善將動審於時宜然後事順於理而當其可矣不顧可否非時而動則吾未見其能有益於動者也凡人之有一善者皆曰能有是是亦足矣有一能者皆曰能善是是亦足矣此所謂矜伐自滿者也殊不知自有其善則己不加勉而德日虧矣自矜其能則人不效力而功日隳矣常人之不知戒於是者猶曰不可而况於人君者乎凡天下之事惟事其事者乃其有所備也既有其備則又何患之有哉若夫修車馬備器械事乎兵事則兵有其偹故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害所謂事事有備無患者如此説之告君可謂知所當務者矣抑嘗論之高宗聰明之主也非不能待時而動者也非蔽於矜伐者也亦非不能思患而預防者也而説之拳拳以是為言者蓋以惟聖憲天欲其事事物物而皆出於天理之所當然也茍有一毫之未盡則即私意而非天之聰明矣此所以不得不為之過慮而戒之也嗚呼説其忠臣也哉説命下若作酒醴爾惟麴蘖若作和羮爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓賢君資臣以格其心不惟取喻之甚明而且自任之甚重也輔導者臣之功而力行者君之責也茍言焉而不見用則喻之雖切人亦孰肯盡言哉昔者高宗之命傅説謂爾之輔朕當訓于立志之初而不在於行事之際也何也譬之作酒醴則先資汝以為麴蘖作和羮則資汝以為鹽梅左右規正而無或偏交修不逮而毋或棄豫於爾言皆能力行而無怠爾果何憚而不言哉喻之以物理而誘之以盡言高宗其善於資臣者矣夫人臣之輔君惟力行之難人君之聽言惟力行之未易蓋救之於事為之著不若調濟於心術之微而言聽諌行則人孰不樂告以善道古之賢君所以不徒托物以明其理又必盡言以誘其誠蓋以取喻之不精則辭不足以達意而賢者不見其求助之切自任之不篤則求道之不勇而賢者亦豈信其足以有為古之人兼盡是道者高宗是也夫人君以一身而總天下之大以一心而應萬事之機茍或毫釐有差則將謬於千里故志也者心之所之將欲有為而未見於事者也人君納誨以輔台德者當於此而致力焉蓋天下之事理禁於未發者易為功而救於己然者難為力茍於君心趨向之或偏而不知所以訓迪焉則他日發於其政害於其事而其害將有不可勝言者矣泛觀物理何獨不然作酒醴者麯多太苦蘖多太甘麯糵得中而後成酒作和羮者鹽多則醎梅過則酸必鹽梅得中而後成羮二者皆調均節適於作之之初然後能適衆口於既成之後人臣之輔導其君亦何以異於此哉剛柔之相濟猶麴蘖之交致其功也可否之相濟猶鹽梅之交致其味也夫然後謂之交修否則容悅逢迎和者如一猶之以水濟水耳謂之交修可乎夫誨之諄諄而聽我藐藐是故無足與言仁義雖棄之可也有聞未之能行惟恐有聞豫之克邁乃訓若此而棄我不言可乎説而不繹從而不改是蓋畫而不進雖絶之可也今也得一善則拳拳服膺而勿失豫之克邁乃訓若此而棄我而不諌可乎夫言不遜則不足以感人之心行不篤則不足以造道之極以君命臣而切切焉惟恐其豫棄其尊德樂道之誠固於斯而可知尊所聞行所知而自謂之豫克其勇往力行之心蓋於斯而可見吁人君之切於求助如此雖欲不言安得而不言哉嗚呼人主一心萬化之原危微操舍之幾乃得失存亡之所係乎人能先立乎此則天下事可從而理矣於此見能盡其心而欲明諍顯諌於行事之間者斯末矣故祖乙之告高宗曰惟先格王正厥事而穆王之命伯冏亦曰繩愆紏謬格其非心豈不與高宗訓志同一軌轍乎高宗首以舟楫霖雨為喻繼以麴蘖鹽梅為喻所造者深而望益切矣宜説有以復于王也説為商賢佐而果無負於訓于朕志之命高宗為商令主而真能踐其克邁乃訓之言其有以成中興之功宜矣王人求多聞時惟建事學于古訓乃有獲資諸人者固欲措諸事於天下法諸古者猶欲得其理於吾心蓋理之所存即事之所由建天下豈有理外之事哉夫茍知資之人以利於行而不知反諸己而致其知則非王者之學矣傅説知其然故其告高宗也謂人之求聞於人而以多為貴者非徒有資聞見而欲見之於行事也然惟行是務而不反之於己則亦冥行而已故必學於古人之訓然後乃有所得於心而後之所建者亦有所資而不匱矣豈有不能學以致其知而徒聞以力行者哉故説命之下篇有曰云云大抵知行無二致也古今無二理也彼有富於見聞而不能施於實用者必其知之未至也豈可徒行之為務哉又有勤於問學而不能深造其理者必其行之勿篤也豈可徒知之為務哉茍有聞矣而又質之於古則其事之所建者必非賢者之過於行矣學古矣而又求於人則其所獲於心者必非知者之過於知矣若高宗者非不能建事也非不知學古也蓋恐其所行非所知而所知非所行爾説也交陳其説而互陳其義其意蓋謂人非生而知之者莫不求聞於人也人非聞一而知十者莫不欲所聞之多也使其聞於人者既多而行於己者不悖則唯恐其不多耳茍得於聞如彼而達諸事者如此是則道聽塗説而已雖多亦奚以為如之何而不以古訓為務哉何則典謨之篇非陳言也禮樂之制非虛文也精微之藴非學莫之領會帝王之傳非學莫之融貫使有志於古者不以所聞之多而廢其學不以所行之篤而略於獲則理之在古訓者即吾心之所得而理之在吾心者即古訓之所載矣豈有知之至不由於學之博哉豈有得於心而不能建於事者哉吾觀説之於高宗方其交修罔棄也而説則曰非知之艱者欲其勉夫行也及其克邁乃訓則又曰學于古訓乃有獲者欲其致於知也由此而觀高宗之聞於説者不為少矣説之告於王者必可建事矣但恐前日之學於甘盤者未嘗有同於心也則夫説之於王安恃今日之所寄而廢前日之所學若説者可謂能愛君矣後之論學者必曰自傅説告高宗始然則高宗之中興者有自來矣非君臣各盡其道何以與於此哉惟學遜志務時敏厥修乃來允懷于茲道積于厥躬惟斆學半念終始典于學厥德修罔覺知學以至夫道惟信之篤而道益充即知教以全其功惟守之一而德自化夫使人之學也徒知謙勤篤信以開夫凝道之端而不知體立用行以極夫成德之妙豈聖學之全功哉且學問之道無他謙以受人勤以勵已而已謙勤兩盡而不至於道者未之有也况於此而篤不忘則道之積於己者益以充矣然猶未也道積厥躬者體之立斆學于人者用之行兼體用合內外而後可以會其全也一念終始常在於學則其德之修者有日進而不自知之妙矣吁聖賢之學所以造道成德如此宜傳説之重為高宗告也使因是而求夫聖賢之學矣蓋所以貫終始於一心合內外於一理也然其造道而成德者固亦有序焉則道也德也果二理哉是不然也道者理之共由而德者理之自得也學與理一固凝道之端而理與心一乃成德之妙也是故遜敏以立其本學之始也而即其道之凝也斆學以致其用學之終也而即其德之化也始焉而道之凝者有可見之功終焉而德之化者無可名之迹始終一心內外一理斯為聖學之全功矣今夫遜其志而如有所不能則卑以自牧虛以受人也敏於時而如有所不及則惟日不足日新不已也不徒曰惟學遜志而且曰務時敏焉則修己以敬而敬自生修道以仁而仁自至斯謂學以至夫道矣然信道不篤則中道而止也必也篤信乎此而不惑允念乎此而不忘則敬之修者敬積於厥躬而非聲音笑貌矣仁之修者仁積於厥躬而皆睟面盎背矣向也修之來者為不有今也來之積者為益充不曰信之篤者而道益充耶然學無止法道無終窮則人之學也又豈如斯而已乎是故道至於積厥躬則其本立矣而德未至於罔覺非所以會其全也學所以成已而教之以成物則成物之功居乎其半矣學所以明德而教所以教民則新民之功居乎其半矣不以此為可先而學焉不以彼為可後而倦教斯謂之教以全其功也然守之不一則半塗而廢矣必曰始之自學學也終之教人亦學也念茲在茲終始惟一則向也敬之修者吾見其為敬而今則德修罔覺向也仁之修者吾知其為仁而今則德修罔覺矣不識不知順帝之則蓋有不可名言之妙也不曰守之一而德自化耶始也謙勤篤信以開夫凝道之端終也體立用行以極夫成德之妙此其所以貫始終而合內外之道矣且高宗舊學于甘盤者也而傳説之言若此其亦達夫聖學之全功矣然又慮其德修罔覺則或失於虛無荒忽而德非其德矣故又欲其監于先王成憲其永無愆何其愛君之至哉抑論之聖人心法之傳尚矣而學之一字實始於此厥後吾夫子以生知之聖固無所事乎學矣然既憂乎學不講而德不修也亦又學不厭而教不倦焉又極而從心所欲不踰矩則其造道之深而成德之妙亦豈無所自哉吁學者之極功聖人之能事也後之學者尚考於斯惟斆學半念終始典于學厥德修罔覺知教之及於人者有相長之功則學不厭於己者有自然之益蓋教有相長學無止法教人與自學莫非所以為進德地也夫教學于人所以教人也而所得乃居乎自學之半是推己教人亦為學之事也然則為學者可不終始有常乎一念終始有常無間其德之所修有不期然而然者矣大臣告君以為學之要孰有加於此哉云云夫為學之道有二亦曰教不倦學不厭而已人皆曰教不倦者所以成物也非以成己是學之終事然豈知溫故有知新之理因人有反己之機然終也猶始也且傳曰學然後知不足教然後知困是教人之功皆所以為己也茍知教人亦所以成已則典學之念豈復有終始之異歟念無終始之殊則勉強學問之餘體用無間之後而涵泳從容忽不自知其入於聖賢之域矣此教不倦學不厭二者所以不容舉一而廢一歟自今觀之傳道解惑推吾之所知者以語人也吾心之見由是而愈明則昔之所未知者於是可無不知矣長善救失推吾之能者以語人也然吾身之行由是而愈力則昔所未能者於是可無不能矣然則講貫之精者實吾辨之眀也研窮之熟者乃吾行之篤也為人固所以為己而成物即所以成己也豈非惟教學半之説歟夫茍知此則典學之念其可有終始之間哉故始之自學學也而未嘗有一毫自棄之心終之教人亦學也而未嘗萌一毫自滿之意念之所向終始不渝則德之所修亦日不已始也由善信而美大今則不知其大而化之矣始也由擇善而固執今則不知其從容中道矣謂之念終始典於學而德修罔覺非歟嗟夫學之為道大矣哉人非生而知之未有不須學而成者矧斯道也測之而益深窮之而益逺愈至而愈未至愈求而愈不足是以古之聖賢未嘗不以懈怠荒寧為懼勤勵不息自強然嘗論之世之為學者明師在前講誦在後遜志時敏厥修乃來已之自學若此若無待於教人而後喻也允懷于茲道積厥躬學之得於己者如此若無待於終始典學而後得修也然教而後知困知困而後能自強是以起豫之商助我之回雖聖人有不容廢也道無終窮學無止法終始惟一時乃日新一隙之間萬善俱廢是以孳孳為善拳拳服膺雖聖賢有所不容己也高宗君臣講求為治之要而終歸諸此開萬世言學之端實自兹始其致中興之盛也宜哉股肱惟人良臣惟聖人必具四體而後成其形君必資賢輔以成其德蓋君之有賢臣猶人之有股肱也故高宗命説近取諸身以為喻焉以為人所以為人以其有股肱也手足備而後其形全君之所以聖者以其有賢輔也良臣輔而後其德聖即彼證此參視對觀則君之不可無臣也審矣云云四體具而成形良臣輔而君聖此理之必然也故君之視臣如手足臣之視君如腹心手足腹心相持一體可相有而不可相無者也茍四體而缺一則何以成人之形無良臣以為之輔則何以成君之德古之人深燭是理者其惟高宗乎觀其命臣之際可見矣且夫得天地之氣以成形耳目百骸皆天所賦全而具之則為人人者所以靈於物也得天地之理以為性故四端萬善悉具於心全而體之則為聖聖者又超乎人者也茍一指不信且有不若人之恥一德不備又何以為首出庶物之尊然則全四體以為人所藉以運動者股肱也奄有四海以為君所賴以左右者賢臣也使股肱失職則將為支離為廢痼而塊然之腹心吾知其一羽有所不能舉跬步有所不能前矣是果足以為人哉輔弼而非人則將為逢迎為容悅孰與繩愆而糾謬孰與扶顛而持危而德輶如毛吾知其舉且有所不勝行且有所不能至矣尚何望其能優入聖域也哉人臣而茍知乎此則䇿名委質之餘必將展布四體宣力效忠不使是君為堯舜之君不止矣高宗其善為咨説者歟始告以舟楫霖雨繼之以麯蘖鹽梅非不深切而著明也至此又告之以股肱惟人何哉蓋舟楫霖雨異類之相資麯蘖鹽梅異味之相濟至股肱惟人之喻則一體之相須一有不具不復得為人矣此高宗之見道益深而望説益切然木從繩則正后從諫則聖傳説固嘗以聖期其君矣良臣惟聖髙宗終以聖責諸臣焉君臣之責望如此其足以成中興之治也宜哉
