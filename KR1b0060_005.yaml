body:
  text: 書義矜式卷五元王充耘撰周書召誥王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中又王厥有成命治民今休大臣勉言以宅中圗治無非所以為天人計也蓋王者天人之主所以繼天而出治者也故召公告成王以紹上帝服土中為居洛之先務也而中舉周公之言以實之末以其效期之其丁寧反覆之意至深切矣夫紹上帝所以承乎天服土中所以治乎人洛邑初政二者而已周公營洛之初嘗謂作此大邑自是可以配天毖祀自是可以宅中治民其素定之謀固已如此王能如是則豈惟無負周公之所屬望亦且上可以保天命而下可以福斯民其效有不期然而然者矣召告之書云云天生民而不能自治立之君以治之君也者所以繼天立極而代天理物者也故建邦設都以亂民者所以奉天道克相上帝者在於綏四方不如是則俯有愧於民而仰有負於天矣其何以居天人之間哉洛邑告成成王始武於天下元子於四方為新辟天秩天敘自我而惇庸天命天討自我而刑賞任大責重有不可諉之於他人者是意也豈惟召公言之於宅洛之日在周公已言之於作洛之先矣蓋作洛者武王之志周公成王成之召公實先經理之君臣之間其所以深謀逺慮者果何如也蓋洛者天地之中風雨所㑹隂陽所和四方朝聘貢賦之道均而逺近勞逸之費等今王逺在鎬京而即宗周去西土而即宅東土南望三途北望嶽鄙顧瞻兩河粵瞻洛伊豈徒曰據要會以觀方來都形勢以制六合所以定鼎郟鄏而卜世卜年者正惟畏天命而悲人窮殆將以是惟稱秩元祀發政施仁之本也故自是而對越上帝享答神祗則齊明盛服以承祭祀可以達此精誠之德而無愧自是而宅中圖治則惇典庸禮命德討罪而惟新之政可以放諸四海而無不準蓋其配天毖祀即所謂紹上帝自時中乂即所謂服土中召公今日之所言即周公前日之所告者也雖然此特言其事之當然者耳未及其效也夫能紹上帝則天命之在我者一成而不變而上可以得乎天是即配天毖祀之效也能自服土中則能咸和小民以為今日之休而下可以安乎民是即自時中乂之效也克綏先王之祿而永底蒸民之生其皆在於此乎周公之誥曰王肇稱殷禮祀於新邑咸秩無文又曰其自時中乂萬邦咸休惟王有成績其言非不深􅋀著明而召公之誥又且反覆而懇至懼其信之不篤又且申以同列之言慮其行之不力而期以必然之效一篇之中於天命民心屢致意焉而䆒其終以諴小民為祈天命之本以疾敬德為諴小民之本大臣之於國家長謀逺慮蓋如此以成王之賢而又有周召為之左右此其所以能為成周建無窮之基也歟王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德相觀而善者君之所以善其臣修已以敬者君之所以敬其身蓋君者臣之主始而以臣率臣者君也終而敬身以率臣者亦君也豈有敬身之不至而足以善其臣者哉是故召公告成王以服御士不徒曰周御士節性而已而首曰王者蓋欲成王以善臣為己責也不徒曰敬作所以敬德而已而復曰王敬作所蓋欲成王以為己任也無他其身正不令而行其身不正雖令不從其是之謂乎洛誥伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王賢君因頑民之戒而盡其敬於大臣大臣舉明禋之賜而伸其敬於前聖不以常人之禮而待夫聖臣賢王之敬其臣者然也不敢受非常之禮而必以致之前聖聖臣之敬其君者然也使聖人而遽以神明之禮自居則非所以為聖人矣周公治洛功成成王使人至洛教戒庶殷就致綏寧之命而其為禮也有秬鬯二卣焉曰明禋曰拜手稽首休享則其所以待周公者不以君臣之分而以神明之禮矣而周公不敢偃然受其禮也則禋于文王則禋于武王舉成王之賜而伸其敬於前聖則君臣兩盡其道矣吁此其所以為周公也歟云云嘗謂君之所以待臣臣之所以事君各盡其敬而已不以非常之禮待非常之功非所以敬大臣也自居以非常之功而安受非常之禮非所以敬其君也成王之於周公不敢輕其禮而待之以神明周公之於成王不敢受其禮而致之於文武其此之謂乎周公之意若曰甚哉王之待我其敬也惟彼殷民密邇王室而恐其猶未式厥訓者焉席寵惟舊而慮其無不驕淫矜誇者焉因使者之來致戒飭之命因以綏寧于我而有秬鬯二卣之賜秬者何一稃二米和氣之所生也鬯者何鬱金香草合秬黍以為酒也盛之以二中尊焉豈非宗廟之祭而用之以祼者乎禮莫重於祼而其致之之辭則曰此明潔而禋祭之酒今王拜手稽首致其休美以享公則其待我也蓋待以神明之禮而不復拘拘以君臣之分矣雖然待我以非常之禮者人君之道也而非我之所敢當也雖曰朝廷之制有大賓客以享之之禮而莫異於祭然我之自視猶常人也秬鬯二卣以致其明禋拜手稽首以言其休享果何為而施於我耶祭有三宿之禮謂進爵於神也而在我則有所不敢當者矣却人君之賜則為不恭受神明之禮則為有歉於此無以處之思昔穆考文王於昭于天固洋洋乎其如在也越乃昭考武王以孝以享在我後人之所不敢忘也以王之禋我者而禋于文王武王則於義安而於理當矣非惟無愧於今王亦庶幾其無愧於前聖矣非周公其能處之得宜如是耶嘗觀周公之宅洛也以天事言則洛者天地之中隂陽之所會風雨之所交以人事言則四方朝聘貢賦道理均焉欲其君紹上帝而服土中也又不但如是而已以距妹邦為近懲三監之難遷殷頑民於是作王都以鎮服姦雄之心則周公之功宗廟萬世之功也有非常之功則宜有非常之禮今而因有毖殷之使則其受明禋休享非過也有大美而不居周公之聖何可及耶抑周公之禋于文王武王非有他也期成王以惠篤敘萬年厭于乃德而已公之心果有頃刻而忘其忠愛者乎其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績厚文獻以為化今傳後之本則可宅中土而致治定功成之效矣此周公之告成王不惟勉之以為治之要而且期之以致治之效也昔者成王遷洛邑周公欲其大厚於典章及殷之賢者使治為新辟足以觀視於四方作周恭先足以垂憲於後世則欲為化今傳後之計者將不在於大厚其文獻乎且凡若此者非有他也亦曰其自是宅中以圗治使萬邦咸底於休美而王遂有其成功則功成治定之效豈不在於宅中圖治之初乎勉之期之周公之忠愛至矣夫人君之為治要不可以自用也所以出治必有其德所以輔治必有其人廢而自用則其治為無足勸棄賢人而不親則其恭為無足法夫如是則一鄉且不治况能有以及天下乎率由舊章固致治之所先而以貴下賤亦為治之所急且成王之治洛非獨以化殷民也將以化天下也然殷民叛服乃天下治亂之所關而治定功成之所由係使治不有其道則萬邦安得以蒙其休而王亦安能以有其績宅中圖治之功不謹之於初不可也且聖謨洋洋嘉言孔彰凡典籍所紀何莫非王道也殷士膚敏侯服于周凡獻臣百宗工何莫非賢况三代以來禮樂文物至周大備不愆不忘率由舊章成王其可不大厚其典章乎殷之賢者殷民素所取信而視為趨向者也迪簡在庭有服在大僚則殷治而天下亦治矣成王其可不大厚殷之賢人乎誠如是也則發號施令罔有不臧有以聳動四方之觀聼而為新辟尊賢使能用上敬下有以為後世之所取法而作恭先焉夫治為新辟而必使天下無可議作周恭先而必使後世莫能加周公豈過望於成王哉蓋知其任大責重而將以無窮期之也夫豈定鼎于洛豈獨以承天地冲和之氣蓋將中天下而立定四海之民茍知文獻二者為致治之大要有以為新辟而作恭先則自是以宅中圖萬民雖廣必使化行俗美無一夫不被其澤而後已焉成功雖難必思長治久安無一事不底其成效而後止焉然而博施濟衆聖人所病靡不有初鮮克有終巍巍其有成功非一朝一夕之故也自非漸仁摩義使德教淪肌而浹髓夙興夜寐使政治綱舉而目張又奚足以及此哉老臣之輔幼主所以不徒勉其作興於一時必要其成功於悠久也抑周公固能輔其君矣而成王實能懋昭周公之訓也周官一篇一則曰學古入官二則曰其爾典常作之師則厚於典章可以知微子象賢而封之於宋則厚於賢者可見矣卒至六服羣辟罔不承德則萬邦之咸休可知鳬鷖既醉之盛刑措不用之風見頌於當時垂輝於後世其有成績也又可見成王可謂能無負周公之訓矣周公賢臣成王賢君蓋兩得之多士自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤前代聖賢之相繼也既修己以敬乎神尤體天而恤乎民蓋君臣者天之所命以為神民之主者也在昔有殷自成湯以至于帝乙莫不明其德而無所昧敬乎神而不敢慢修己事神亦既至矣故天大建殷國而保乂之殷之先王亦體上天建立之心罔敢失帝之則無不配天以澤民焉然則有商之盛非聖賢之相繼者能之乎云云嘗讀伊尹書而至於天位艱哉之語而後知君之所以為君也幽則有神也明則有人也上則有天也自非至誠之感神代天而理物者其何能膺天眷之隆而安天位之尊哉是故使之主祭而百神享之使之主事而百姓安之此天之所以與舜也弗克奮德慢神虐民皇天弗保此天之所以棄桀也夫天命之無常如此則人君受天之命而為神民之主宜若之何哉亦曰明吾之德焉而已耳商之興也豈偶然之故哉其自成湯至于太戊世雖不同也而所以明其德者則不以先後而有殊由祖乙至于帝乙時雖有異也而所以恤祀者則不以聖賢而有間德而謂之明則必能去其人欲之私而全其天理之正也祀而謂之恤則必能有孚顒若而必不敢度思而矧敢射思也殷王之明德恤士也如此亦惟上天仁愛有殷之君扶持而全安之不容釋於殷焉殷之先王所以受天命也如此其何不以上天之心為心而負其所托哉是故惇五典庸五禮則一本於天理之公章五服用五刑則一循乎天理之正惟知順天之心而已寧復有倒行逆施之事乎惟知順帝之則而已寧復有反道背德之事乎是宜膏澤之下於民庶者不啻若雨露之沾濡而疲癃殘疾者皆得以安其生也恩愛之加乎四海者不啻若日月之照臨而鰥寡孤獨者各得以遂其養也然則有殷之所以長治久安者非賢聖之君六七作其能如是乎嘗因是而論之武王之告康叔也既曰自成湯咸至于帝乙成王畏相矣周公之告多士也亦曰自成湯至于帝乙罔不明德慎罰矣公之告多士也又曰自成湯至于帝乙罔不明德恤祀焉則夫有商盛時其德業之盛而明君之多也固可知其固天命而結民心也又可見奈何後王不明于德弗敬上天以至遺厥先宗廟弗祀而商業遂以不繼嗚呼以六七聖賢之君維持之而不足以一獨夫之嗣覆亡之而有餘人有常言創業難守成亦不易誠哉是言也君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝聖賢之輔君各因其德而極其功也蓋治功之成不惟人臣之德有淺深之不同亦不惟人君之德有聖賢之或異也昔者伊尹之輔成湯以聖輔聖也其輔太甲以聖輔賢也伊陟臣扈之佐太戊以賢輔賢以聖臣而輔聖君則其治化與天無間故曰格于皇天以賢臣而輔賢君則其治化克厭天心故曰格于上帝於湯言受命者創業之主也於太甲言保衡者所以慰安天下於治平也云云見於君奭之書自其遍覆者而言謂之天自其主宰而言者謂之帝然天不可以形體求也君德而能遍覆四海則可以格于天矣帝不可以影響求也君心而能主宰萬物則可以格于帝矣天之所以為天帝之所以為帝其參贊之者在乎君廣大足以配天威福足以叶帝其輔相之者在乎臣以聖君而遇聖臣其治化固不可及矣以賢君而遇聖賢之臣則亦可以無愧也此申命用休所以必本於輔弼之直而勑天時幾者必需於股肱之善以是知天也帝也舉不外乎君聖也賢也舉不外乎臣人君之任固重而人臣之職亦不可以易視也夫受天命命成湯所以聖也而當是時則有伊尹以相之允德叶于下太甲所以賢也而當是時則有阿衡以佐之循政明理太戊所以為賢君也而當是時則有伊陟臣扈以輔之君之與臣咸有一德則包含編覆無不周遍所以能格于皇天也臣之與君或桐宫而終德或桑穀而弭祥則陽舒隂慘無不適定所以能格于上帝也格于皇天所以配天德而無間格于上帝所以合天心而弗違謂之無間則以己之德契天之德而體用一原顯微一致凡日月星辰風霆霜露皆至教之攸寓謂之弗違則以己之心奉天之心而動靜無違表裏交正凡寒暑晦明生殺榮悴皆至化之所行此君之格于天帝之道不能無淺深之異而臣之輔其賢聖之君不能無輕重之分也是故天之感通而有淺深之異者非天有私於湯也伊陟臣扈固不若伊尹也伊尹輔君而有輕重之分者非伊尹之治化不若前也太甲固不若湯之聖故也論至於此則天之所以昭格臣之所以輔相一視其君之聖賢而已抑嘗論之伊尹保衡一人而異稱者稱名於成湯之時者理之本然也舉官於太甲之時固以先代之遺臣亦以互文而並見且深欲見保天下於長治久安也伊陟之賢雖無可考然既為伊尹之子則其德之出於家學者可知矣臣扈之賢雖不可聞然觀其與伊陟而並稱則其德之同於伊陟者可知矣古之人臣其輔君之績如此周公之告召公而以我聞在昔發之其所以責任之者豈不明以徵乎昔武王之命康叔亦曰汝丕逺惟商耉成人而文王之詩亦曰儀監于殷皆此意也百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚職列於內外而德之同者無所間誠叶于上下而事之舉者無所疑夫內外大小之臣交相用德以維持天下則貫通浹洽之既久而民罔不信宜也是以內之百姓與夫王臣之微者莫不秉持而用乂其君焉曰罔不曰咸則人臣莫不用德固己洋溢浹洽於天下矣一人有事于四方又豈不如龜蓍之卜筮而相與敬信之乎無他有翕然用德之效則有隱然孚契之心殷之盛時然也云云嘗謂天下之所以敬信其上者固在於有事之時而實在於無事之日於有事之時惟有以驗其誠敬之心於無事之時必有以盡其維持固然之道惟夫內外無間大小如一渾渾乎相與於道德之中而後維持固然有可言者然分職受任不為不多建侯樹屏亦為不少茍有一人之非德焉則其所施於天下者必不能純全而無間矣一旦有事之際天安有潜孚默契之妙哉夫百官之著姓王臣之卑微此皆在內之官而職有大小之異者也秉持其德而操守不失慮恤以德而謀慮之不遺合大小罔不然也小臣之布列侯甸之分職任此皆在外之官而職有大小之要者也奔走服役莫敢不遑惟德是稱治其君事謂咸莫不然也內之用德者既如此外之用德者又如彼自大及小罔不如此而相承以此而相應道德之澤薰蒸融溢其漸涵浸漬之久非一日矣惟動丕應徯志理勢之必然也故若征伐若㑹同凡有事於四方而四方之民如龜之卜如蓍之筮敬之而無忽信之而不疑矣孚者誠之在中者也天下之敬信非其事信其德耳抑嘗考之周公此言蓋承上章言殷之大臣能輔道其君有格天致治之效遂言內外賢人之多皆伊尹以下諸大臣號召而倡率之也有周之興既有虢叔閎夭之徒而文王之德降于國人四方尚迪有德而武王之德冒天下凡內虎賁綴衣趣馬小尹左右攜僕外內大都小伯以至百司太史尹伯凡官使于文武之世者無非常德之吉士亦豈非倡於上者有其人乎今日之明我俊民周公召公之責也懇切而纍言之矣為召公者亦宜有動于斯言矣豫惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時大臣之勉同列不以一身之謀而易其天下國家之計此所以深有期於同列也蓋滿盈之戒雖大臣之所當知而王業之重尤大臣之所當慮也昔者周公之留召公謂豫惟曰襄我二人汝有合哉亦曰在是二人是王業之重在豫二人也雖天休之滋至為可畏而二人豈可以弗戡而求去哉惟當敬德而益加謹也明揚俊民而使之在位也夫如是則可以盡大臣之美可以答上天之休而在讓後人於丕大之時則始可超然而退矣大臣知其所當戒而尤慮其所當重終闕而易其天下國家無窮之計也嗚呼仁哉周公闕公能從之昔者洛邑之成周公嘗闕去矣公以闕而不終去今日召公之去亦周公前日之心闕之留而亦不至於决然焉蓋權勢之隆雖中人猶知為退避之計况於聖賢能識進退存亡而不失其正者乎然而召公今日求去之决而他日至輔成王之初政其故何哉大抵天下惟不溺於權勢者然後可以任重而致逺是以功加四海而天下不以為多威震九重而人主不以為疑弼亮四世而天下不以為固權一朝釋位而去而惠澤流於子孫而無窮此非深明大臣出處之道而無一毫係纍之私者能之乎蓋於是可以明召公之本心也且文武受命而周公嘗與其創業之政成王繼統而周召又與其守成之托是王業之成在我二人也非豫惟之言也汝聞而有合哉亦曰在時二人也然上天之休命益滋至而無窮威福之浸明浸昌也權勢之愈隆愈盛也天其以是而佑我乎亦將有以警我乎此吾二人之所以弗戡也而召公不得不决於去之時也然聖賢以至公無我之心而從容乎出處之際夫豈無其道乎是不可專為一身之謀矣聖賢之心固無不敬也然又當敬德焉益加寅敬而不敢怠也聖人之心固未嘗蔽賢也然又當明揚俊民焉布列庶位而無曠職也如是而後俯盡大臣之職業而無愧焉仰答滋至之天休而無懼焉賢才足以寄付託之重而治道日臻夫盛大之時而後可以言讓矣讓固大臣之美德然在今日則未可讓在他日則不敢不讓也超然逺引於當讓之時而不使吾進退有毫髮之遺憾則所以為天下國家之計豈不甚逺乎蓋惟聖賢然後能權去就之義而不失其輕重之宜故不以一身之利害而易其天下國家之計也此所謂盡大臣之道而天下後世無得而議焉者乎嘗反覆君奭一書逺述有殷之六臣近詳文王之五臣曰若游大川而暨汝奭其濟曰汝明朂偶王在亶乘兹大命至襄我二人篤棐二人拳拳言之而不自知其辭之復也周公廣大公平之心而為宗社無窮之計者其慮深逺矣夫豈世之專權固位而惟恐同列有簡之者乎嗟夫惟大臣有至公之心而後能盡待同列之道然後能不止為一身之謀彼世之所謂權勢者視之若浮雲之無有豈足一動其心哉今之所以决於去他日之所以果於留曽有一毫係纍之私乎嗚呼此周召所以為一代之宗臣歟後之為大臣者可以為鑒矣篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾大臣協力以事人君而致其已然之效尤當勉力以紹前王而成其未至之功蓋輔君以廣前人之業者非大臣一人之所能致也茍不與同列而叶力則不足以成其功是以一人去之而一人留之其拳拳之情自有不能己者昔召公之告老而去也而周公留之謂能篤於輔君者惟我與召公二人而已今日之治至於休盛亦惟我二人用能有以致之也然已然之效既出於二人之協力則其未至之功又豈可不相與勉力以共成之哉周公之業始於文王我與召公共成文王之功業當相與勉力而不怠必使天下之民莫不歸於覆冒海隅日出之地無不為之臣服庶乎其可也吁敘其所以然而勉其所未至召公其不悅而從之乎云云蓋嘗求周公召公之所以為人臣者矣成王以幼冲之資嗣天子之位而周公召公同受武王顧命以佐右之故周公為師而召公為保其任大責重非若平時之為大臣者也當成王未親政之時固不敢以乞身一旦政柄有歸浩然去志亦人情之常耳然思前王功業之未成念今嗣述之無助則召公義未可去况周公與召公乃同功一體之人於其去也得不反覆告諭以留之邪且周公未嘗有其功今乃以篤棐而自任以今日休而自譽誠以其留召公而言不得不敘其已然之效蓋篤棐云者同心協力以佐天子之謂自今日而觀之流言之禍已息而無復震撼之勢成王之年已長而足任守成之責燦然而紀綱布煥然而禮樂興其治功之休盛如此孰非我二人篤棐之力用能有以致之哉召公之去也豈不曰盛滿之勢不可以久居權要之位不可以不避而周公之意則不然普天之下有一民之不安不足以成文王之功率土之濵有一國之不服亦不足以成文王之功今日之休盛既以我二人篤棐則其未至之功亦當並力一心相與盡贊輔之道竭忠效職不可有自怠之意觀其一則曰我二則曰我則其以天下為已任者為何如誠以文王之時大勳未集今欲成其功必也大覆冒斯民使海隅出日之地無不臣服而後可以無愧於文王日出云者周都西土去東為逺故以日出言以日出之地而臣服則治功之成也可知己始之以篤棐既有以致其已然之效終之以不怠又豈不足以成其未至之功周公之言懇􅋀委曲如此召公其可以去哉厥後召公既相成王又相康王再世猶未釋其政此蓋有味於周公之言也夫雖然洛邑告成周公亦嘗有歸老之志矣而成王留之有曰四方迪亂此即敘其已然者也又曰迪將其後此即勉其所未至者也然則周公之所以留召公者其亦述成王之所以留己者而留之與嗚呼君臣同列更相舉留互相推美周家太平氣象猶可慨想於千百載之下多方慎厥麗乃勸厥民刑用勸以至于帝乙罔不明德慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸先王本於仁而謹諸身既深足以勉其民後王推是心而施於政亦皆能以勉其民蓋仁者人心之同好而王者之所依也為人君者誠能即己之所依以勉人之同好而人焉有不從者哉昔者成湯之化天下也惟深謹於仁以勸勉之而已於是天下之人亦儀於湯而用以勸勉是其仁民之心能謹諸身而深足以勉其民也自湯而下至于帝乙雖世不同然或明其德或慎其罰尚亦能用以勸勉也於慎罰之際或辟之以當其罪或宥之以赦其過尚亦能用以勸勉也蓋明德者仁之本慎罰者仁之政辟而當罪仁者之能惡人也宥而赦過仁者之能好人也其為事雖殊而其為仁則一故亦皆能用以勸勉也然則人君所以勉天下者何必同亦惟曰仁而已矣嘗謂仁者天地生物之心而人所得以生之理也君之與民同有是心同具是理則亦同有是仁但衆人不無物欲之蔽故雖有是仁而不能勉之於己聖賢則無物欲之纍故能推是仁以勉之於人彼惟同有是仁而吾所以勸勉之者又無一事之非仁則其翕然而從同體而化固有不期然而然者當商之時成湯所以勸勉其民者豈有他哉亦惟深謹於仁而已湯之心豈不曰君之依於仁猶木之依於土魚之依於水不可須臾離也而豈容其不慎哉是故昧爽丕顯戒謹於不睹不聞之時無一念而違於仁日新又新持守於終食造次之頃無一事而違於仁湯之謹於仁者如此豈所以獨善其身哉政欲率天下以歸於仁而勉天下以復其性也於是在商邑而用協于厥邑是商邑之民皆儀刑於湯而自勸也在四方而用丕式見德是四方之民皆效法乎湯而自勸也湯之仁深足勉其民者既如此然而不止乎湯自湯而至于帝乙凡能勸勉其民者非止乎一君凡其勸勉非一事而斯民亦皆從之者以其同出於仁故也是故或恐懼修省以明其德而仁之本以立或哀矜惻怛以慎其罰而仁之用以行於是德無不明而民愛慕之罰無不慎而民畏服之愛慕則有畏起之心畏服則有懲創之志是我之明德慎罰亦能用以勸勉之也然德則明之而已罰則有辟焉有宥焉焉往而不出於仁哉何以言之彼要囚者罪之明惡之著情之所不矜法之所不疑茍惟宥之是長惡而害於仁矣於是殄之戮之而天下之人皆知惡之不可為而勉於不為是辟之當罪者尤足以勸勉之也彼無辜者或出於過誤或出於不幸情之所可矜法之所可疑茍為戮之是苛虐而傷於仁矣於是開之釋之而天下之人皆知善之可為而勉於自為是宥而赦過者又足以勸勉之也有商後王之仁皆能以勉其民者又如此蓋嘗論之慎厥麗乃勸者心與仁為一而厥民刑用勸者其功深明德慎罰而或辟或宥者事與仁為一而亦克用勸者其化淺雖其功化有淺深之殊然自勉而言則未有勸之以仁而民不從之者也當成周之時商奄之民屢臣屢叛而反側不安原其所以蓋不知天命之歸於有仁而欲以不仁妄干天命也周公於是以成王之命作多方之書推言成湯至于帝乙能受天命而有天下者以其勉天下以仁而民從之也至于商紂弗克用爾多方享天之命者以其率天下以不仁而民亦從之也雖然斯言也豈但足以釋商民之心哉凡惟斯民之君師而欲勉斯民之為仁者皆當以是為龜鑑惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方聖德足以任兩間之重天命所以受一統之尊夫聖人位於天人之間下有以得民心則上可以事天上有以得天命則下可以治民然非聖人足以勝其任則天亦未必輕授之也昔周文武下則善承于衆而得民心其能勝用德之任可知矣故可以典神天而無愧上則式教用休而得天命其能膺簡畀之責可知矣故可以尹多方而不慚聖人之德著於天民之兩間宜其奄有天下而為一統之君也多方曰云云以此夫天生聖人而使之君天下者上則以之事天下則以之治民聖人中立於兩間而能仰不愧俯不怍者以其有德也下足以順民上足以配天則天命歸之矣故傳有之曰有大德者必受命夫德固得於天也克堪其德然後謂之有德命固本於天也能大其德然後可以受命是故謂之靈承謂之克堪此言人之德也謂之式教謂之簡畀此言在天之命也有是德則有是命矣祀天而曰典治民而曰尹非天有私於聖人也惟聖人之德足以當其任也且夫天之生民必立之君君之治民必有其德然天下如彼其廣也生民如彼其衆也欲人人而被其德非聖人則有不堪其任者矣惟我文考小民則有懷保之恩惟我寧王萬姓則有悅服之意故曰靈承于旅謂之靈者無一毫之不善也謂之承者無一事之不順也謂之旅則溥天率土無一夫之不獲矣昔也眷求民德鮮克舉也故無有能順民心者今也勤用明德文顯于前王惟德用武承于后文武用德克堪弗任民之德君固在此矣神天之主其不在兹乎聖人之德在兹民矣神天之心其不在兹民乎聖人之德能順乎民信可主乎神天矣是故聰明齊聖天縱之也耿光大業天誘之也然天之所以教聖人者非諄諄然命之也其思也靜與天俱若或起之於其前其行也動與天合若或翼之於其後聖德日新左右逢原故藴於內也有以極其美暢於外也有以極其盛嚮為殷命欲墜簡閲而無以堪其任天命有在篤生聖人付畀之責有不得辭故以之尹爾多方之衆非我有周之私也天也曰我曰爾分殊而情親周公奉若王命藹然見於言意矣嗟夫承天之典天非有意於聖人也善承于兹而民心歸之多方之尹聖人非有心於天也簡畀殷命而天命歸之天之於聖人豈有一毫私意哉因其克堪用德故式教用休不得不在聖人也天命未歸聖人得以盡其靈承之心殷命既革聖人不得不任其尹爾之責兩間之重聖德既有以任之一統之尊天命其得不授之乎上而天命下而人心不惟有周而然慢神虐民有夏不能保天命也眷求一德俾作神主不得不歸之湯多方之民雖或不知文武之心其不知成湯之心乎殷鑒不逺在夏后之世周公之言懇切如此四海之心必有以讋服之矣爾乃自時洛邑尚永力畋爾田夫惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚王者之喻其民既歷舉其獲利之端而後勉其得祿之本蓋祿者人之所欲也以其所欲者而開導之其不歸于美者鮮矣在昔周之明王因民之不服而訓喻之爾民之茍向於善也則自時洛邑可以保其業而力畋爾田矣不惟是也天亦將矜憐於我矣我有周亦將介賚於汝啓迪簡拔而置之王朝矣所以利益於汝者既如此其至在汝庶幾勉爾之事惟有服在大僚蓋益不難而至也噫誘掖於其前而勉勵於其後化民之道其至矣哉嘗謂化民之道以逆心之言而訓之則民不服以遜志之言而喻之則民易從在凡民且然况於梗化者乎觀諸有殷可見矣祖乙圮於耿盤庚遷於殷民之不服者蓋不勝其衆也盤庚喻以遷之為利不遷之為害慈祥惻怛以口舌而代斧鉞然後當時之民翕然而順從是遜志之言固足以得民心之服也繼盤庚而後吾於成王見之夫成王當重熙纍洽之運而為持盈守成之君蕞爾殷民梗化不服成王思其迫之以勢力則有所未宜加之以刑罰則有所不忍則有丁寧反覆而告諭之可謂善於訓民者矣觀其告諭之辭若曰咨爾多士如其釋然而悟焉則庶其子子孫孫安居樂業於此洛者固必然之理也如其幡然而悟焉則庶幾繼繼承承而服田力穡於此洛者必然之勢也所以利益于汝者既如是矣將見彼蒼者天亦將仁愛於汝而坐享其安寧之福皇皇上帝亦將矜憐於汝而無復有短折之患天之所以與汝者又如此其至惟有我周又可以背逆於天而降割於汝哉必也助汝以衣食而使汝得以安其生錫汝以土田而使汝得以享其利旁求俊彥以布於朝廷敷求哲人而列於左右利益之端如是其衆則爾之殷民可不勉爾之事而為受爵之地乎必也克勤乃事而無進鋭退速之心恪恭乃職而無始勤終怠之志其如是則夏迪簡在王庭有服在百僚爾民嘗以是而責周今也非獨有夏為然我有周亦復然矣非特百僚雖大僚亦不難至矣由是以窮之所養為逹之所施無所往而不可也茍為不然迪屢不靜豫亦致天之罰于爾躬矣尚何利祿之有哉或者則曰殷之頑民漸摩於文王武王之澤者不為不深涵育於周公成王之化者不為不久而回心向慕之意曽不少見必待多士之書誥於前多方之書繼於後然後服焉其故何哉蓋不服周者非有所恃而然也以殷先王德澤之深也其卒然服於周者非有所畏而然也慕周家忠厚之至也論者曰三代有道之長吾於此而尤信立政文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違聖人有知人之明乃能得賢才之實故聖人盡信任之道惟謹其勸戒之心蓋惟其知之也深故其信之也篤矣昔者文王惟能其三宅之心乃能立此常事司牧人而所用皆能俊有德之士矣是以其於庶言庶獄庶慎惟賢才之是任而文王無所兼焉惟於有司牧夫訓勑用命及違命者而已豈非聖人之心能明於求賢之先此其信任之心自能逸於得賢之後其知人而能官人也歟嘗謂知人難事也而能官人者尤難也人君知之不明則無以見賢才之心而所舉或非其人者有矣信任之道不專則下侵衆職而賢才不得以施其志者有矣是以知人則哲禹之所以為難也任賢勿二益之所以為戒也茍非盡知人之明而欲求信任之逸吾未之聞也繼禹益而後能兩盡其道者其惟文王乎且文王於賢才之心知之何其明信之何其篤也耶所謂克厥宅心者不啻肝膽之相照也不啻心腹之相孚也蓋文王之心即厥宅之心而賢才之心亦何異於文王之心哉然文王既能知之得不用之乎於是在內則立之以常事之職所以宅其事在外則設為司牧之官所以長其民自上而達乎下以卑而承乎尊無非尊賢使能俊傑在位凡有德之人皆在官使而文王於此自可以無所事事矣蓋文王既能得賢才之實則位必得其人人必稱其職而文王得不盡其信任之道乎是以號令雖出於君而奉行者有司牧夫之任文王無所兼焉典法雖受乎上而斷獄者有司牧夫之職文王何所與焉夫禁戒之令儲備之需又承流宣化者之所當先而文王又何所容心於其間哉然而設官分職者雖貴於得賢才之實而或作或輟者尤不可無勸戒之心此文王於黜陟之間考核之際惟知訓之以休使用命者有所勸董之以威使違命者有所懲而後文王之心得以自盡而賢才之心亦得以自盡焉耳吁君臣同心而異體上下同心而異用文王能以賢才之心為心則賢才得不以文王之心為心乎由此觀之則知人者得賢之本而勸戒者又豈非用賢之本乎嘗考立政一書周公告戒成王用人之道也然原其意則莫重於三宅之選又皆以心言者何也蓋人君之所以能求賢者以心而賢者之所以能效職者又未必不在於心也雖然上言三宅而此不及準人者豈非因上文方論文王用人之道而此特申克知三有宅心之說故略之歟嗚呼微矣書義矜式卷五
