body:
  text: 書義矜式卷六元王充耘撰周書周官唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧莫善於堯舜官人之法莫大於堯舜安民之功夫官人之法非堯舜所自為也上考於古人而官得其要安民之功非堯舜所自能也下總於大臣而民得其安蓋能官人能安民者堯舜之仁合之與仁而後可論唐虞之治夫堯舜之知以其不自用而取法諸人也堯舜之仁不遍愛人急親賢也不自用而取法諸人是以官百之建必稽於古不遍愛人而急親賢是以內外之治必總於大臣蓋不稽於古則不能以簡而御煩不總於人則不能自近而及逺一則知人之哲也一則安民之惠也非堯舜其孰能之或者謂古之時官以雲紀而未嘗有百揆四嶽也官以鳥紀而未嘗有州牧侯伯也則是曰揆曰嶽曰牧曰侯此唐虞之制而非古之制也則未可以為稽古也抑孰知稽古稽其實不徇其名求其心不泥其迹吾想古之時太朴未散風氣未漓其建官有甚簡而政治有甚隆者此後世所不能知堯舜所獨知是以天下雖廣而建之官惟止於百是唐虞之稽古非若後世之泥於古也堯舜以一心之微而蒞乎百官之衆安得人人而總之內焉而總治有百揆四嶽也而堯舜無與焉外焉而總治有州牧侯伯也而堯舜無與焉所謂有者非徒有也是人有才足以勝位也而非虛位也非徒有是名也其德足以稱職而無曠官也堯舜所建之官雖極於百而內外總治之職咸有其人此非所謂能官人者歟於是曰百揆者亮采惠疇而天下無廢事曰四嶽者賔于四門而天下無凶人州牧則曰食哉惟時而十二州之民各得其養侯伯則曰各迪有功而五服之諸侯各敬其事內外相承而體統不紊如身之使臂臂之使指以言庶政則九功惟敘九敘惟歌而庶政和矣以言萬國則五服四朝黎民於變而萬國寧矣此非所謂能安民者歟世未有能官人而無安民之惠者亦未有能安民而非知人之哲者歟能哲而惠吾於堯舜見之堯舜之能哲而惠是必於古人得之故方其建官也都俞吁咈不使一職曠堯舜之心惟恐其不如古及其至也垂衣拱手無為而天下化唐虞之治復何愧於古哉降自夏殷而官數加倍是未能如唐虞之簡矣論其治功則曰亦克用乂是未能如唐虞之盛矣成周之制建官三百六十而其職愈多世變事繁而其職愈重然則三代之制非不欲稽古也不幸而居唐虞之後三代之治非不欲如唐虞也不幸而去古之逺世道之降帝王之分嗚呼甚哉立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人建大臣以任其參贊之職者其選嚴命大臣以佐其參贊之職者其責備蓋明王之設官分職無非欲其參贊天地之化育大臣之參贊又烏可無其二哉故其弼成於後者正將以助大臣之有所不及耳昔者周家建立三公之官以講明隂陽之道經理邦國之大而盡其燮理之職其任至不輕也茍非其材則豈足以任此職乎故不必其官之備而惟其人之賢則夫二三公以範圍天地之化而張大之者以其有三孤在焉耳自三孤之特建也以之寅亮乎天而仰不愧焉以之寅亮乎地而俯不怍焉則其弼一人之道亦無間於三公矣吁三公論道而既重其職於前三孤𢎞化而復備其責於後古之人所以能與天地參者其以此歟云云見於周官之書其意以此嘗謂隂陽之道非人則不能以任其經綸之責天地之化非人則不能以致其張大之功上而一人次而三公其事皆所當任者也然一人不可以無弼三公不可以無二特建夫三孤之職實所以上弼一人而下二乎三公者也茍惟三孤之名不定而使之屬於三公則其將助三公所為之不暇又何以事其已職之所為乎吾由是而知建官之制至於成周而無弊也今夫三公之位而謂之立者何也蓋始辭也三公雖非始於此時而立為周家之定制則始於此時也師道之教訓傅之德義保之於身體名雖不同而其人皆未易得也是故三公之於斯道既講明之復經綸之而必盡其燮理之妙焉蓋隂陽以氣言而道者隂陽之理恆而不變者也易曰一隂一陽之謂道者是也然經綸之用藏於無迹和調之妙間不容髮又何待於論耶蓋論之云者擬議以成其變化講明啓沃而精一之也茍非經綸天下之大經參天地之化育者其孰能與於此故曰官不必備惟其人蓋古者建官惟賢况以三公之尊位而不在於得其人乎位事惟能况以三公之重任而不求其人以稱其職乎與其茍且是官以充員孰若闕其職以待其人之為愈也茍惟其人則官固無害於備亦無害其為不備也三公之官夫既不求其備矣則夫二三公而謂之少師少傅少保者容可不特建其職而定其名乎夫謂之三少者特其名數少貶而非遼絶於三公者也謂之曰三孤者以其名位特立而非統攝於三公者也一則經綸於前而一則弼成於後此公孤之職所由分也夫天地以形言而化者天地之用運而無迹者也易曰範圍天地之化者是也𢎞者張而大之之謂寅亮者敬而眀之之謂三孤之於天地之用既張而大之於天地之形復敬而眀之則其弼一人而能盡其道矣茍職之不專名之不立責之不重則何以成其𢎞大之功而致其寅亮之實也哉抑嘗考之三公之設其法已久至成王而始參定以為一代之定制耳夫茍立之為定制宜其有定人矣而周公為師召公為保僅見於載籍之傳而傅無聞焉其後周公既沒則以召公為保而已而師亦無聞焉何哉蓋非常之任所以待非常之人惟其非常之人而後可以當非常之任三公之不必備者所以難其人也於是而三孤立焉所以二三公而必重其責也故太儀所掌有孤伎焉朝士所掌有孤位焉正之必有其二三公既難其任而三孤則能分其任矣成王訓迪之際既尊三公之至而欲不敢以身煩之者弼豫一人之語成王不與三孤言之而誰言之耶雖然周官一書與周禮正相為表裏周官所載自公而孤自孤而卿而於公特言其不必備矣未始無常職也而周禮所載惟止於師孤亦不言是必有其説也蓋公孤無職卿則分職公孤命道而卿則行其道也公孤是未定之佐卿乃不易之官或以卿而兼公孤之任亦不害其為官之不備矣噫論至於此則周人立官之深意豈不復明於千載之上也哉內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧內外之體統不紊則逺近之治效無間此唐虞之盛所以為不可及也夫朝廷之上莫先於百揆百揆既宅而又承之以四嶽則內足以統夫外矣九州之內莫重於州牧州牧既置而又參之以侯伯則外有以承乎內矣內外之體統既立由是而施之政事則政雖不一而無不和由是而推之天下則邦雖有萬而無不安凡其庶績咸熙而黎民於變者皆由其內外之相承體統之不紊也成王訓迪厥官而有及於此其亦知所慕者歟故曰云云嗟乎天下之大人君以一身而加於億兆之上天地賴其位萬物賴其育三綱五常五禮六樂無一事之非吾責也唐虞之時徒見庶績凝而萬邦寧遂以為聖人垂拱無為之所致嗚呼是豈知聖人維持當世而措天下於平治之故哉天下之理變而後通作而後應未有不勇於有為而後能安於無為者也不然堯以不得舜為己憂舜以不得禹臯陶為己憂凡其孜孜焉命九官者果何為耶自今而觀越在內服百揆既敘則自天子而下凡天下之事無不在所揆度矣四嶽既布則自百揆而下凡州牧之官無不在所統率矣先之以百揆次之以四嶽其內外體統為何如越在外服既領之以州牧又分之以侯伯者蓋天下之州有九州立之牧則侯伯有所屬矣天下之爵有五命侯及伯則州牧有所托矣夫既先之以州牧而又次之以侯伯其內外體統為何如夫惟內有以統乎外則上之臨下猶身之使臂外有以承乎內則下之事上猶網之在綱夫如是政事雖多其有不和者乎萬邦雖廣其有不寧者乎且見於設施者謂之政布於天下者謂之邦一事之乖其禮非和也一物之失其性非寧也今也不惟一政之和而無一事之不和不惟一邦之寧而無邦之不寧其治效之無間者如此推原其故蓋有在矣曽謂不能正內外之體統而能致其治效之如此乎其唐虞之際於此為盛而成王言之以訓迪厥官蓋知所慕矣且成王以幼沖之資持盈寧之運以言其內則冢宰之統百官者既無異於百揆以言其次則六卿之分職以率其屬者又無異於牧伯彼其時異事殊雖其官三百六十者若繁於建官之惟百然其制禮作樂而天下太平者乃與庶政之惟和者無間也既奏太平而皆有士君子之行者與萬邦之咸寧者無愧也後之論者謂太和在虞周豈無謂也哉明王立政不惟其官惟其人人君致治之要不以備官為貴惟以得賢為先蓋設官所以任庶政茍非其人則不足以勝其任也是以成王訓迪百官謂夫古之明王有以立天下之事也非以其官之多以其得人而已耳夫茍得其人以任衆職則天下豈有不立之事者哉然則人君之建官亦惟取法於眀王立政斯可矣聖人知天下之事非一心兩目之聰明能辨故設官分職以共治之然事幾之來無窮任使之設有限茍一官之不備則一事為之不修未有厭其繁而求簡者也豈知億兆夷人不足以救商之亡而亂臣十人反足以致周之盛審如是則建官者將以多為貴乎抑亦得人為重乎蓋世有非常之事必有待於非常之人得其人則一人任之而有餘非其人則雖衆人任之亦不足古之明王能使上無廢事者本於下無遺材初非有他道也是故綱紀法度之昭明禮樂刑政之修舉朝無廢墜之典外無失職之民人孰不曰此明王之能立政也殊不知人君髙拱南靣而深居九重所賴以燮理隂陽而整齊庶務者在朝之三公九卿也所藉以宣明教化而惠安黎元者在外之州牧侯伯也聖人惟責成於庶官未嘗以君行臣職也然而三公九卿非取其充位而已必其德之足以勝此職而無慊也州牧侯伯非徒取其備員而已必其才之足以稱此任而無愧也夫然後內焉得人而在內之職無不修外焉得人而在外之職無不舉唐虞官百而庶政惟和夏商官倍而亦克乂用皆以得人之故也豈徒備官而已哉蓋嘗因是而論之懦夫不足以舉千鈞必烏獲而後可駑馬不足以致千里必騏驥而後可常人不能以立政必賢能而後可是以伊尹之訓太甲必曰任官惟賢材左右惟其人傅説之告髙宗亦曰官不及私昵惟其能爵罔及惡德惟其賢武王勝商而致垂拱無為之治亦本於建官惟賢位事惟能而已然則惟官擇人誠立政之要務古之明王率用此道也宜成王訓迪百官而首明乎此且於三公之下復拳拳於官不必備惟其人之語焉其丁寧之意至深切矣後之人君可不深思而敬守之哉司徒掌邦教敷五典擾兆民人君命臣以敷教其要在於明人心固有之天以化天下不順之民而已夫教化大行而風俗丕變此人君之所欲也然非有臣以掌之其可哉是以訓迪百官於冡宰之後即繼之以司徒之官司徒之官以司教為職者也其要豈有他哉五典者人心之所固有敷而明之則教化為之大行兆民之有不順者則擾而馴之則風俗為之丕變如是而後能稱厥職也此一人設官之意故於此别白言之而古人委任責成之道於此亦可見矣云云古之聖人能使化行俗美舉一世之大皆納之太和雍熙之治而羣黎百姓皆同為和順輯睦之歸者豈有他哉其要在於施教之有其人而已蓋人之氣習固有不同而其天性本無不善順其性而導之則易為力逆其天而強之則難為功吾惟迪其固有之天以變其不化之習則人無不順者矣此司徒之職所以為教也夫六卿分職各有攸司司徒掌邦之教令治化盛衰之所關民俗淳漓之所繫也其所任不亦專乎所職不亦重乎然而孩提之童孰不知愛其親及其長也孰不知敬其兄人均此生則均此稟受性之善猶水必下果安有不順者哉然而有不順者何也氣稟之偏拘之於其前物欲之蔽汨之於其後始有昧于其理而不相遜順者故立之司徒使敷教焉父子欲其有親君臣欲其有義夫婦欲其有别朋友長幼欲其有序有信漸仁摩義使凡不相親者於是而相親道德齊禮使凡不相睦者於是而相睦如是則悍可使柔戾可使和而放僻邪侈者可使之循規蹈矩夫豈待刑驅而勢迫也哉蓋薰陶漸染之既深則其天性之真自然呈露有不能己者矣昔者唐虞之時黎民於變比屋可封人皆知其治化之不可及也而豈知夫勞來匡直使自得之汝作司徒敬敷五教在寬堯舜之所以拳拳於司徒者為何也成王訓迪百官而亦致謹於司徒之職宜其太和之治無愧於唐虞也歟彼謂威刑足以操致一世視教化為末務者惡足以語此戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱賢君勉衆臣必以功業貴乎篤志力行以圖其效尤貴乎當幾善斷以慮其終蓋功業之成甚難有能篤志力行固可望其效而當幾不斷則其終正可慮也是故成王之申戒卿士以為成其功者存乎志廣其業者存乎勤爾卿士惟志惟勤二者兼盡方有以廣其業而崇其功焉然猶未也日用事為各有其幾惟能如此而果斷然後志與勤不為虛用而無後艱之可慮矣此無他人臣之功業無志而不勤不足以為其事無斷而失幾又不足以底其成也云云嘗謂有天下者之建官分職固望其共圖功業也君于立乎本朝亦豈不以功業自任哉然天下之事起於志遂於勤而成敗之分又在於審其幾也志之所向非苟且而淺近固可以建功而立業勤之所務非勉強於一時固能以建功而立業而事幾之來者不決則雖有志勤終不能免後艱之患矣果能篤志力行而又當幾善斷抑何功之不崇何業之不廣歟又何後艱之足慮歟一有不至則君之望於臣者孤而臣之所以自任者亦荒矣此成王之訓迪百官分命於前總戒於後而又申戒於此其致望於卿士者何如也今夫周有六官周之卿也六官之屬周之士也凡其治教之所專禮樂之兼務兵制之並列邦土之獨任皆卿士之職也何莫非業何莫非功也今王之申戒卿士豈不謂忠國匡君之功業爾卿士之所當為伊欲功崇業廣惡在他求惟志惟勤而已功者業之成業者功之積本非二道勤由志而生志待勤而遂亦非二致卿士職任雖有大小之殊而朝廷功業舉無可廢之典其或未能奮庸熙帝之載未能欽亮天工志不立而勤不施必也立志超卓堅如金石夙夜孜孜克勤無怠則為篤志力行而積業成功之效可圖矣然嘗求之志定於中勤施於外固若業之成者易以崇功之積者易以廣而要其終猶有後艱何哉蓋幾者吉之先見而斷者人之明決茍於事為之幾含疑猶豫優柔而不斷則志雖髙逺虛用其志勤雖勉勵虛用其勤功之積者難廣而業之成者難崇非後艱之可慮乎必也震厲決斷之以心使志與勤不為虛用則為當幾善斷而積功成業終無後艱之可慮嗚呼成王之於卿士憂之深故言之切慮之逺故説之詳蓄疑敗謀怠忽荒政上章既戒之矣于此又反其辭而言之惟志惟勤所以救怠荒之失而免荒政之罪惟克果斷所以破蓄疑之害而救敗謀之愆傳者謂之申戒卿士其意深矣雖然為卿士者固當立志於勤為君者尤不可無志而不勤為卿士者固當見幾明斷為君者尤不可以不斷若徒諉其臣以忠國正君之功業而昧乎反身修省之誠則怠忽而蓄疑上行而下效將有不勝其害矣傳曰功以志崇業以仁廣斷以勇克知仁勇三者天下之達德也豈特卿士為然君陳昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂惟前人極教養之德故沒世而民不忘後人盡繼述之道惟率乂而民亦治蓋前人之德民之所仰慕者也後人能因其所思以治之宜其翕然聽順矣成王之命君陳以為昔者周公之治此東郊也為之師以教之為之保以安之故周公雖沒而民方思慕其德而未已也今君陳之往但當慎其所司之職循其典常之道勉明周公之舊訓則民亦將自然而治矣吁周公之德民之不能忘也若此為君陳者寧不思所以慰斯民之望乎云云嘗謂時有先後而所以致其治者無先後之分民有近逺而所以得其心者無近逺之異則治不可以先後論也民不可以近逺觀也惟在於繼前人之志述前人之事者如何耳蓋紀綱法度之施禮樂教化之用前人以之而服斯民之心者也繼前人而往者寧不思所以推其德而不易其心勉其訓而不移其用則前日之治即吾今日之所以治者矣而况東郊之地頑民之所居也周公懼其弗順而盡其教養之恩斯民思周公之沒而懷其教養之德此成王所以重其任而有君陳之命焉使君陳而能取法乎周公則民之從君陳者將不異於從周公矣且成王之心何心哉方殷頑民背叛之時周公遷于洛邑使密邇王室當是之時周公有師之尊有保之親式化厥訓所以教之也綏定厥家所以安之也周公之德其及於民者若此今周公沒矣則東郊之民寧不戚然於心乎動靜食息未嘗不懷周公之德出入起居未嘗不思周公之訓如飢者之欲食渴者之欲飲不啻大旱之望雲霓不啻赤子之慕父母今君陳之往治此東郊也將何以慰斯民之望乎謹毖殷民周公之心也汝則慎之以為職厥若彛及撫事周公之志也汝則率之以為常殷民之所不能忘者正在於周公之訓君陳茍能即其訓而勉明光大之則君陳之心即周公之心而今日之治又豈異於前日之治乎殆見東郊之民如行者之赴家食者之獲飽鼓舞羣動和柔委順自有不期然而然者矣曰懷曰德者所以明周公之得民心者在於德曰慎曰率者所以明繼周公之治者在於君陳由此觀之則知周公以斯民為心故其沒也民以周公為心君陳能推周公之心以為心則民將移其所以懷周公者懷君陳矣嘗考之經成王之望於君陳者不特此也下文既舉周公精微之訓以告之矣尤必繼之以爾尚式時周公之猷訓於其後也又重之以爾惟𢎞周公丕訓反覆丁寧其望於君陳者無非在於周公之訓為君陳者得不思所以繼周公以復成王之命乎厥後康王稱周公克慎厥始君陳克和厥中則君陳之在東郊果無愧於周公之治其亦有味於成王之言也歟抑又論之成王之命君陳也固在於周公之訓而康王之命畢公也亦未嘗不在於周公之訓也其曰不由古訓于何其訓則知君陳能𢎞周公之訓而畢公又當𢎞君陳之訓矣以故三后協心而洛邑之治為不可及也欲觀成周之家法舍是何以哉凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草賢君勉大臣以由聖既以常人之情為戒復以德化之機為喻也徒知慕聖人於未見之先而不能由聖人於既見之後者常人之情也為大臣者以之為戒焉則下民皆將興起於德化之不暇矣成王命君陳分正東郊謂凡人之未見聖也其心慊然若不能以見之及其既見聖人也則又往往不能由其道焉君陳親見周公當深以為戒也以不克由聖為戒而動必由夫聖焉則感應之機如風行草偃之易有不期然而然者矣爾君陳能由周公之訓則彼下民者其有不從君陳之訓乎深致其戒於前曲致其喻於後䇿命之詞可謂深切著明矣甚矣由聖之難而從化之易也均是人也難於由聖而易於從化者何哉聖而後能希天賢而後能希聖聖非凡人之所能也而下之從上則有不疾而速之機矣導之斯從倡之斯應此必然之理也成王其知此矣謂夫降𠂻秉彛人皆有之故當其未見聖人之先誰獨無願見之心也有願見之心而其自視則欿然若不能以見夫聖人焉豈不曰聖人首出庶物者也以吾之愚其能以見之乎又豈不曰聖人卓冠羣倫者也以吾之不肖其能以見之乎此凡人未見聖人之情則然也幸而仁義之睟盎者既得而瞻望之矣威儀之盛著者既得而親炙之矣以其平日未見聖人之先其慕之者若彼則夫今日既見聖人之後其由之者宜何如哉然降𠂻雖若有恆性而不能無氣質之拘秉彛雖同好懿德而不能無物欲之纍雖既見之而不克由之則亦為徒見而已此君陳之所當深戒也蓋君陳非常人比也嘗親見周公者也親見周公其可以常人自待其身乎周公之道爾君陳分政東郊者之所當由也狃於姦宄敗常亂俗欲其有以化誨之怙侈滅義驕淫矜夸欲其有以感悟之非可以刑驅非可以勢迫惟我君陳由周公之道以興起其善端耳由是言之君子之德風也爾君陳則惟風焉小人之德草也東郊之民則惟草焉草上之風必偃是在君陳而已愚故曰賢君勉大臣以由聖既以常人之情為戒復以德化之機為喻此之謂也考之上文其曰兹率厥常懋昭周公之訓欲其由聖也其曰式時周公之訓欲其由聖也一則欲其由聖二則欲其由聖非成王不能為斯言非君陳不足以聞斯言也異時道洽政治澤潤生民東郊之任視周公無愧焉謂非由聖之效可乎畢命資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓立教以保民生於既富之餘亦惟即理以稽諸古而已蓋斯民既富之日正聖人立教之時也昔者成王與康王之命畢公以為殷民非難化也惟能因其資富而後教之則必不遷於外物而可全其性命之正然後不可以外求而天理即所以為教惟德惟義民性之所固有而乃大訓古人之所共由不由古以為訓將何以為訓乎畢公持是説以教殷其必知所本矣嘗謂民生既富之後果可以無教乎曰逸居而無教則近於禽獸是不可以無教也謂即理以為教果可以不稽諸古乎曰善無徵則民不從是不可以不稽古也吁是固然矣亦豈知壽固不可以貪而得夭者不可以慎而免哉今論永年之道而本之德義之教毋乃拘乎蓋聖人之所承命非曰人人而至期頥也亦曰得其正命而已矣昔者康王閔富民之不知命也故謂殷民舊喪之久夭閼其生其與巖墻之不免而桎梏不能以自脫者皆非正命也為爾畢公合思所以永其年矣然天下憔悴無聊因無以為養生之具而匪彛滔淫尤有甚於飢寒之憂既富而不盡其教之之方於情欲日肆而無以全其生今而當富足之日而為之訓迪則衣食足而知榮辱矣倉廪實而知禮節矣永天年者有之凶短折者無之矣雖然吾心之理無餘理是理之不無德義德之與義人心所同自是理之外皆不足以為訓之大者也天之與我先立乎其大畢公欲知訓之所以大舍德義安之乎殷俗靡靡利口惟賢以薄陵德者有之怙侈滅義者有之德義不明非一日也爾畢公其將因其本然以訓之乎抑將外立條教以訓之乎訓民之道有所謂大焉者公知之矣况今人更三后世歷三紀殷民雖頑良心猶故未有觸之而不動者爾畢公其慎德義之訓耳然德義之訓古人所同今爾公居元老之尊雖以大訓為念而不以古訓為法則處畢公之前者其遺規餘畫無非德義之所寓一不加察則於己然之迹為有所戾而使斯民之無驗要不得為美化也兹所以復嚴於不由古訓于何其訓之語以堅畢公之心歟嗟夫君陳之分政東郊同此殷民也而成王命君陳之意與康后同一道歟觀惟民生厚因物有遷之語則知欲君陳之敷教以復民心之天也觀爾克敬典之語則知欲君陳有德義之訓若夫懋昭周公之訓又豈非欲其由古訓者乎吁君陳畢公之所化無異民而成王康后之所命無異意觀周家纍世之化則知周公矣君牙丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人前王重創業之勤既有以垂法於其後人臣任敷教之責當有以無愧於其先蓋立法垂訓固莫盛於前王而敬明乃訓在人臣不可不盡其美也不如是則何以對揚文武之光命而追配于前人哉昔者穆王命君牙以為大司徒謂夫文顯於前而有莫大之謨武承於後而有莫大之烈所以啓佑我後人者不惟皆出於正而已亦且致其周密而無或缺焉其所以垂憲乃後者至矣今爾君牙嗣守司徒之職豈有他哉亦惟取文武之訓敬而明之以盡施教之責焉則上有以不失成康對揚之意下有以追配前人事君之心而可以無愧於其先矣君牙之書云云古今天下之道有二焉曰創業守成而已矣周自文武創業於其前成康守法於其後治定功成禮備樂和則後乎此者將若何而繼之耶吁世有前後理無二致文武創業之盛固無以加矣而成康所以守成者别非一道也不過敬明文武之遺訓而已矣然成康所以能對揚文武之光命者豈成康自為之哉有臣焉以任其責而已耳君牙祖父篤忠貞以服勞王家豈其有成績以紀於太常其輔君之功施教之績昭乎其不可掩也為君牙者果能遵其道而不變守其法而不渝以無愧於乃祖乃父則為君者又果何愧於文武成康哉自今觀之光于四方者文謨之丕顯也率惟敉功者武王之丕承也文之顯者以謨即所以開武王之功武之承者以烈而皆本於文王之謀父作子述未有盛於此者本大末茂源深流長垂於無窮施之罔極固其宜也有典有則遺厥子後所以啓我者無一事之不出於正也樞機周密品式備具所以啓我後人者果何事之或缺也哉為司徒者固無俟乎更張改作以為功變亂刑政以為事肇修人紀經綸大經文武固有功綱常聖謨洋洋嘉言孔彰何莫非文武之大訓敬而明之存乎其人而已誠使惇典敷教任於己者恭謹而不敢渝則舊章成憲本乎先王者自昭著而不可掩前王之所以對揚文武之命者如此前人之所以左右乃辟者如此君牙而能如是則綱常之理為之大明而文武之道賴以不墜所以對揚光命者質之前王而未始有違所以左右乃辟者方之前人而未始有愧矣然則任司徒之責者將不在於敬明乃訓與舜命契以敬敷五教臯陶論典而歸之寅恭同一揆也嗚呼觀穆王之命君牙追述文武創造之難而拳拳求助於臣下以庶幾成康守成之丕績其亦有志於天下者矣何至末年肆其侈心巡逰無度幾失天下文武成康之遺緒至此而不念厥紹何哉人心操舍之無常觀此則可鑑矣吕刑惟敬五刑以成三德一人有慶兆民賴之其寧惟永法必謹所施有以全治道之不及則君民受其福可必其效於無窮夫王者之治以德為化民之本而必假刑以輔之其有關於君民者為甚重也故為臣者能敬謹以為五刑之施以成剛明正直之三德則法之所加蓋無不當者矣如是則君慶於上民賴於下而安寧之休可以永久而不替其為國家之福又豈有終窮也哉世無刑罰雖唐虞不能以化天下以其為治道之所關也然刑一也唐虞用之則足以致隆平後世因之或足以基亂無他敬與不敬而已矣蓋敬者用刑成德之本也德者出治之基刑者輔世之具道之以道而不足然後用以防之而非恃之以求逞也是以古人慎之重之蓋知夫死者不可復生斷者不可復續一失其當則民無所措手足矣為民上者使民無所措其手足則必並告無辜於上下神祗災異之來雖有善者亦將無如之何矣嗚呼刑者民命之所關亦國命之所係用之可不慎乎夫刑有五墨劓剕宫辟是也德有三剛柔正直是也非三德不足以制天下非五刑不足以成三德用刑者如之何而不敬也刑亂國用重典所以成三德之剛也然一有不敬則或傷於苛暴而不足以為剛刑新國用輕典所以成三德之柔也一有不敬則或失於姑息而不足以為柔刑平國用中典所以成三德之正直也一有不敬則或失於枉濫而不足以為正直惟能審操縱之宜權輕重之等使辟以止辟刑期無刑則刑之所加皆德之所寓矣夫如是吾見其好生之德洽於民心至和之氣充塞天地上則隂陽調而風雨時下則羣生和而萬物理一人垂拱於九重而天下同躋於壽域矣建丕基於不敝有不啻泰山之安保休命於無疆有不啻四維之固安寧之福夫豈一朝一夕而已哉吾今而後知明刑弼教非聖人之所可廢亦非聖人之所可恃所可恃者恃其有德而已矣蓋道之德教德教洽而民氣樂驅以法令法令極而民風哀哀樂之感禍福之應也昔周之初純任德教而司冦之設必惟其人有蘇忿生以居之於前有康叔封以承之於後式敬由獄長我王國夫豈偶然故成康之世刑措四十餘年而不用而忠厚之澤迄於季世而不衰穆王繼當耄荒之年而有吕刑之訓猶拳拳乎有德惟刑朕敬惟刑與夫哲人惟刑無疆之休之語其先德後刑之語蓋猶前日兹三代所以為有道之長歟傳曰泰和在唐虞成周又曰周過其歷有由然者矣秦誓人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉大臣好善之心誠而無偽則國家之福逺而無窮蓋得賢固所以為邦家之基况乎有誠於好善之人其能基國家之福也必矣宜古之賢侯所深思是人而用之以為人有才技乃能好之而若出諸己人之彥聖復心好之甚於所言斯可謂能好人之善而非出於勉強容受者矣誠如是則吾之子孫吾之黎民莫不有以蒙其休而被其澤其為利也豈淺淺哉好善之效如此云云大臣之一身國家之安危所係萬民之休戚所寄其所付託固重也所貴乎為大臣者不在於用一己之長而貴乎有以來天下之善好善優於天下而况於一國乎固可以建無窮之基可以受無窮之慶矣然則子孫基業不患其不固民生不患其不安所患者不得其好善之大臣耳於此有人焉人之有技技者人之能也在他人則媢疾之不暇而其好之乃若已有而無人己之分彥聖者人之德也在他人則違之俾不通矣而其心好之乃有甚於口之所稱初無彼此之間是人也真可謂休休樂善之人而非淺中狹量者比今謂之能容信乎其能容也夫如是吾見名一藝者無不容而智者皆得以效其謀占小善者率以録而勇者皆得以效其力上而朝廷無一事之不止其所下而黎庶無一人之不遂其生亦職有利信乎其有利而無害也穆公思賢若此其諸異乎人之求賢也歟抑是言也吾聞之矣又嘗見其人焉旁招俊乂列于庶位此傅説無欲而進賢也故殷之流風善政至於易世而不衰握髮吐哺以見賢士此周公無欲而進賢也故周之泰和盛治逮於東遷而不泯穆公悔用新進而思老成故拳拳及此思得是人而用之惜乎其志之不遂也不然擅秦之強得一士焉可以為政於天下矣豈區區西戎之霸而已哉君子曰知之非艱行之惟艱信乎書義矜式卷六
