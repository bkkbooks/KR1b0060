body:
  text: 書義矜式卷二元王充耘撰夏書禹貢冀州既載壺口治梁及岐既修太原至于嶽陽覃懷底績至于衡漳表紀州而不言域以示京畿之尊論治水而先𨗳河又詳其施功之序此禹之受命治水必始於帝都也而况河水之患在所當先治者乎則因其勢而順治之者亦各有其序矣冀州三面距河而此不言疆界者所以尊京師也所以示王者之無外也禹之受命治水固必始於此矣既載壺口以疏河勢治梁及岐以開河道則𨗳河之功是所當先也太原則既修矣而至于嶽陽焉覃懷則底績矣而至於衡漳焉則汾漳皆入于河也是非因其勢而順治之乎然則表京畿之域不得不異於餘州紀治水所當先因有以明施功之序觀史臣序述之法而可見禹之功矣云云嘗謂禹之别州若兖之濟河則以二水别之也青之海岱則以山水别之也若荆及衡陽為荆州則又專以山别之矣餘州所至或以山或以水太抵皆有所限也至於冀州獨不以限言者豈京畿之地非他州所可例乎禹之治水也當其懷山襄陵浩浩滔天下民其咨非止冀州而已也而受命治水之始於此豈不以三面距河而當在所先乎然人徒知其不以限言者帝都之無外而不知自餘州所至而觀之則帝都之疆境以明人徒知先於帝都者受命之始而不知九州之水莫甚於河患則其施功固有序讀禹貢之書求禹貢之序冝亦詳於冀州之域矣而禹别冀州乃獨不以疆域言也若周禮職方河內曰冀州亦可矣禹别九州乃以疆域論也亦豈無其故哉蓋曰八州之域皆以疆界言矣則冀州之不言者豈不可以餘州所至而見乎况京師為四海之朝宗則又豈可以疆域言而同於他州也哉王者以天下為一家則又豈可必以疆域限而外於他州哉禹之受命治水必於是焉始而河之為患蓋在於是焉壺口為冀州之山而當河水之下流也梁岐亦冀州之山而亦河水之所經也謂之既載則經始治之而有以疏殺河勢也曰治曰及又以見其既事壺口乃即治梁及岐也昔也河流激蕩震動天地今則治之及之而有以開其河道矣河勢既殺河道既開則𨗳河之功非所當先者乎太原乃廣平之地而嶽陽又冀州之山鎮一則曰既修非因鯀之功而修之乎汾水出於太原者必經於太嶽乃東入於海則必至於嶽陽而後汾水得以入河也覃乃河內之平地衡漳又清濁之異流一則曰底績非以平地致功為尤難乎然漳水東北至於阜城乃入於北河則必至於衡漳而後漳水入於河也然則𨗳汾漳以入河者又何莫非因其勢而順治之哉於是而冀州之域始定冀州之水皆治施之天下皆以為凖矣故自冀而東兖則疏河之下流也青則疏濟之下流也徐則淮之下流也揚又江漢之下流也由冀而西則雍為河之上流梁為江漢之上流下流則殺其汗漫之勢上流鑿其齟齬之衝豈非皆視冀州以為之凖而天下之水無不可治者矣嗟夫帝王之京畿雖不皆在冀州之境而後之建都無不賴禹之功故洪水茫茫而敷下土方者商人之頌其先王也灃水東注維禹之績周人之詠其先王也夫追稱其先王而必述夫禹則天下之可為京畿者孰不賴禹之功哉則當時東漸西被固可以見王者無外之意而四海會同之後則小水之入河河流之入海而天下寧有不治之水哉嗚呼盛矣厥土惟塗泥厥田惟下下厥賦下上上錯厥貢惟金三品地勢極於卑故上之取於民者輕地利極於美故下之奉其君者重蓋地之所出有定等不可強取其所無地之所産有定名不可不供其所有九州之域揚州最為多水其土之性則塗泥也其田之等則下下也是論乎地勢則極於卑故其賦之所出止於下上上錯則其所取者輕矣論夫地利則極於美故其貢之所入金而三品則其所供之重可知矣則壤成賦因其輕而輕任土作貢因其重而重此聖人之意也亦自然之理也禹貢揚州云云嘗謂賦出於田貢出於土出於田者因人力之所為出於土者皆天地自然之氣凝會藴結之所鍾非人力之所及也作於人力者不可常生於天地者不可變惟其作於人力而不可常故上之所取者度其所有恤其所無而不可過惟其生於天地而不可變故下之所供者雖至美而不敢不因所有也何也揚州之盛極於東南語其境則淮海也語其浸則江漢也語其水之所瀦則震澤彭蠡也懷襄甫定其土則沮洳而塗泥耕作方興其田則滲漏而下下特以人力之勝致地力之優故其嵗入之賦稍升於田然人力有不齊地力有不一或而下上或而中下又不可較數嵗以為常聖人定賦之等寧以其輕者為正而以浮出者為雜不忍盡民之力故也以三第之亦終於下而已是則上之所取又曷嘗強其所無而必取盈哉上之所取者信不可以強其所無下之所供又豈可專其所有而不以奉於上哉溥天之下莫非王土雖以天下奉一人不為過也而况土地所生天下之所極貴者豈得不先於君乎此揚州三品之金不得不為首貢也夫青州之鉛亦金也然非若揚州金之美者也梁之鐡銀亦金也然非有揚州金銀銅三者之偹也荆之三品雖曰不殊然九州之貢美者為先揚州之貢莫先金則又金之至美者也悉供於上不敢自有固臣子之至情於以見水土既平聲教四逹揚州去冀都為最逺而其貢獻不敢後於他州聖化之所以無外也歟嗟夫田之有賦出於人力之所成土之有貢出於天地之所生人力之所成者不可常而上之所取者亦不常愛民之深也天地之所生者不可變而下所供者亦不可變敬君之至也雖然輕於取民固所以愛民若地之所有聖人未嘗私其有重於奉君者固所以敬君若地之所無聖人未嘗責其無揚豫之賦以其等之輕於錯者為正冀梁之賦則以其等之輕於正者為錯雍州之田以人力之廢而其賦之等極降荆州之田以人功之修其賦之等極升信矣其作於人力者不可常也西北之地常高然兖雍梁豫之貢每不及於東南東南之地常下然青徐揚荆之貢每過於西北信矣其出於天地者不可變也以是知聖人之所以愛民者不惟揚州為然而民之敬君者又豈惟揚州為然哉此聖人之疆理天下所以大一統而無私也吾讀禹貢之書於其田之所賦知聖人之所以因乎人於其土之所貢知聖人之所以因乎天𨗳岍及岐至于荆山逾于河壺口雷首至于太嶽底柱析城至于王屋太行恆山至于碣石入于海謹按此為禹貢𨗳山之北條大河北境之山也蓋諸山之勢原於西北而𨗳山之敘亦先於西北也𨗳岍及岐至於荆山逾于河此記其自西北而東也壺口雷首至於太嶽此記其自東折而南也底柱析城至於王屋此記其自南轉而東也太行恆山至於碣石入於海此記其自北而歸於東也岍也岐也荆也此雍州山也壺口以下皆冀州山也昔者河水未平懷山襄陵大河北境諸山其費疏鑿之功不少矣今而水患既平崇山巨川皆可表識則聖人安得不詳記之夫以山之經理已各附於各州之下於此又條列之則山之經緯可見矣是故荊岐既旅二者雍州已言之矣而岍山則未之及也于此則表而言之既載壺口則所以殺河勢至於嶽陽所以𨗳汾水矣而碣石所以記島夷入貢之道三者冀州已言之矣而雷首底柱析城王屋太行恆山則皆未之及也於此則列而言之蓋禹之治水隨山刋木各有條理其見於各州者乃表其疆域之限其見於九州之後者乃陳其經理之敘也且治水之初而必先於𨗳山何也九州茫茫而區域不辨平地皆水而可見惟山禹於此時未可遽施夫濬治之功故必隨山刋木以通蔽障以觀形勢然後大者可以加濬鑿之功小者可以致疏決之力使平地之水得以下流而懷襄之勢得以少殺於是禹也乃假四載之乘不畏胼胝之苦遂始於雍州首從岍山次導岐山又從而至荆山其數山之相距甚遠也豈無山川限隔而可以表之者哉特取其山之髙大可名者記之也謂之逾于河者逾于河而知諸山之勢皆可以導之於河矣乃至冀州自壺口雷首而至于太嶽自底柱析城而至于王屋自太行恆山而至于碣石其諸山之相去非近也豈無衆山連亘而可以並録者哉特取其髙大可以辨疆域廣博可以奠民居者謹而書之也謂之入于海者禹至碣石而知諸山之水勢又可以悉入於海矣夫至于者禹迹之所至也逾于河者禹迹之所逾也入于海者小水合大水而入也禹迹之所至者其間濬鑿疏決之功雖不言而因其表記所至諸山之名又不可以想見其施功之次第也非其施功之有次第安能致水之入于海乎大抵天下之勢山水皆原于西北故禹敘山敘水皆自西北而東南蓋欲因山勢之崇卑而欲決乎水勢之就下也方其隨山刋木神禹導山之初也奠髙山大川神禹導山之時也愚想夫暨益奏庶鮮食者必此時使掌火烈山澤而焚之者必此時掘地而注之海驅蛇龍而放之菹者又此時也然後蔽障以通道路以開治水之功由是而施其胼手胝足八年于外禹之成功甚勞矣是以於此而表記其所至詳記其所經而山之經緯瞭然在目或者不察乃謂導山之條為推尋其山脈何其謬也神禹治水之後不過録其所至之諸山耳豈暇推其脈賂之所自來如今之葬法所言也哉吁九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同觀天下之水土無不平則知聖人之成功為甚大蓋當水土平治之初正聖人治定功成之日也茍一土之未平一水之未治又何足以為聖人之功哉昔者禹之治水也行其所無事也普天之下莫非王土豈私意小智之可為哉其施功於九州雖有次第而及其成功則一其所謂攸同者蓋言其所同如此也四海之隩水涯之地已可奠居而既無彼此之間矣九州之山拔木通道已可祭告而亦無逺近之殊焉九州之川濬滌泉源而俱無壅遏之害九州之澤已有陂障而悉無決潢之患四海之水無不會同而各有所歸此所以為聖人之極功也歟禹貢之書曰云云其意以為當堯之時水逆行泛濫於中國浩浩滔天下民昏墊無所安息鯀湮洪水而五行因之以汨亂及禹嗣興惟能順水之性而盡力乎溝洫水由地中行然後人得平土而居是以帝舜惟美其功曰洚水警豫成允成功惟汝賢又曰地平天成六府三事允治萬世永賴時乃功由是觀之禹平水土之功蓋與天地相為無窮者也豈特九州之攸同而見於一時之盛哉禹無吾間然矣夫以冀兖青徐荆揚豫梁雍九州之所謂攸同者禹之功蓋可見也天下之山水載於禹貢者多矣而九水為大九山為高大者既道則小者無不順矣高者既治則卑者無不平矣傳曰芒芒禹迹奄為九州經啓九道民有寢廟此之謂也是故以言其四海之隩則水涯之地悉為耕食之場矣塗泥之鄉已為奠居之所矣以言夫九州之山隨山刋木而險阻既可踰矣禱爾神祗而道路既可通矣以言其九州之川則決九川而距海濬畎澮以距川導滌之功既至而壅遏之患悉平矣以言九州之澤則既瀦而有陂障以為之防底定而無決潰以為之害矣夫水於天地間為物最大而况於海之尤大者乎四海之水至於無不會同而各得其所歸之順則際天所覆極地所載水土之無不平治蓋可知矣始言九州之攸同終言四海之會同者豈有他哉蓋言此以總結上文之意耳考之上文各州惟舉一隅至此總結之以見九州之所同也如宅土既宅惟見於兖雍故此以隩既宅總之既旅旅平惟見於梁雍故此以九山刋旅總之各州所載川澤雖多然九州川澤不止是也故以九川九澤之滌陂總之上文雖各載達河之道而四方水之所趨不止是也故以四海會同總之然下文之言六府孔修則非特水土之治而已聖人成功之大又孰有加於此哉然此亦其迹之粗者耳至其祇台德先不距朕行之語史臣方謹以繼之則禹之精神心術終始以保其成功儼然常在人耳目之間者初不可以今昔異觀也噫禹貢一書地理貨殖之書耳而其紀載之法乃如此後世之山經水志貨殖之書有矣而於致治之紀要曾謂有是哉是雖史臣一時之言實萬世不刋之聖經也五百里綏服三百里揆文教二百里奮武衛地介乎內外之間故治亦有內外之異夫聖人豈不欲內外之治如一弛其武衛而專尚乎文教哉顧其勢有所不可也勢之所為雖聖人亦無如之何也昔在大禹謂綏服五百里之廣內而侯伯中國之地外而要服漸非中國之地矣於是乎揆度文教於內三百焉奮張武衛於外二百焉文以治內武以治外豈非地介乎內外之間而治亦有內外之異乎云云嘗謂一視同仁舉天下之大而納之吾教化之中此固聖人之心也而有曰文以治內武以治外其所以不同者何哉嗚呼聖人之心未嘗有內外之異也其勢則然耳譬猶天無不覆幬也地無不持載也然而溫厚之氣常盛於東南嚴凝之氣常盛於西北豈天地覆載生成之有偏哉亦天下之地勢然也聖人之治亦由是己夫綏服者漸遠王畿之地侯服外四面又各五百里也謂之綏者不過撫安之而已內取王城千里外取方服千里非其地之介於內外之間者乎純以甸侯之法治之固不可也純以要荒之法治之又不可也純以甸侯之法治之則一乎文教而無事乎武衛矣得無意外之患乎純以要荒之法治之則不惟略乎文教而併亦不復致詳於武衛矣彼獨非吾民乎聖人嚴華夏之辨於是定為治內治外之制焉內三百里則為之揆文教詩書禮樂冠帶俎豆之風未嘗一日而不舉也外二百里則為之奮武衛旌旗車馬弓矢戈兵之備未嘗一日而不張也文教以善其生武衛以護其生民斯安也雖然聖人豈不欲三百里之外亦揆之以文教而無事乎武衛哉地近要荒其勢不容於不然也吾故曰勢之所為雖聖人亦無如之何者此也然嘗論之二百里之武衛雖不能如三百里之文教然武衛而曰奮亦不過激振厲使之無致於廢弛矣聖人不忘武焉未嘗黷武也東漸西被朔南暨聲教訖于四海豈以綏服三百里之外而文教遽不及乎特地勢之所為有不容不以武衛為之主耳然乎否乎甘誓胤征先王克謹天戒臣人克有常憲百官修輔厥后惟明明君能修省而臣又皆效其職焉則君德益以昭著矣夫君德之昭明貴乎有內外交修之道苟有是君而無是臣又安能使其德之昭著乎昔者夏之先王既能謹天戒而盡修省之實矣為人臣者又能守常憲而能盡諌諍之益焉下至百官亦莫不修其職以輔其君此所以內無失德而外無失政君德明而又明為不可及也然則人臣者所以輔君者也為羲和而昏迷於天道是失為臣之職矣征討之加果可以免乎嘗謂有天下者孰不欲為明明之君然而天變之來乃或玩之以為常災異之見乃或忽之而不戒則為之君者怠荒安肆將無所不至矣法令非不嚴也乃廢格而不由憲章非不具也力怠棄而不欽則為臣者踰禮越法亦將相帥以成風逢迎容悅以為常尸位素餐以自便如是而欲政治修明紀綱振舉君之德有以顯聞於天下不可得矣先王惟知乎此也故君則畏天臣則畏法其警戒之意無往而不存故其治教之休明為不可及也仲康征羲和而拳拳及此亦可謂知戒者矣且夫天心仁愛人君非大無道未嘗不欲全安而扶持之故夫日月之薄蝕風雨之不時皆天所以警戒夫人君者也然庸君世主往往忽之而不顧克謹之者其惟有夏之先王乎先王之心寧不思謫見於天由於德政之不修而轉禍為祥在於側身以修行是以戒慎恐懼圖以消其變戰兢惕厲思以弭其災先王之克謹天戒如此為之臣者竭忠宣力無敢怠惰以速官刑奉法守職無敢昏迷以千國紀亦可謂克有常憲矣彼百官之衆其位雖有尊卑至於夙夜匪懈以事一人則不以尊卑而有殊其職雖有大小至於進思盡忠退思補過則不以大小而有間百官之修輔若此則為之君者當如何哉吾見其出入起居之無有不欽也發號施令之罔有不臧也顯顯令德灼于四方主宰乎萬民之上而仰之如神明君臨乎天下之廣而愛之如父母者非幸也宜也噫先王因天戒而益明其德固有賴於人臣之效職後王亦以天戒而修省獨不賴於人臣之效職乎今也有辰弗集于房之戒嗇夫庶人且奔走之不暇羲和世守厯數之官當日蝕之變顧乃昏迷天象若罔聞知是廢國家之常憲甚矣寧不干先王後時之誅乎胤侯之征固有所不容貸也嘗因是論之洚水警豫此舜所以謹天戒當是時也有禹以盡力溝洫有稷契以佐其成功其所以克謹常憲其所以修職輔君蓋無所不至也此所以地平天成而當世賴其賜後世仰其明而帝舜之功卓乎其不可及也證以有虞之事豈不信而有徴哉書義矜式卷二
