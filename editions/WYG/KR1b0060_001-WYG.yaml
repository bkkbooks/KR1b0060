body:
  text: 書義矜式卷一元王充耘撰虞書堯典曰若稽古帝堯曰放勲欽明文思安安允恭克讓光被四表格于上下聖人之功無不至者聖人之徳無不至也夫聖人功徳莫盛於堯故史臣叙於書首意曰粤若稽古昔有放勲如堯者勲以功言放謂功無不至也欽明文思安安允恭克讓皆以徳言光被四表格于上下雖謂徳無不至然被也格也則放之所極也吁徳之所至即功之所至史臣總言堯之徳業云耳豈功自功徳自徳哉云云或謂書以道政事故堯典篇首先言功而後言徳及觀吾夫子曰巍巍乎唯天為大惟堯則之本言堯之徳巍巍乎其有成功則言堯之功其先徳後功雖與先功後徳不同然於功徳二者皆以巍巍乎三字稱之無異辭迺知夫子所言史臣所記辭異㫖同初非有意以功徳為先後而表是書為政之編也夫書以堯典為首百王之所取法史臣總其徳業於是書之首豈苟也哉曰若者發語之辭稽古者考古帝堯之言也放勲之放與放乎四海之放同盖言至也如親九族之功至九族則既睦矣平章之功至百姓則昭明協和之功至􅀺民則時雍皆放勲也其何所不至哉但徳者功之本有是功必有是徳功之至者徳之至也其徳以欽讓為之體以通明為之用㪚之在外為形著之文欽明之發見也藴之在内為深逺之思欽明之含蓄也安安堯之徳性之也非勉之也固有強為恭而非實者惟堯則允允者信也亦有欲為讓而不能者惟堯則克克者能也盖其本於徳性見於行實徳盛光輝極于四方雖外表而亦被極于天地通上下以感格抑是書放勲二字言功何其畧欽明而下累數言以形容言徳何其詳豈非功者衆所易見徳者民所難名故史臣因其功而詳其徳勲雖言放而光則極放之所被所格而言之嘗觀史臣叙濬哲文明温恭允塞亦猶叙堯之徳但堯曰放曰被曰格則不可與重華同語者例論夫子於堯曰大哉於舜曰君哉吾觀史臣二典尤信雖然欽也者即脩已安百姓之敬篤恭天下平之恭雖以堯舜之功徳猶必本諸此然則讀二典者尤當以欽之一字為開卷第一義云克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦􅀺民於變時雍惟聖徳之明極其盛故聖徳之推極於逺盖聖人躬行於上則所以觀感於下者有不期然而然者矣昔者帝堯能明其大徳光輝日盛無所不照全體之大無所不包聖徳之著於已者如此則其推之於家而九族皆有以篤其親親之㤙推之於國而百姓皆有以明其在己之徳又推之於天下而􅀺民之衆皆有以變惡為善而底夫雍熈之盛焉聖人一視而同仁篤近而舉逺其推之之序皆出於自然夫豈有所勉強而後能之者乎書曰云云即放勲之所極也惟天下至誠為能盡其性其得於天而具於己者無一毫之不實無一息之不明體之立者異於人也能盡其性則能盡人物之性其充於此而著於彼者無一民之不化無一物之不周用之行者又異於人也聖人篤恭而天下平其所以賛化育而参天地於此可見矣夫徳者人之所同得不以聖愚而有以加損也而謂聖人之徳有異於人何哉盖生而知之則欽明文思皆出於自然非常人之所及也安而行之則允恭克譲不待勉强非常人所能也徳不止於徳而曰俊徳則大而無外如天地之覆載大不止於大而曰明則光被四表如日月之照臨明不止於明而曰克則能超乎氣禀之偏絶乎物欲之蔽其卓冠羣倫也宜哉其明徳之本無以加故明徳之效有其序以此徳而齊家則父子兄弟夫婦長㓜之際以至五服異姓之親懽然有恩以相愛秩然有叙以相接皆聖人明徳為之本而使之有所取則也以此徳而治國平天下則畿内之近萬邦之逺􅀺民之衆各有以去其舊染之汚而全其明明之徳孝弟忠信怡然於安居樂業之餘禮樂教化蔚然於雍熈㤗和之盛皆本於聖人之明徳其下觀而化固有不令而從者焉盖同然之理具於聖人之一心亦具於千萬人之心聖人推之於家者此徳也推之於國與天下者亦此徳也舉天下之大皆囿於聖人徳化之中吁盛矣抑嘗觀之書序帝王之徳莫盛於堯其稱放勲之實莫偹於此甚矣史臣之善言徳業也厥後子貢之稱孔子言聖人之徳如天之不可階而綏來動和之妙盖無異於堯也亦可謂善言徳行矣後之為治者有志於帝堯之治常法乎帝堯之徳而修身者即所以明徳也故孟子曰天下國家之本在身分命羲仲宅嵎夷曰𤾉谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾聖人命厯官分方以治其事欲其精扵測候而詳於考騐者所以重民事之始也夫時以作事而嵗功之所由起不可緩也知民事之不可緩則分方而治者有不容不致其測候之精而盡其考騐之詳矣在昔帝堯扵羲和之分命必使之率職於嵎夷𤾉谷之地賔陽光之初升而識其景焉固所以謹夫平秩東作之事也然猶恐其考騐之未精也觀晝刻之均扵夜星鳥之見乎昏而春之中者始不忒又恐其考騐之未詳也觀民之析處而有以騐其氣之温物之生育而有以騐其氣之和則春之中者為益信尤所以謹夫平秩東作之事也噫此其先天而天不違後天而奉天時也歟時以作事而一嵗之計又當謹於春以其為嵗功之首也厯以正時而三春之候尤當謹於春分以其陽之中也謹嵗功之首定春陽之中聖人又安得不命厯官分方以盡其測候考騐之法乎嵎夷今登州之地也𤾉谷取出日之義乃羲和所居官次之名盖官在國都而測候之所則在嵎夷𤾉谷之地時維春分旭日始旦欲羲仲倣乎帝嚳厯日月而送迎之意盡其寅敬賔接之禮以識其初出之景焉日景不差天時斯正以是而平均早晚之節秩次先後之宜凡嵗功之當興民事之當起斯可頒之有司行之天下矣然猶慮其測候之未精也又使之叅攷夫晝夜之晷刻焉盖夏之晷刻常太過於晝冬之晷刻常不及於晝惟春分之刻視冬夏為適其中必晝夜之刻各五十而後定也舉晝以見夜故曰日中又必使之審訂於星宿之位焉二十八宿随天運轉四方雖有定星而星無定居曰鳥曰火曰虛曰􅄧各以四時之昏見於南方春分之夕必南方朱鳥七宿見於其位而後定也以其形而言之故曰星鳥夫如是則不惟以日初出之景而定夫春之中必參之晝夜晷刻之適均而春之中始定焉不惟以晝夜之晷刻而定乎春之中必求之於南方朱鳥之昏見而春之中始定焉然猶慮其考驗之未詳也欲其觀厥民之析焉先時冬寒民聚於隩至是而散處則可以驗其氣之温矣又欲觀於鳥獸之孳尾焉乳化曰孳交接曰尾鳥獸孳尾則可以驗其氣之和矣既有以驗其氣之温又有以驗其氣之和則天時物理無不合而步占之法庶乎無毫髪之或差聖人敬天勤民之意無所不盡矣故曰聖人命厯官分方以治其事欲其精於測候而詳於考驗者所以重民事之始也雖然豈惟是而已哉敬致寅餞之禮訛成朔易之務宵中永短之必考星火虚昴之必觀曰因曰夷曰隩之必審希革毛毨氄毛之必察其繼乎春而為之者盖無時而不謹矣帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熈聖人命作厯之官閏以四時而嵗功成故時以作事而治功成矣盖天運齊於上而後治效見於下聖人之命官立政未嘗不以治厯正時為先務也苟歲功之不成則治功亦何由而廣哉昔者帝堯之命羲和謂夫三百六旬有六日者此一朞之數也然以日月之所㑹於天者考之其度數則有遲速之不同其氣朔則有盈虛之或異合氣盈朔虛而閏生焉閏既立矣則四時以之而定嵗功以之而成以此而信治百官則天下之事功豈不由是而皆廣乎吁聖人盡其裁成之道輔相之宜而拳拳於天道者其於治道知所本歟云云其㫖如此嘗謂閏之有益於嵗時大矣日月之運於天者以朞言之則有難齊之度以嵗言之又有必齊之序焉二者不齊而欲齊之非有閏法何以致其齊哉閏者合氣盈朔虚而為之者也日之盈者損之月之虛者補之朞雖不齊而時與嵗則歸于齊矣盖齊而不齊者在天之運也不齊而致其齊者聖人之法也然天運齊於上而後治效見於下此聖人之命官立政而未嘗不以治厯明時為先務也嵗功成而治功成則聖人之能事畢矣今夫咨者嗟也帝堯總命羲和而咨嘆以告之者何哉盖聖人之于天道盡心焉耳矣朞猶周也周天三百六十五度四分度之一天一日行一周而過一度日一日亦行一周而視天為不及一度月行一日一周而視天又不及十三度有竒此朞之數不可以强齊也至於嵗則有一定之時時則有一定之月月則有一定之日合一嵗之日則有三百六十此嵗之序不可以不齊也然日一嵗與天一㑹校之嵗則過五日而有餘月一嵗與日十二㑹校之嵗則不及六日而不足日之過則為氣盈月之不足為朔虚合氣朔之盈虛而閏立矣三年而一閏五年而再閏十有九年而七閏夫如是而後氣朔始得而均齊時得以正其時歲得以成其歳也春夏秋冬不失其宜隂陽寒暑不反其序天時於是而可則地利於是而可因人事於是而可以無失矣此閏之法所以能齊不齊以歸於齊也時既定矣歳既成矣以此而信治乎百官之衆則天下之庻事將見其無一之不康而天下之治功將見其無一之不廣也茍名實之乖戾寒暑之反易則農桑庻務咸失其時百工之惰萬事之墮或有不可勝言者矣由是觀之聖人之命官正時而欲其歲功之成者無非所以為天下治功之計也歟抑考之經堯之始命羲和也則曰欽若昊天厯象日月星辰敬授人時此盖命其主厯象以授時也至此則曰朞三百有六旬有六日以閠月定四時成歲者盖言作厯之要法也聖人於即政之初而拳拳以正天時為先務者何也盖見乎治天即所以治人也天時既正百工可得而治庻績可得而熈也雖然不獨堯也髙辛氏之厯日月星辰而迎送之舜之在璿璣玊衡以齊七政皆此意也嗚呼範圍天地之化而不過曲成萬物而不遺其斯以為聖人乎舜典愼徽五典五典克從納于百揆百揆時叙賔于四門四門穆穆納于大麓烈風雷雨弗迷克盡乎人事之常而不亂乎天道之變此聖人之能事也盖聖人必有過人之才亦必有絶人之量以過人之才而治天下之事事未見其有不治者也有絶人之量而遇非常之變亦未見其有震懼失常者矣古之人有能之者其惟舜乎是以帝堯使之愼徽五典而五典以之而克從使之揆度庶政而庶政以之而時叙賔于四方之門而四方由是而穆穆納于大麓之間遇烈風雷雨之變而行亦不迷焉吁主天下之事而各得其治遇天道之變而不失其常非固聰明誠智確乎其不亂者其孰能與於斯舜典云云其意以此嘗謂天下之事至難治也非聖人則不足以臨其治上天之變亦非常也非聖人則必至於失其常盖聖人之才固衆人之所難能也聖人之量尤衆人之所不可及也何以言之常人之於五典也或欲其從而不獲其從宅於百揆也或欲其叙而不得其叙賔於四門而或不能致其穆穆之和遇烈風雷雨之變而或不能不失其常惟聖人則異於人也事之所肇者屢試而屢得其效理之所在者隨感而隨致其休此天之所以與聖人者豈偶然哉今夫父子之有親君臣之有義夫婦之有别長㓜之有序朋友之有信此五典也即所謂五常也人之所以為人聖人之所以為教皆不出乎此五者之常道也夫惟慎之而不敢忽美之而盡其道則敬敷在寛之意得矣而掌教之實亦無怍於人矣克從而不能違之盖有不期然而然者也此言聖人能盡其司徒之教者如此夫所謂揆者度也百揆者度庻政之官其制始於唐虞而亦猶周之冡宰也事之至繁任之至重亦孰有加於此哉納于百揆之職而百揆以時而叙此言聖人之能盡其庻政之道者如此古者以賔禮親邦國諸侯各以方至而使主焉故謂之曰賔四門者四方之門也賔四方之門而諸侯之至者莫不穆穆其容而和之至焉此盖又言其兼四岳之官而能盡其職如此昔者洪水之害而堯獨憂之使舜入於山林相視原隰烈風雷雨衆懼失常而舜行獨不迷焉吾於此見聖人不特有過人之材能尤有絶人之度量也賔於四門四門穆穆者即左氏所謂無㐫人也納於大麓烈風雷雨弗迷者亦猶易之所謂震驚百里不喪七鬯之類是也噫聖人吾不得而見之矣觀於史臣紀載之書而聖人之材之美猶可追想於數千載之上也孟子言必稱堯舜良有以哉抑此章之㫖蔡氏傳之明矣間嘗參諸注䟽之説而訓大麓之義則異焉孔氏曰麓録也納舜使大録萬幾之政隂陽和風雨時各以其節不有迷錯愆伏而舜之德合於天也觀其所言與蔡𫝊之㫖有不侔者且堯時之官莫尊於百揆大麓萬幾之政非百揆而何麓以山足訓之明矣孔氏之説於經意有未合者故不可强而從也在璿璣玉衡以齊七政肆類于上帝禋于六宗望于山川徧于羣神聖人審觀天之器以齊其運又必舉秩祀之典而周其禮此聖人受命之始而嚴其奉天之道也夫聖人之有天下也天與之也天運之不可以不審祀禮之之不可以不舉皆政之大者也故璿璣玉衡觀天之器也而七政在天日月五星是也察璣衡以齊七政其觀天之術審矣於是類祀于上帝禋祀于六宗山川則望而祀之羣神則徧而祀之凡其祭祀各有秩序則事神之禮皆舉矣然則天運無不齊而祀禮無不周聖人奉天之道不可詳乎云云嘗謂聖人之有天下未有不受命於天者也命既出於天則吾所以奉乎天者可不盡其道哉故不惟審夫觀天之器以齊其運又且舉秩祀之典而周其禮焉誠以日月五星之運行於天者乃敬授人時之本而百神之來享者然後可以章天與之符則政孰有大於此者乎此舜攝位之初而有致意於二者之務良有以哉察夫璿璣而所以象天體之運轉也王衡者以玉為管横而設之又所以窺璣而齊七政之運行也七政運行於天非日月五星之謂乎不曰日月五星而曰七政者以其運行之有遲速順逆猶人君之有政事也七政以璣衡而齊齊七政者必先於察璣衡也璣衡所以為觀天之器則察璣衡者即所以齊七政也七政既齊則厯象以成天時以定而觀天之術於是乎審矣觀天之術既審而事神之禮尤不可後上帝則類而祭之其禮依郊祀為之也六宗則禋而祭之精意以享之也名山大川五嶽四瀆非山川之當祭者乎望而祭之故曰望丘陵墳衍古昔聖賢非羣神之當祭者乎徧而祭之故曰徧不惟類于上帝而且禋六宗焉不惟望于山川而且徧羣神焉則上下神祗罔有不祭而祭祀薦享禮序秩然殆見郊焉而格廟焉而享而事神之禮於是乎至矣審觀天之術於先而舉祀神之禮於後聖人所以奉天者盖如此而政事之大宜莫先於斯焉嘗考厯象授時堯之所先也昭告上天神后而類于上帝宜於冡土湯武之所不廢也大舜攝位之初首必於二者之務人君奉天之道不過在是矣嗟夫聖人之所奉者天故天之眷佑者亦在聖人然則舜之有天下也孰與之曰天與之天與之者諄諄然命之乎曰天不言以行與事示之而已敷奏以言明試以功車服以庸聖人因諸侯之朝而察之者其法詳因諸侯之功而報之者其禮厚即其奏言試功而旌以車服可見矣在昔帝舜於諸侯之來朝使各陳其為治之説而聽其言復從而明考其功以觀其行所以察之者如是其詳諸侯而有功於民則賜之以車又旌之以服所以報之者如是其厚然則决擇之必審待遇之必隆盛時述職之法盖如此也云云夫上之待下决擇之法固不可以不嚴而待遇之禮亦不可以不厚苟無其法則賢否無由而可知有其法而無其禮則有功者亦何由而加勉然則禮也法也二者可相有而不可相無者也誠哉是言也今夫有徳者必有言言者行之表也故其人之能否不可知即其所言之得失而可見於是而敷奏以言然言之非艱行之惟艱君子不以言取人必也聽其言而觀其行於是而明試以功奏言而有以得其施設之方試功而有以騐其操履之實苟言之如其所行行之如其所言所謂成允成功所謂乃言底可績則其人之賢否昭然不可掩矣斯其察之之詳也如此然察之固不可不詳也待之亦不可不厚也且夫列爵分土樹屏建侯豈為安逸之計而已哉惟以治民而已故民功謂之庸有能禦大菑捍大患興利除害使匹夫匹婦咸樂其生則有功於民者也何以與之路車乘馬又何與之𤣥衮及黼車以安其體而無負乘之譏服以華其躬而無不稱之誚斯其報功之厚也如此雖然帝舜不特以此待諸侯其待黎獻之士亦曰敷納以言明庻以功車服以庸其所以選賢才勵臣下同此一道也此其所以考績於三載之後黜陟於三考之餘而庻績為之咸熈厥後成周之制六年五服一朝大明黜陟盖亦損益有虞之制而為之者也此成周太和之治所以亦無媿於有虞也歟象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑𤯝災肆赦怙終賊刑欽哉欽哉惟刑之恤哉聖人之制刑雖有輕重之殊聖人之用刑常存敬慎之意盖刑者民命所關聖人不得已而用之使無敬恤之意則刑罸不中而民無所措手足矣是故舜攝位之初即示人五常之刑以待夫罪之重者稍輕則流以宥之鞭扑以待夫罪之輕者又輕則金以贖之五者法之正也無意而誤犯者赦所以宥其過有意而故犯者刑所以誅其心二者法之權也聖人立法制刑其詳如此然豈恃以求逞哉敬之而又敬之其心未嘗或輕盖其中有所不忍故也故輕重各有攸當者乃天討不易之定理而欽恤常行乎其間者可以見聖人之本心云云聖人有不忍人之心斯有不忍人之政為政且爾而况於用刑乎輕則鞭扑傷人之肌膚重則鈇鉞戕人之性命死者不可復生㫁者不可復續一失其當而民有不得其死者矣故刑以輔治雖聖人有所不可廢然刑期無刑乃聖人之用心固非衆人之所可同盡此道者吾於大舜見之矣是故象以典刑象者垂象以示人而典者其常也示民以常刑使民知所畏所謂墨劓剕宫大辟是也此五者刑之正也所以待夫元惡大憝殺人傷人穿窬滛放罪之不可宥者也流宥五刑者所犯雖入於五刑而情可矜法可疑與夫親貴勲勞之不可加刑者則放之逺以寛之如五刑有宅五宅三居是也鞭作官刑者木末垂革施之官府以懲其怠惰扑作教刑者夏楚二物用諸學校以警其怠荒斯二者所以待夫罪之輕者也罪入於鞭扑其刑可謂輕矣而其刑又有可矜可疑者焉則使人入金以贖其罪盖不忍輕刑而亦不欲以直赦之也五者從重以入輕法之正也𤯝災肆赦者𤯝謂過誤災謂不幸如是而犯法者不待流宥金贖而直赦之也所謂赦過無大怙終賊刑怙謂有所恃終謂再犯如是而麗刑者則雖當宥當贖亦不許其宥亦不聽其贖而必刑之刑故無小之謂也此二者或從重以即輕或由輕而即重盖用法之權衡所謂法外意也聖人立法制刑之本末此六者大略盡之雖其輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意未始不行乎其間也欽則有敬謹之意恤則有哀矜之心聖人於事固無不敬而用刑者尤聖人之所慎聖人於民固無所不恤而有罪者尤聖人之所矜聖人豈樂於刑哉盖有所不得已也使有一毫怠忽之心存於中則輕重失其宜操舍失其當舍彼有罪刑及無辜矣聖人以不得已而用刑夫豈有殘民以逞之意哉故輕重有倫有以見聖人之法而欽恤無間者足以見聖人之心譬之天地四時之運雖有寒凉肅殺之不同然其涵養以𤼵生之意未嘗不流行乎其間也此其好生之徳洽于民心而民自不犯於有司至於刑措不用以成垂拱無為之治也雖然舜制五刑有流宥而無金贖所謂贖者止鞭扑之刑耳至吕刑始有五等之罰疑穆王始制之非法之正也盖當刑而贖則失之輕疑赦而罰則失之重且使富者獲免貧者受刑又非所以為平也然而穆王所謂哀矜折獄所謂敬五刑則其欽恤之意猶知古人之用心夫子所以取之也嗚呼天下之廣掌刑者民之司命任用可不重乎詢于四岳闢四門明四目達四聰咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人蠻夷率服聖人咨内臣盡輔君之職以圖治尤必咨外臣盡養民之政以來逺盖圖治莫先於近臣養民莫切於羣牧聖人急於政治安得不咨之耶是以帝舜即位之初謀治於四岳之官使其闢四方之門以來天下之賢俊明四目達四聰以廣天下之視聽此豈非欲其盡輔君之職以圖治乎然養民之政不修則不足以成天下之治必咨於州牧使其重民食而一逺邇親君子而逺小人則民遂安養之願雖蠻夷之國亦相率而服從矣此又豈非欲其盡養民之政以來逺乎然則四岳總於内州牧總於外内外相須而治道備矣書曰云云其㫖如此嘗謂人君以一身之㣲涖萬民之上天下人才之賢否四海生民之休戚雖有知人之智安民之惠豈能盡徧耶是以内立四岳則賢才舉而視聽廣外立州牧則百姓安而四夷賔服内外之職舉得其人聖人復何為哉不過垂衣拱手恭己正南靣而已爾然使為四岳者或不能盡其職則賢才必隠遁於下聰明必日蔽於上又豈能成其在内之治乎為州牧者或不能修其政則民既無以安其生外夷且乘間而侵亂又豈能致其在外之治乎是則岳牧之官任大而責重關政治之得失此舜即位所以必先命之也歟且夫人君之臨涖天下也資治莫急於賢才然君門萬里出類拔萃之才安得以自達乎為四岳者當闢四方之門以廣求賢哲布於朝廷旁招俊乂列於庻位使野無遺賢可也耳目固所以廣視聽也然人君一身聰明有限雖有視逺惟明聼徳惟聰之心安能以達逺乎為四岳者當明四方之目為己逺視而無所蔽達四方之聰為已逺聽而無所壅使嘉言罔攸伏可也然則内焉之圖治不咨於四岳養民之政不咨於州牧可乎夫以天下之大分為十有二州土地之廣人民之多人君雖有子民之心豈能家給而人賜之哉為州牧者當知以養民為務不違農時則烝民粒食矣寛以撫之則逺者來矣擾而習之則近者悦矣然非進賢退不肖則君子在野小人在位又何由成養民之政乎必惇信仁徳之士屏棄㐫惡之徒則政無不舉豈特中國之民得其所養雖要荒之逺亦為之來廷戎狄之人亦為之賔服噫逺人之格孰非外臣養民之政所致哉惟然唐虞之際四門穆穆則四岳之治非不舉也各迪有功則州牧非不修也而舜之即位乃汲汲焉首詢於岳牧何哉盖舜紹堯之後惟恐治道盛而或衰人心久而或怠所以奮庸熈帝之載不得不然也故當攝位之初即日覲四岳羣牧者特不過輯瑞班瑞以與之正始云爾至此則建官分職欲其有以成天下之治也厥後成周稱唐虞内有百揆四岳外有州牧侯伯庻政惟和萬國咸寧則知岳牧於内外之治者大矣此其所以致雍熈太和之治也歟惇徳允元而難任人蠻夷率服為民上者能親君子而逺小人則無逺而不服矣夫逺人之服豈有他哉亦在舉措得宜有以當其心故耳宜夫帝舜以為長民者告也夫其有徳者知所親仁人者知所信而包蔵㐫惡者知所以拒絶也則君子進而小人退矣誠如是雖以蠻夷之逺亦相率而服從中國其有不治者乎帝舜以此而告十二牧焉可謂得為治之本矣云云昔者魯哀公嘗問孔子以何為則民服孔子告以舉直錯諸枉則民服舉枉錯諸直則民不服至哉斯言也可謂得天理人情之至者矣盖人情莫不好直而惡枉故舉錯得宜則犂然足以當人心天下孰不為之悦服一失其當則好人所惡惡人所好是謂拂人之性矣雖一夫猶不可强服尚安能得天下之心哉况夫親賢臣逺小人國之所以興隆親小人逺賢智國之所以傾覆其所係者尤重也為十二牧者各私一州之士各子一州之民於此宜何如其盡心哉仁義禮智根於心而令聞廣譽施於身此其為有徳者也吾則尊其位重其祿所以厚之者無不至也慈祥惻怛能存不忍人之心寛裕温柔能行不忍人之政此其為仁人也吾則任之而勿貳委之而勿疑所以信之者極其專也雖然有徳者在所親矣天下豈皆有徳者乎固有貌似莊重而心實險狡者矣謂之任人可也仁厚者在所信矣天下豈皆仁厚者乎固有外為温柔而内實殘酷者矣謂之任人可也彼固善於逢迎而吾則聽察必審而不敢輕彼固易於投合而吾則遴選必嚴而不敢忽所謂難之者此也誠如是而所用者必君子而天下得以被其休所去者必小人而四方不至被其毒朝廷清明紀綱振舉治化洋溢乎中國而施及於蠻貊彼三百里蠻居乎荒服之地非可以政令整齊者也今焉亦安於邦域而不敢懐反側之心三百里夷居於要服之間非可以威刑禁制者也今焉亦嚮風慕義而不敢萌背叛之志何者内外之勢雖殊而好惡之情則一為民上者舉錯不謬而有以服其心此其所以率服也其功足以柔逺人而恩不足以及百姓者未之有也為州牧者若之何而不盡心哉且舜舉元愷而天下稱其能誅四㐫而天下服其當則舜於親賢逺佞之道盖已行之矣而又拳拳於十二牧告者豈非治有小大而其道無異同也歟雖然牧以養民而告之以此者何也盖足食所以使之有所養進賢退不肖所以使之得以安於所養不然則君子在野小人在位惡政日加於民雖有粟烏得而食諸故舜既告以食哉惟時而必繼之以親賢逺佞之道矣夫然後足以成養民之功也孟子曰堯舜之仁不徧愛人急親賢之為務其此之謂歟命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和命官以聲樂之教而欲養其中和之徳必原夫聲樂之本而復賛其幽明之感夫命官以聲樂為教則其職教之專者固有以育人才而養性情耳而論樂以人聲為本則其聲樂之和者又豈非所以格神人和上下哉昔舜之命䕫典樂以教胄子也既欲慮其偏而輔翼之又欲防其過而禁戒之此其職教之専所以養其中和之徳矣然教之之道在於徳教之之具在於樂則夫樂之作本乎人聲之和以極夫聲樂之妙殆見其神無不格而人無不和盖又極夫幽明之感矣此胄子之教典樂之官所由設歟聖人作樂其體用功效之廣大深切如此夫嘗觀周禮大司徒掌成均之法以教國子弟也以六徳為之本以六律為之音則聖人之教莫善於樂又觀商之庸鼓有斁以衎我烈祖也先祖為之是聽嘉客為之夷懌則神人之和亦在乎樂矣何者樂由人心生也自其典樂之教而論固以人心和而感乎人心之和耳自其作樂之效而言之又豈非人心之和而通幽明之感乎今也舜之命䕫不惟以教胄子者言之又必以格神人者言之此其職教之專而聲樂之極功也又豈殷周之盛而已哉帝舜之意若曰今予命汝典樂之官者豈徒侈乎金石之音干羽之舞耶盖自天子之元子以至公卿大夫之適子莫不有天下國家之寄而不可以無教也聲音以養其耳采色以養其目歌詠以養其情性舞蹈以養其血脉茲非典樂之教也直者必不足於温故欲其温寛者必不足於栗故欲其栗則直不至於訐寛不至於縱剛者必至於虐故戒其無虐簡者必至於傲故戒其無傲則剛不至於曓簡不至於慢矣救其氣質之偏養其中和之徳則汝之典樂教胄子者盖在乎此矣雖然樂豈無自而作哉亦以人聲為之本耳人心之動因言以宣而在心為志𤼵言為詩則志以言而見也既形于言必有其節而言之不足又永歌之則言以歌而永也既有永言之歌矣則歌聲之濁者為宫以漸而短者為商為角為徴為羽焉不曰聲依永乎既有依永之聲矣則必以五聲六律十二管還相為宫焉不曰律和聲乎人聲既和而被之八音以為樂則金石絲竹之異宜者翕如純如而不拂其情匏土革木之異用者皦如繹如而不紊其倫矣薦之郊廟則足以動天地而感鬼神奏之朝廷則足以厚人倫而美教化尚何幽明之間而上下之殊哉然則聖人作樂之效一至於此則其典樂之教所以育人材而養情性者亦可見矣且唐虞之為教也有若司徒之敬敷五教矣而其所以事神者有若秩宗之典朕三禮矣今而胄子之教神人以和一委於后䕫之典樂何也盖聖人之教莫善於樂而樂之所以格神人者同一至和之流通也豈曰此為胄子之教而彼為神人之感哉厥後后䕫言作樂之效始曰祖考來格而虞賔在位終曰鳥獸率舞而鳯凰來儀則又不惟無負於帝舜之命而亦無愧於聲樂之妙矣此韶樂之所以盡善盡美歟咨汝二十有二人欽哉惟時亮天工聖人致歎以命臣職之衆者欲其主敬以相天事之重也天事之重非敬無以相之然非嗟嘆以致其命則聽之者將以為汎然之常言耳夫聖人之命庻官其事至不一也天有不能自為而寄之君君有不能自為而寄之臣君之事何莫非天之事也其可不敬以相之乎無一事之非天則必無一事之不敬虞廷總命羣臣之際必嗟嘆而𤼵其辭以此哉云云夫位之尊卑不一也而言位者必曰共天位職之大小不一也而言職者必曰治天職五典曰天叙五禮曰天秩五服曰天命五刑曰天討所任之事不一而相乎天者則同耳又安得不嗟嘆而以敬之一辭為羣臣告乎夫舜之分命於二十二人者為何如哉備咨詢之任者四岳是已圖宅揆之績者伯禹是已黎民阻飢而稷播百糓也百姓不親而契敷五教也刑則臯陶明之工則垂掌之上下草木鳥獸之未若則吾之所賴者益焉天地神祗人鬼之未叙則吾之所資者伯夷焉有䕫以典樂則吾胄子之教不患其不施有龍以納言則吾出納之命不患其不允有十二牧以分職治於外則吾食哉惟時柔逺能邇之政不患其不立其為事固不一也然内而四岳九官何徃非天工之代外而十二牧何往非天牧之司苟居其職而怠其事在其位而慢其政無以相乎君即無以相乎天矣故天工之亮非欽哉以為之主不可也欽者何敬而已不貳以二必專其念不參以三必一其守夫如是非惟有以相夫君實有以相乎天矣由是觀之人臣之事不一而一於代天一於代天則必一於主敬帝舜深知乎此而猶恐羣臣之以常言視之也咨汝一辭𤼵聲嗟氣嘆於羣言之首其所以感動夫二十二人之欽者為何如哉抑嘗考之舜之命禹命伯夷咨四岳而命者也命垂命益泛咨而命者也命䕫命龍因人之譲而命者也若稷契臯陶之不咨者申命其舊職而已夫知道而後可宅百揆知禮而後可典三禮知道知禮非人人之所能也故必咨四岳而命之若予工若予上下草木鳥獸則又非此之比故泛咨而命之禮樂命令事理精㣲非百工庻物之比故必俟伯夷之譲而後命之也惟其分命之時有咨焉故其總命之際必咨以戒其敬歟愚觀堯典之書於治厯之命則曰欽若於治水之命則曰欽哉欽者堯舜相傳之心法也二十二人之咨舜之致意於欽者有自來矣三載考績三考黜陟幽明庻績咸熈聖人課功以示勸懲者有定法故羣臣盡職而立功者有成效夫課功覈實之嚴乃衆功之所由以廣也在昔有虞之朝考績行於三載之時黜陟幽明於三載之後以時課功截有定法者如此夫是以賞罰明信人人自立於事功百庶之績雖若不齊而咸熈之效若出一致其各有成效復如此定法行於君而成功著於臣有虞之治所以為不可及夫君使臣以禮臣事君以忠君之於臣惟知盡待下之禮爾初無待於誘之以賞而怵之以罰也臣之於君惟知盡事上之忠耳亦無待賞罰而後知所勸懲也然而日月易流人心易弛三載而不考其績則無以提撕警覺而作其懈惰怠弛之心人不能以皆賢則職或不能以徧舉三考而不繼之以賞罸焉則亦無以知其賢不肖而為之進退則玩愒偷安茍且自便敷同日奏罔功者有矣庶績何自而咸熈歟古之聖人知乎此也故於三載之後考其功課其殿最盖以三年有成則有能者可以自見矣雖未必遽能得其底藴也有過固不可掩矣而猶兾其能自新也是以雖第其上下而猶未遽施以黜陟焉及其三考之後則九載之間人以久而可見功以久而可成凡有能者得以究其能而有過者亦無復能改其過也已明者才美外見而有功者也於是或益其土地或進其爵位所以陟之而示勸幽者職業不修而墮其功者也於是或黜其爵位或徙之逺方所以黜之而示懲聖人執此之政堅於金石行此之令信如四時據此之至公無私如天地宣力者知賞之必及而偷安者亦知罰之不可以茍免也是以敬爾有官勉爾為政孶孶汲汲不敢自暇凡而宅百揆則勉於亮采而百揆之職成矣敷五教之績就典禮樂則禮節而樂和掌刑罰則刑清而民服内而朝廷外而羣國未有任其職而無其功者也有虞激勸人心之道誠萬世之良法歟豈獨有虞為然哉其所由來者尚矣堯之試舜也詢事考言乃言底可績三載所謂考績於三載者也其黜鯀也以九載而績用弗成其陟禹也以九年而水土平治此即三考黜陟幽明也泰和之在唐虞良有以歟雖然明良喜起之朝其稽功覈實雖不能不假諸法而其禮遇臣闕之闕者此又不可以不知也後世有闕將以致治或以滋亂者有矣大禹謨若稽古大禹曰文命敷于四海祗承于帝曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳大禹徳化大洽而尤盡告戒之誠正欲君臣責難以為圖治化之本此史臣所以既賛其教化之盛於先而尤備述其責難之辭於後也以為考古之大禹其文命之敷既可以遍及於四海若可以自足而其心以為未嘗足也方且陳其謨訓以敬承于帝焉而其告君之辭有曰君必難其為君臣必難其為臣君臣克艱各務盡其所當為者則其政事乃能修治下民自共觀感而速化於善矣處已治而猶若未治者如此非徳量之大者能之乎史臣以大禹稱之良有以也自常情觀之孰不曰治功之未感教化之未行聖人之所憂也四方風動萬邦作乂則可以相安於無事矣禹之心何為而自視欿然耶嗚呼是未知禹之心者也彼誠見乎朝廷之上君臣之間萬事之根本在焉萬化之權輿係焉苟頃刻謹畏之不存則怠荒之所自起毫髪幾㣲之不謹則禍患之所由生為君者兢業以圖治尤恐君道之或弛况可為之以易乎為臣者同寅協恭以輔君尤恐臣職之或廢况可承之以怠乎此所以不以徳化大洽於一時者為已足而必以政治民化於無己者望其君也禹之心其若是乎且文命之敷果何自而見也觀其東漸於海闕間無非此徳之充周也西被於流沙則弱水之闕之洋溢也朔南暨聲教訖則衡山之南幽都之闕此徳之敷暢也地勢有逺近而禹之徳教無逺近之闕有彼此而禹之徳教無彼此之異他人不啻足矣而禹之心尤歉然方自獻可替否而盡其責難之恭也翼翼小心而竭其陳善之敬也於是忠言嘉謨日陳於前而其告戒之辭乃曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳焉禹之意豈不曰貴為天子固可安也而一日萬幾誰之責乎尊居百揆固可安也而敬亮天工誰之任乎必也君不易其為君而常懐宵衣旰食之憂臣不易其為臣而常懐瘝官矌職之念如是則紀綱法度必粲然可觀禮樂刑政必四達而不悖而政事無一之不修舉矣夫君臣之身乃萬民之所觀仰也君臣之政化既行則天下之習俗其有不美者乎吾觀夫林林而生者其質雖不齊今皆為於變時雍之歸揔揔而羣者其情雖不一而皆有徧為爾徳之洽雖風之偃草地之敏樹有不足以喻其速者矣抑又論之克艱之道禹為舜陳而舜以天下譲實基於此也何也盖克艱之辭方𤼵於禹而允若茲之語即契於舜是既有味於其言矣異時禪禹之辭有曰汝惟不怠揔朕師又曰克勤克儉不矜不伐終陟元后焉則舜以天下授禹非獨以其治水之功實以其克艱之故也然則是道也實萬世君臣為治之本原也孔子曰為君難為臣不易豈不信哉文命敷於四海祗承於帝曰后克艱厥后臣克艱厥臣當徳化已敷之後正君臣責難之時是何古大臣也告君若是其至歟盖徳化未敷常情皆知其難徳化已敷雖一時君臣不能視之以易此闕治之原徃闕起於大治既成之後者此之故耳故文徳之敷禹雖可以祗承於帝而無愧克難之戒禹方以為君臣之責而不辭有虞之朝必非以文命既敷而有以易心者禹之相與警戒則實恐其有是闕也夫豈以一時之治效已成而可以自己乎云云其闕天下之事以難為之則得其所以難以易視之則闕之所以闕之難雖四海之大兆民之衆皆可以漸摩於闕治政治之餘視之以易則泰和至治薰蒸洋溢而玩心闕生吾固未知其所終也嗟夫天下無常治之時而愛君之深者每致憂於盛治之際世之為人臣者任君之事惟闕未寧一民未化有以上厪宵旰之憂而無以為敬事之實一日治定功成民淳俗化瞻宇宙無復可為君臣之間動止相慶孰能以憂治危民之意致之言動之間哉禹之事舜則有異是焉者盖自洪水方殷受任平治吾觀舜之所以命之者曰汝宅百揆曰亮采惠疇其委任付托之重有非一時羣臣所可並者禹以一身膺委任之重其所以闕而祗順者宜何如其盡吾力也今也地平而天成闕而三事和當是之時徳洽民心光至海隅恭已無為于闕東漸西被之聲教有不知其所以然者皆禹之力也回思下民昬墊之初底於今見四方風動之效其艱難如此繼自今告厥成功之後亦可以少致吾敬君之初意而廟堂之上都俞相與自此亦可以少寛其憂矣而禹之意則曰君臣教理之道不難於未治之日而難於既治之時逸居無教之初不可以易心為之而萬邦作乂之後正當以為難而不可以為易也矧宇宙生民之責萃於君相之身一理有虧即君道之所欠匹夫不被其澤則受闕職任夫事者其責有不得辭天下至大玩心易生罔遊于逸罔滛于樂伯夷之言所當戒也兢兢業業一日二日萬幾臯陶之謨不可忽也謹御轡於康莊之途慎舟楫於恬静之頃則徳化之已敷者益深治功之已盛者益著盖至闕而禹承敬之意而後為盡耳雖然君道如舜臣道如禹臯稷契亦云至矣而禹猶拳拳焉何哉吁此其為聖人之治也盖聖人之心徳愈盛而愈下治愈隆而愈不足其闕警戒之意凛然若遭至危而臨大患者盖其心真見治之不足恃非心實自足而姑為是責難之辭也吁太和文徳之治非後世之所可及歟嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克求言而任賢盛治所由基虗己以好賢聖人之所獨夫惟善道登用而後天下無不安之民亦惟聖人在上而後天下無不用之賢茍非聖人莫能及也是故言之上者無所伏人之賢者無所遺其有以使天下之民咸被其澤而得其所者宜矣然非聖人之忘私順理豈能稽衆人而使善言之不棄非聖人愛民好士豈能不虐不廢而使賢才之無遺此所以惟帝能之而非常人所及也禹以克艱之道望之舜舜以克難之效歸之堯聖人之於治不敢自謂其已闕如此云云天下之安危係乎善言之進退而善類之闕又係乎君心之公私言治者所以深探其本而極陳之也盖言者所以通上下之情賢者所以立邦家之基茍善論有一之未達賢才有一之或遺則民之不得其所者多矣然則謂天下之安危不係乎善言之進退不可也諫在臣聽在君徳在人用之在君茍非人君有大公無我之心有視人猶己之量則䜛諂至而公議㣲禮貌衰而賢者去欲賢無遺而言罔攸伏得乎然則謂善言之進退不係乎君心之公私不可也古人之能盡此道而致此效者其惟帝堯乎賤而芻蕘皆得以盡其情㣲而草茅皆得以伸其論則善言固無所伏矣居寛閒之野皆將有職於朝處寂寞之濵皆將有位於列則賢者固無所遺矣夫是以政闕而民安風移而俗易四方有磐石之固天下猶泰山之安萬邦咸寧亦其效之所必至也雖然訑訑顔色拒人於千里之外一夫不獲闕主罔與成厥功茍知有已而不知有人欲言之畢達者猶之覆巢取邜而鳯鳥不至刳胎焚林而麒麟不遊茍虐無告而廢困窮欲賢者之畢集也難矣聖人惟知乎此也博詢衆庻而不惮咨訪之勤聞善則從而無係吝之意衆人之言且樂聞之則言之善者可知矣善論豈有抑而未達者乎民之顛連而無告人所易虐者也而不之虐士之困而處窮人所易廢者而不之廢於無告困窮且加意焉則人之賢者可知矣賢才豈有不録者乎夫惟大公無我故能舍己以從人惟其徳盛禮恭故能不虐而不廢㫁以惟帝時克者非常人之所能為也惟之為言獨也堯之外無餘人克之為言能也堯之水莫能及自非聖人深見其道之未易盡安能究極至此也哉程子曰舍己從人最為難事已者我之所有雖痛舎之猶懼守己者固而從人者輕此所以非帝堯莫能及也雖然舜紹堯致治者也重華恊帝固有自來觀其好察邇言取人為善則言之嘉者必無所伏矣元愷登庸九徳咸事則人之賢者必無所遺矣當是時也庶政惟和萬國咸寧則天下之民固無不安者矣君臣告戒方且指此為克艱之目而不敢自謂其必能其戰兢惕勵不自滿足之心為何如哉孔子曰博施濟衆修己安人堯舜其猶病諸亦可謂知聖人之心矣嘉言罔攸伏野無遺賢萬邦咸寧善言無不達賢才無不用則天下之民亦無不安矣夫天下安危係於賢才之用舍而尤係於言論之通塞也故當㤗和之世言之嘉者既無所伏於下人之賢者又無或遺於野廣延衆論悉至羣臣如此則萬邦雖廣又焉有不得其所者乎善類聚於朝而善治形於下固有不期然而然者矣云云嘗謂人君之治天下孰無任賢使能之心賢者之生斯世亦孰無致君澤民之念哉而匹夫匹婦有不被其澤者何也謂言已聞而不必咨不知伏於下者之難逹也賢已用而不必求不知困於側陋者之難進也夫忠言讜論有不盡聞則何以周知生民之利病端人正士有不盡用則孰與任天下之事功以是而求治安不猶郤步而求前倒植而求茂不可得也聖人知其然故賞諫諍以来讜言集衆思以廣忠益使凡古今理亂之故政治得失之由孰為利而在所當興孰為害而在所當去茍可以安國家利社稷者知無不言言無不聽則天下之嘉言舉無所隠伏矣旁招俊乂而有徳者無不舉矣翕受敷施而有善者無不容使凡懐材抱藝者皆將有職於朝而無考槃在澗之譏佩仁服義者皆將陳力就列而無白駒空谷之歎則在野之賢舉無或遺者矣夫善言必達則治不昧於所施賢俊登庸則政不失於所付將見道徳之所薰陶教化之所浹洽躋斯民於仁夀措斯世於平康而凡胙土分茅星羅棊布者又安有一邦之不蒙其休而一夫之不獲其所者哉謂之咸寧信乎天下之民舉安矣嗟夫為治固有其本而致治必有其要人君惟能受言如流求賢如渇而萬邦為之安此固為治之本也欲言之罔伏在於舍己而從人欲賢之無遺在於不廢困窮之士是又至治之要也然非忘私順理愛民好士之至何以及於此哉帝舜不敢自謂其必能而歸之惟帝時克其一念克難為何如也有虞之治豈偶然哉帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君聖人萃盛徳於一身故有為於三才之主宰盖大徳者必受命聖人所以富有四海而貴為天子也吾於古之帝堯見之帝堯之徳廣大而無外運行而不息大而能運則變化不測故其妙於無迹則為聖為神顯於可見則為武為文皆此徳之充周殆非言語形容所能盡也夫以是天鑒厥徳用集大命俾之悉有四海而君臨天下焉其付畀之重為何如哉云云皇天無親惟徳是輔天難忱斯命不易哉未有盛徳不足以格天亦未有天命不佑於有徳者也故用集大命而撫綏萬方必齊聖廣淵之成湯也誕膺天命以撫方夏必徽柔懿㳟之文王也湯也文王也初無心於得天下而天自不能不命之天豈私厚於聖人哉盖天之於物栽者培之傾者覆之因其材而篤焉則眷命之隆付托之重自不容舍盛徳之聖人而他適矣天於成湯文王如此則其於帝堯可知矣且堯之徳何如哉自其大而無外者言之則如天之無不覆幬也如地之無不持載也自其運行不息者言之則如四時之錯行如日月之代明也以言其聖則大而能化非方體之可拘以言其神則聖不可知非推測之所能及𤼵强剛毅足以勘定其禍亂此固赫然可畏之武賁飾禮樂足以經緯天地又所以為焕然成章之文盖聖神武文以粲然有倫者言之其小徳之川流廣運以渾然本體者言之其大徳之敦化聖人之徳如此天於聖人當何如哉眷而顧之所以使之有四海也顧而命之所以使之君天下也四海至廣而聖人有之則尺地莫非其有矣天下至大而聖人君之則一民莫非其臣矣至富之無敵至貴之無倫如此聖人果何以得此於天哉無他有大力量則有大負荷夫以四海之廣羣生之衆皆受制於一人非聦明睿智足以有臨其孰能與於此帝堯自唐侯特起為帝凡其綏來動和而措天下如太山之安除殘去暴而躋羣生於仁夀之域使雍熈之治獨高於五帝而冠絶乎百王皆神聖武文之功用也而豈徒然哉或者以為益之此言非以美堯且以規舜是未知頌美之辭異乎規戒之體者也又烏足以知聖人也哉雖然舜紹堯以致治者也濬哲文明温恭允塞舜之大徳亦堯之大徳也厯數在躬故自耕稼陶漁以至於帝舜之得位亦堯之得位也先聖後聖其揆一也而何以優劣疑之哉抑又論之大徳為必受命者其常也若吾夫子温良恭儉讓之徳止聞侯國之政終不能朝諸侯有天下者是又其變然而堯舜能以其道治天下孔子又推其道以教萬世其功又有大於堯舜者焉善乎宰我之言曰以予觀於夫子賢於堯舜逺矣益曰吁戒哉儆戒無虞罔失法度罔遊于逸罔滛于樂任賢勿貳去邪勿疑疑謀勿成百志惟熈罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王大臣嗟嘆以進戒於其君盖欲其君道之無不盡而致其逺人之無不服也夫逺人豈易格哉顧君道之盡何如耳為大臣者豈容已於言乎昔者益之戒舜其知此矣先吁後戒而欲使其聽言之審首曰戒哉而能致其陳善之誠盖君道至難盡也盡之之要未有不自此戒而始也况當天下無虞之時法度未至於廢弛故戒失墜逸樂易至於縱恣故戒其逰滛言此三者人君之所當謹畏也然未可以為至也任賢以小人間之謂之貳則欲其勿貳去邪不能果斷謂之疑則欲其勿疑謀為揆於理而未安者則勿成焉志慮謀於心而未發者則惟熈焉罔違乎道義之正罔咈乎人心之公於是八者皆人君之所當戒懼者也果能以此道而無怠於心無荒於事則治道益隆四海之逺莫不歸往盖有不期然而然者矣為人上者可不以君道而以為来逺人之計哉云云伯益闕禹克艱闕之謹其㫖如此闕之言而人主不可闕之助闕以為闕則不闕論以闕戒之一辭闕立闕之闕果何所見於此哉盖治不忘闕不忘闕此大臣之闕而欲其君道之無不盡也夫闕所闕為所當為闕之民未有不心悦而闕者矣治道闕四方闕之心雖不期於逺人之至而逺人之闕義嚮化自闕於聖人之世矣伯益之道戒其知所當務哉夫戒之為美大矣大臣所以闕戒哉闕辭而寓其深長之意者闕不切事情之談以闕而闕動其君之聽哉盖戒者一闕之凖百為之原為君而茍不知戒則理欲之分不明而修己治人之道廢矣故當朝廷清明海宇寧謐此天下無虞之時也人君於法度則易失於逸樂則易縱惟儆戒之心先入以為之主則法度之扄牖吾見其能守矣逸樂之萌芽吾見其能杜矣夫如是則心正身修義理昭著而於人之賢否孰為可任孰為可去事之是非孰為可疑孰為不可疑皆有以寓其㡬微而絶其蔽惑之患故其天君泰然百體從令清明在躬志氣如神而於天下之事孰為道義之正而不可違孰為人心之公而不可咈皆有以處之而不失其理焉益之此言甚有次第詳其懲戒之本㫖無非欲人君以是八者内無怠於其心外無荒於其事盡君道之所當盡而致其治道之隆則逺人之歸可計日而待矣雖然聖人之治不過九州東夷西戎言語不通未易格也南蠻北狄道路寥逺未易至也今也合四夷之衆而無間於来王之心是豈無其故哉亦惟聖人君道之能盡耳伯益之為帝舜規其㫖微矣嘗因伯益之言而思之舜帝徳罔愆由仁義行而於逸樂無有也元愷登庸四凶擯斥而於邪正之辨至明也兢兢業業善與人同其於君道無不盡也夫聖莫聖於舜而益豈不知之其進職之闕而不足者何哉盖大臣憂國愛君之心闕欲勉其所未至况處乎崇髙之位所以儆戒者當如是也厥後周公之告成王抑亦得伯益之遺意者歟觀其無逸之書以嗚呼而發其端以無皇耽樂而為之戒其意古之大臣務引其君以當道而盡責難之恭吾於伯益周公見之矣有志於唐虞成周之盛者不可不考於斯帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不矜好生之徳洽于民心茲用不犯于有司君徳寓於立法行仁者其感深民心叶于遷善逺罪者其化盛此聖人之所以感乎下與斯民之所以化乎上者一人心之相為流通也昔帝徳之罔愆而臨御以寛簡為本凢其用刑行賞或有所疑則常屈法以申恩不使執法之意勝其好生之徳此其仁愛之心得以行乎常法之外而入于民心之深也上焉而好民之心如此下焉而自好其生者莫不觀感向化之同遷善逺罪之至而不犯于有司之法矣吁此臯陶以帝舜美其功而歸功于帝也歟云云大哉仁心之相周流乎其所以為聖徳君臨之至而民心向化之機乎何則天地之大徳曰生則天地生物之心而已聖人以天地之心為心所以好民之生者此也斯民以聖人之心為心則所以自好其生者同此心也聖人而好民之生則君臨于上而不忍于法者非此心之所由推乎斯民而自好其生則向慕于下者非此心之所感乎一心流通貫徹乎君民上下之交而斯民之不犯盖在於君徳之好生矣且臯陶為士師之官則上不用刑而下不犯法者臯陶之法守也何拳拳于帝之徳歟盖謂帝徳之盛非一善之可名而無一毫之或過也上煩密則下無所容而帝之臨下以簡則無煩闕之法矣御衆者急促則擾闕而帝之闕衆以寛則無闕之政矣刑闕惡而闕而令則逺延于世矣闕所犯雖大必宥不忌故闕必刑則凢刑罰之用不亦原情而定罪乎罪有可疑用輕以罰之功有可疑則重以賞之以其刑罰之施不亦刑而厚賞乎一或殺之則恐陷于非辜不殺之則或失之輕縱是又非聖人至公至正之心矣而聖人則曰與其殺之而害彼之生寧姑全之而自受失刑之責此其仁愛忠厚之志何莫非帝徳罔愆而好生之本心哉是心也黙寓于用刑行賞之中洋溢乎屈法申恩之日則其深入人心者不啻淪于肌膚浃于骨髓由是而斯民漸染於徳化之中者曰吾君而不忍傷民之生而吾民者可不自愛其生乎茲其所以遷善逺罪而不犯于有司也由是而沐浴膏澤之下者曰吾君而不忍殘民之生為吾民而可不自好其生乎茲其所以趨善避惡而不犯于有司也夫刑期無刑者有司之責而斯民之不犯則吾君好生之至焉辟以止辟者固有司之職耳而斯民之不犯則吾君好生之至焉上有好生之徳則下有不犯之休此臯陶以斯民之不犯者歸美于舜歟前乎此而舜之訓曰惟刑之恤哉既而命臯陶者曰惟明克允者矣至此而歸美于臯陶也則以惟茲臣庶罔或干于正者言之臯陶豈媿於帝舜之命哉今也不居其功而歸功于舜抑又知所本矣而舜之意則未然也故曰俾予從欲以治四方風動時乃之休則舜之拳拳於臯陶者何如哉嗚呼臯陶作士而不有帝舜之徳固無以使民不犯而刑措不用也帝舜好生而不有臯陶之功亦何以奉宣良法而廣上之徳意耶傳曰舜以不得禹臯陶為已憂信矣人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽弗詢之謀勿庸存於内者守乎理之正接乎外者絶乎人之私此聖人傳心之要也盖聖人之所以為聖者以其内外之交相養乎昔者舜之命禹謂夫人心本一囿乎形氣則為人心本乎性命則為道心心非道則無所主而愈危道非人則無所寓而愈㣲誠能精以察之一以守之則此心所存純乎天理之正而此心所守莫非至中之體允而執中又安有過不及之失哉然心學有全體所當信者天理之公所不當信者人情之私彼無稽之言者不師古之言也弗詢之謀無叅考之私謀也其與中相反甚矣必也拒之而勿聽絶之而勿庸庶乎私情不為天理之累而執之有得於中者亦固焉吁内外之交相為養斯所以全其大中之道歟云云嘗謂人皆知聖人之謹諸内所以全吾心之天而不知聖人之謹諸外亦所以全吾心之天盖謹諸内者存誠之本而謹諸外者閑邪之機始焉養乎内以察其外終焉制乎外以安其内内外之間夫亦兼致其謹而已且人皆有是形也故雖上智不能無人心心皆有是性故雖下愚不能無道心是心也一而二二而一者也是故舎道而狥乎人則蕩於情欲將危殆而不安矣離人而求道則流於虛無益微妙而難明矣精以察之而常使人心不汨乎道心一以守之而常使道心不陷乎人心夫如是而後有依據無所偏倚而此理體以具所謂中者信乎其可執而不失其理之正矣雖然中有所執是果無所用其心哉天下之理㑹於一致㪚於萬殊運闕無乎不在交際之頃尤聖人之所深慮也盖人惟一心闕之者衆一聽之不審則彼之投此之闕也一謀之闕則彼之謀此之蠧也是故闕辭之蔽闕之闕之言也乃人情之私也要當絶之而不闕曰中道之已執可保其不作闕其中此聖人養心之極功傳心之闕㫖舜禹授受之際是將何求哉自是以来成湯文武之為君伊傅周召之為臣既皆以此而接乎道統之傳吾夫子雖不得其位而所以繼往聖開来學其功盖與堯舜並魯論一書皆聖人言行之所萃觀其曾子一貫歎中庸之鮮能無非以精一之理示當時學者至於口給之屢憎佞人之必逺尤汲汲為申言之盖與大舜無稽勿聽弗詢勿庸論越宇宙而同一關鍵也噫微聖人吾誰與歸臯陶謨臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠􅀺民懐之大臣美其言而欲盡知仁之事同列嘆其難而推論知仁之效盖知仁二者誠治道之所係而欲行以致其效則未易能也觀禹臯陶答問之辭乃見矣方臯陶嘆美而言也以為知以知人仁以愛人二者乃為治之要道固不可偏廢也而禹吁而不盡然之以為既在知人又在安民二者兼舉雖帝堯亦難能之何也盖知人則見之明而能盡官人之道安民則恵之博而能致􅀺民之懐知人之效其大如此是果可以易能哉大臣知知人之效為甚難則必行以求之矣嘗謂用人之當否乃治亂之所係而民心之叛服又興亡之攸基二者之間不可不加之意也然官人非難而盡知人之道為難使吾心之明無幽不燭則不患用人之不當矣得民非難而盡安民之道為難使吾心之仁無逺而不届則不患民心之不歸矣何也盖天下之人善惡之相雜知愚之相混茍吾之明不足以察之則君子在野小人在位者有之矣此知人所以為難也天下之民好尚之不齊從違之靡定撫之則后虐之則讎茍吾之恵不足以周之則暑雨祈寒民情怨咨者有之矣此安民所以為難也大禹臯陶之相答問必聲嗟氣嘆而不自己者其亦有見於此歟甚矣人心之不可不察而民情不可以不安也玉表者石中鳯鳴者鷙翰優於趙魏老者不可以為滕薛大夫此為治所以必在於知人也寒者欲衣饑者欲食鰥寡獨孤者之欲得其所此為治之必在於安民也二者有一之或缺焉則非所以為治矣然臯陶既嘆美而言之矣禹之大聖宜亦心領而神㑹矣乃吁而不盡然之復以為二者兼舉雖帝堯之聖亦難能之何哉禹之意豈不曰知人知之事安民仁之事也其知如神莫帝堯若矣然驩兠之咨共工之舉猶不能無惑焉則知人非帝堯之所難乎其仁如天亦莫帝堯若矣然博施濟衆修已安人猶且以為病焉則安民非帝堯之所難乎仁知兼盡其難如此然非可以畏其難而自阻也惟思其艱則可以圖其易耳誠使察人之際果能有克知之明灼見之真則此心湛然如鑑之空而妍􅑦醜惡自莫能逃於前矣如是而官人吾見在官皆賢能之選列職皆俊乂之才寧復有不勝任者乎治民之際果能視之如傷愛之如子則徳洽民心如春之融而元元總總無一夫不被其澤者如是則􅀺民之衆皆懽欣鼓舞而無異情懐服愛戴而無違心寧復有梗化者乎嗚呼知人安民之效其大盖如此哉然嘗論之臯陶之謨實推廣上文未盡之㫖也臯陶既言修齊治平為治道之大綱矣復因禹之俞而言節目之要惟在於知人安民而已盖人者已之輔民者國之本人君所當用力莫切於此能知人則為庶民勵翼之權輿矣能安民則為近悦逺来之樞紐矣治平之要不外乎此此禹所以為甚難而臯陶復以知人安民之謨陳也帝舜在上而臯陶之所答問者猶如此所以唐虞之時野無遺賢而萬邦咸寧也歟雖然知人安民固為治之大端而知人又安民之本也盖君之仁不能自達於民推其愛以及於民者尤有賴於臣焉故賢否不擇而庶職隳廢則人君雖有仁心仁政而民不被其澤矣果何所恃以為安耶此孟子所以曰堯舜之仁不偏愛人急親賢也觀書者必有考於斯日宣三徳夙夜浚明有家日嚴祗敬六徳亮采有邦翕受敷施九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝賢材之成徳各有所宜故人君之用賢各稱其徳而治效為無間也夫官人之要量材録用而已盖世無全人惟賢材有偏長之徳茍非人君合衆徳而並用之則何以成天下之治哉昔者臯陶之告帝舜也謂賢材非一端有三徳者能日宣而夙夜浚明則使之有家有六徳者能日嚴祗敬則使之有國是賢材之成徳固難然人君之用賢尤難必也合受而敷布之則九徳之人咸事其事而俊乂皆在官矣上焉百僚相師以及時而趨事下焉順四時而衆功皆成焉然則賢材自然之徳各著其邦家之際人君當然之任每極乎庶績之成非善於官人者孰能與於斯云云其㫖如此嘗謂九徳為賢材自修之本而用賢又人君致治之原是何也自賢材而言之則九徳之備於身者有多寡之殊而職任之宜於外者有大小之别三徳而為大夫六徳而為諸侯焉自人君而觀之則九徳不必兼全於一人而任賢必各隨其差等量材審官度徳授位大以成其大小以成其小則朝無曠職野無遺賢而天下之治有不期然而然者矣茍為不然凢九徳之宜於家邦者雖皆可官可使之仁賢而人君每責備九徳於一人之身借曰國有仁賢有而不用有若無耳天下奚其治是以臯陶概言賢材成徳之目於其前而詳伸人君用賢之道於其後反覆丁寧其告君之意至矣且夫三徳六徳者九徳之中有其三有其六也九徳有其三而能日日宣明以充廣之早夜浚明可以為卿大夫則使之有家焉九徳有其六而能日日嚴祗敬之以治政事則使之有國焉此豈非賢材之成徳各有所宜者乎然有九徳者賢材也能用九徳者吾君耳徳之多寡雖不同而人君之舉用則無遺翕受則合衆徳而並舉之敷施則合衆徳而徧布之俾其大而千人之俊小而百人之乂皆在官使則夫朝廷百僚率相闕法無一官之非賢也内外百工及時趨事無一職之或廢也言其人之相師則曰百官言其人之趨事則曰百工其實一而已官得其人則事無不舉五辰者四時也木火金水王於四時而土則寄王於四季也百工趨事則能順五辰而不失其序矣庶績者衆功也如春之修舉政事夏之勞民勸農秋之禁暴誅慢冬之謹盖蔵歛積畜即所謂衆功也撫于五辰則能成庶績而不失其凝矣此又豈非人君之用賢各稱其徳而治效為無間乎論至於此則知日宣日嚴之有家邦者即九徳咸事之人俊乂在官而庶績其凝者即三徳六徳之士原賢材之成徳不必分序九徳之目而著其實推人君之用賢則能惟以翕受敷施之言而揭其要所以深明官人者在於量材録用而已一節深於一節臯陶可謂善告君者矣抑論之臯陶之告舜一則曰在知人在安民一則曰知人則哲安民則恵此盖因言知人之事而及官人之道也其曰亦有九徳之行所以述其知人之目也其曰彰厥有常吉哉所以言其有常之實也所謂日宣日嚴非有常之謂乎所謂三徳六徳者非九徳之行乎天下無棄材而天下無廢事此唐虞之盛為不可及也嗚呼後世殷周克即宅克即俊與夫克知三有宅心灼見三有俊闕知闕官人之道猶髣髴唐虞之際三代之治所以並隆者良有以也柰何秦漢而降官失其人才勝乎徳其視翕受敷施之語豈不甚可慨也夫吁日宣三徳夙夜浚明有家日嚴祗敬六徳亮采有邦徳有多寡而日新之徳同故職有大小而明治之效同此聖人録徳定位量能授官之政也昔者臯陶陳謨於舜謂人於九徳之中有其三日宣而充廣之則使為大夫而復明其有家之政九徳之中有其六又必日嚴而祗敬之則使之為諸侯而亮采其有邦之政矣日宣日嚴皆所以致其日新之功故浚明亮采皆有以致其明治之效人君明治之要惟在於設官分職而已然設官分職豈拘拘於九徳之備哉夫徳固不可求全而位不可不稱其徳必求其備則下無全人而廢事多不量其材則徳薄位尊而幸位者衆小之不足以治一邑况欲大而可治一邦也亦難矣惟其徳足以勝任而猶不敢有自足之心進修之實在我者有加而無己則治效之見於家國者可以有隆而無替矣且夫人才品秩固為不齊總之為剛柔正直之三分而不出乎寛栗强義之九九者在人豈悉備而無缺哉亦隨其所有而取之耳九者之中有其三若寛而栗以至愿而恭之類是也豈徒貴其有是三者而已哉以其能日宣而充廣之使其徳之益以著也如是使之為大夫吾知其夙興夜寐不敢怠遑而一家之事皆將粲然而有倫秩然而不紊矣九徳之中有其六若亂而敬以至强而義是也然亦豈徒有是六者而已哉以其能日嚴而祗敬之使其徳之益以謹也如是而使之分茅胙土而為諸侯吾知其必能戒懼以自持戰兢以自保而一國之政皆將昭著而可觀振舉而不墜矣然則為政以徳果何事而不治亦何為而不成也哉雖然三徳而有家六徳而有邦亦特以徳之多寡職之大小概而言之初非拘拘於三與六而已也所貴乎人君者翕而受之敷而施之使九徳之人咸事其事大而千人之俊小而百人之乂皆在官使以天下之材任天下之治唐虞之時下無違才上無廢事良有以矣無教逸欲有邦兢兢業業一日二日萬㡬無曠庶官天工人其代之人臣之戒君既欲其慎於修己以圖治又欲其謹於用人以共治盖修已而不可縱者以事㡬之可畏而用人之不可輕者以所治皆天事也在昔臯陶於帝舜之前言人君無以逸欲而導諸侯而當兢業以圖治盖一日二日之間事㡬之来且至萬焉一日或縱則萬㡬荒矣此所以慎於修已而不可縱也既有以修於已又必謹於用人故又言人君無用人非其才而使庶官廢厥職盖人君代天理物庶官所治無非天事一職或曠則天工廢矣此所以必謹於用人而不可輕也嗚呼臯陶兩陳致戒之詞於其前而復兩陳為治之要於其後愛君之心為何如也云云嘗謂人主一心關係於天下為甚重下而諸侯之所取法者君也上而天命之所付托者君也人君任天下之重如此又安可怠於修已而慢於用人也哉盖致治之本固在於已而分治之則實在於人茍逸欲而怠荒則上行而下效一日縱欲則㡬㣲之禍著用人而非其才則上天之工廢此臯陶所以陳謨於帝舜之前也盖聲色之謂欲宴安之謂逸人君曷嘗以是教諸侯哉然處崇高之位而為天下之儀則上有好者下必有甚焉者矣故人君當以勤率諸侯而不可導之以逸當以儉率諸侯而不可導之以欲此所以修己而不可縱也為其修已而不可縱者以萬㡬之可畏也盖一日二日為至淺而萬㡬之来為至多故必戒慎恐懼以圖之不然則禍患之㡬蔵於細微一日縱欲則禍㡬著矣可不慎於修已以圖治耶雖然己既修矣而天下之大四海之廣豈一人之所能獨理故内而百揆四岳外而州牧侯伯設官分職與之共治而人君曷嘗使之曠職哉然庶官非無其人之謂曠用非其人則雖有其職如無其職矣此所以必謹於用人而不可輕也惟其謹於用人而不可輕者以天工之可畏也盖天下之事無一不本於天天不能以自治而命之於君君不能以獨治而任之於臣君也者代天而理物者也臣也者與之共食天禄而共治天職者也故在選賢任能不可用非才而曠庶官之職何則庶官所治皆天事也茍非其人則天工廢矣可不謹於用人以共治耶抑嘗考之帝曰咨汝二十有二人欽哉惟時亮天工則舜之不以逸欲導諸侯而兢業以圖之為可見矣不輕用人才而克相天事亦可知矣然臯陶之陳謨而戒之之切如此者盖惟聖罔念作狂惟狂克念作聖故聖君不以徳業已盛而忘儆懼之心大臣不以吾君無是事而忘規戒之益故能保治於無窮也歟且不特臯陶為然也吾觀禹之告舜曰無若丹朱傲惟慢逰是好豈非臯陶無教逸欲之謂乎又曰萬邦􅀺獻共惟帝臣惟帝時舉豈非臯陶無曠庶官之㫖乎他日帝庸作歌有曰勑天之命惟時惟㡬則深有感於君臣責難之意矣吁盛哉天聰明自我民聰明天明畏自我民明威達于上下敬哉有土天人之理為無二人君之心當無忽盖天人一理通達無間而敬而無忽是又合天人而一之者也是以在昔臯陶陳謨於舜謂天之聰明因民之視聽以為聰明天之明威因民之好惡以為明威民心所存即天理之所在人君敬而無忽是又合天人而一之者也盖敬則不忽乎民是即不忽乎天也有天下者而不知敬謹奚可哉人君居天民之兩間上則受乎天眷下則主乎萬民此可以理論而不可以勢觀也茍以勢而觀之則受天之眷惟知天之尊而當敬主乎萬民惟知民之卑而可忽於此知敬天而不知恤民者多矣以理而論則祐下民而作君師正欲其代天以治民也况民之所欲天必從之則天固不可不敬而民尤不可不恤豈可以差殊觀哉今夫高高而在上者天也林林而居下者民也天民之相去盖邈乎其不接也則天之聰明明畏謂之不自於民可也而曰自者何也盖天之聰明未嘗傾耳以聽下目以視但因民之視聽以為聰明天之明畏未嘗見其何為而彰善何為而威惡但因民之好惡以為明威耳民心所存即天理之所在則為人上者柰何不敬必也嚴恭寅畏以天命而自度治民祗懼不敢怠荒而安寧民雖至愚吾不以愚而忽之民雖至弱吾不以弱而易之則下可以得乎民之心而上可以合乎天之心是天人之理合于一者定于一理嗟夫世之人君固有岐天人為二致於是知敬天而不知恤民者多矣卒使民心怨於下而天變形於上由此推之則天人之理實相貫通而有國者誠不可斯湏而不敬也臯陶陳謨所以拳拳於此歟後伊尹之吿大甲曰皇天無親克敬惟親民罔常懐懐於有仁其即臯陶之之意盖無以異然則臯之謨尹之訓真有土者之龜鑒歟益禝懋遷有無化居烝民乃粒萬邦作乂聖人有以均天下之利然後民食足而治功成也夫利或偏聚而不均則民有不得其飬者矣治功何由而可興乎昔在大禹深慮乎此故於水患既平之後山澤之利己興懋勉其民徙有於無交易變化其居積之貨盖欲使之有無相通而利均於天下然後烝民乃得以粒食而萬邦得以興起其治功焉噫使聖人懋遷之政不篤則利不足以周天下而治效亦無由而著於天下矣云云嘗謂民之所資者粒也民之所急者食也天下之民所以享其利而遂其生者皆由於此而治化興行之機四海乂安之效莫不胥此焉出何也民者邦之本而食者民之天也夫民衣食不足則救死而恐不贍何睱治禮義及其家給人足之後求得欲遂之餘率之以善而知所勸威之以刑而知所懼然後以令則行以禁則止治功之興其孰能禦之哉民生於焉而可遂矣然而居山林者多材木居川澤者多魚鹽茍上之人不有以通之則農有餘粟而病於寒女有餘布而阻於饑民生之不遂者自若也故為之君者必有以懋勉其民使之徙其所有易其所無教者孜孜而不敢怠以其有餘補其不足者勉勉而不敢自己夫然後有無得以相通匱乏得以相濟天下之利無不均之患矣於是民生之衆糓不可勝食而無復阻饑之憂含哺鼓腹而非復前日艱食之比矣民而謂之烝民可以見其無一夫之不獲而林林總總之衆舉皆得其養矣夫聖人在上惟憂民失其養耳民得其養果何患乎治功之不成乎禮樂刑政由是而修明紀綱法度於是而振舉四方有風動之休而比屋有可封之俗矣邦而謂之萬邦可以見其無一所之不盡而東漸西被迄于四海舉皆興其治矣豈非民食足而治功成乎嗟夫聖人愛民之心無所不用其極也天錫禹以洪範九疇其三曰農用八政必以食貨為先盖食貨者所以養生也是時􅀺民方免阻饑之厄宜乎懋勉之意如此也雖然舜以臯陶既陳知人安民之謨因呼禹使亦進其言而禹乃厯述其治水之功以迄於萬邦作乂禹豈好為是夸尚哉不述其治水之本末則無以知萬邦作乂之由不知成功之艱則未有能保其功於無窮者禹吾無間然矣安汝止惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休人君宅心以圖治尤必資其助於臣天下同心以順治斯能必其應於天盖君臣之交修如此所以能得天人之交應也昔者禹之告舜謂夫聖人一心萬化之原止於至善而不可遷察於物欲而不能蔽此所謂順適天道心之正者然也夫既得其所止則能以之審其事之發而省其事之安矣至於左右輔弼之臣又皆盡其繩愆紏謬之職則其内外之交修而無有不至而圖治之要何以加於此哉夫如是則是惟無作作則天下之人罔不丕應固有先志而徯我者矣以是而昭受上帝而上天豈不重命而用休美之乎吁人君以一心之微而求感通乎天人之理可不盡其交修之功哉帝光天之下至於海隅蒼生萬邦􅀺獻共惟帝臣惟帝時舉聖人囿天下而有不可掩之徳故能化天下而無不可用之賢盖君徳著於上賢才興於下感應之機為甚速也古之大臣所以啟其君之聽而告之以為使帝徳光輝逹於天下至於海隅蒼生之地莫不昭灼徳之逺著如此則萬邦之廣􅀺民之賢孰不感慕興起而皆有帝臣之願惟帝時舉而用之耳盖當君徳大明之時正羣賢嚮用之日彼庶頑䜛説之未化豈足慮哉聖人化天下之徳者其機為至神天下化於聖人之徳者其效為甚速也盖陽和市氣則枯株朽甲無不為之敷榮皎日麗空則層氷積雪無不為之消蝕夫物則亦有然者矣而况於人乎故成湯有日新之徳則耕莘之伊尹歸之而不仁者逺矣文王有光于四方之徳則釣渭之太公歸之而天下皆義民矣夫以湯文之徳尚能作興天下之賢俊况大舜膺大徳而出日月照而四時行固舉一世而薰陶之其所以鼓舞多士而風動特其餘事耳而何憂於庶頑䜛説哉禹所以不敢輕易其言必呼舜而後告之欲使審於聽信者為何如也且夫天地為至大故有生之類無不覆載也而聖人之徳殆與天地同其大日月為至明故容光之地靡不照臨也而聖人之徳殆與日月並其明彼薄海之隅地之至逺者也而帝徳無逺而弗届蒼蒼而生物之至微者也而帝徳無微而弗燭舉天下之大民物之多無一而不囿於其間天涵地育之中日輝月霍之下均此生而均此性而均此徳者也懽感動盪之餘鼓舞作興之際將見懐材抱藝者孰忍自棄於明時耕莘釣渭者孰不欲致身於廊廟由是翕而受之敷而施之或以事舉或以言揚而無非可舉之賢矣徳之所以感人者如此推是以往雖金石可化豚魚可孚於庶頑䜛説也何有昔者有虞之時以重華叶帝之君而致比屋可封之俗顧乃猶有頑不即工䜛説殄行者焉明之以射侯而不能掩書之以簡册而不知愧刑以威之屏而不齒固未為過而大禹之心乃有不盡然者與其加之以威不若明之以徳惟知求諸己不必求諸人徐以待其自化惟徳動天無逺弗届至諴感神矧茲有苖之意禹之告舜與益之賛禹者同一揆也聖人之心天地生物之心歟厥後有苖逆命不格於大禹徂征之時而格於文徳誕敷之後於此見徳之足以感人而威刑之果不足恃如此唐虞聖人純任徳教其有以致雍熈之治也宜哉臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉大臣之形於言者固欲君心致敬以圖事功大臣之形諸聲者尤欲君臣相湏以圖治效盖君臣各盡其道治功固無難者然究其本則在乎君心一念之敬焉此臯陶所以先述其賡歌之意而後形為賡歌之辭觀其既拜稽以盡其禮復颺言以致其辭而所言者又以念哉為先焉誠以人君當總率羣臣以興事功而必謹守其法不可以不敬也庶事既興又必數考其功又不可以不敬此將賡歌而先述其賡歌之意也而其賡歌之辭乃曰君猶元首惟在於明也臣猶股肱惟在於良也君明則臣良而天下之事無不安其所曰明曰良非一念之敬者能之乎噫盡敬以致其辭則有以動乎君之聽聲歌以致其戒則有以感夫君之心臯陶其善於進戒者哉嘗謂天下之治由警戒而成至歌頌而極於歌頌之中而不忘儆戒之意固於有虞之君臣見之矣然臯陶作歌之意則謂事之始終惟在於敬其歌之辭則又謂必君明臣良而後可以成治功若不相合焉者何也嗚呼此臯陶所以為善於進戒者也彼誠見夫天下之事一日二日萬㡬非有明哲之君忠良之臣其能成始而後成終者鮮矣然而明良之道非存心以敬者不能也故君而能敬則天理存而私欲不足以汩其中此心之天虚靈洞澈而不患其不明也臣焉見君之明如此則必常懐忠誠之念而怠慢之氣不設於身體不患其不良矣君臣之際明良相逢天下之事其有可慮者乎此臯陶所以先以敬而啟其明良之端後作歌而期以明良之效也今觀臯陶之吿舜也其拜手稽首非諛以取容也不如是不足以盡吾誠敬之意也大聲疾言非矯激以為直也不如是不足以達吾忠鯁之藴也臯陶之忠誠既已見於辭色之間矣而復以念哉之説進焉盖謂夫事之未作當總率羣臣以興之而必慎守乎成憲茍成憲不謹則有紛更變易之患舊章或由是而亂矣而始之一念不可以不敬也事之既作尤必君心自察之而屢省其成功茍成功之不省則有誕慢欺蔽之失而庶績訖不能有成矣是終之一念不可以不敬也臯陶作歌之意既以達於君矣然後賡歌之辭乃繼續而進焉其賡歌之辭若曰君位乎上譬則元首也臣位乎下譬則股肱也元首者所以運乎衆體不可以不明非苛察之謂也股肱者所以衛乎心目不可以不良非詭隨之謂也知人則哲則盡君之道矣咸懐忠良則盡臣之職矣君臣上下尤有一體之相湏自朝廷而達之邦國由邦國而達之天下其綱紀法度備舉而不遺禮樂刑政四逹而不悖庶事雖多無一不各止其所者矣君臣相湏以為治其效固如此乎嗟乎萬世而下孰不知明哲之君足以立事功也而不知有其本焉盖敬體而明用也亦孰不知忠良之臣可以修職業也而不知實由於君焉盖君明而後臣良也君而有怠荒之心則物欲膠之而本體之明有時而昧矣况可以立事功乎君無知人之明則邪正不分賢否莫辨雖有忠良之臣亦無由而進矣又何以成治效乎臯陶將進明良之説而必克陳乎欽哉之論其善於進戒者歟然舜聖人也咨百官有欽哉之戒詢四岳有明目達聰之論固無待於臯陶之言矣然猶言之懇切而不能自己者盖帝作歌而責難於臣故臯陶賡歌必責難於君也君責難於臣則先股肱而後元首臣責難於君也則先元首而後股肱君臣之間賡唱迭和而相責者如此後世君臣相悦之歌果足以語此哉迨夫成周鹿鳴之歌有天保之答行葦之賦有既醉之報君臣之間一唱一和亦皆有更相儆戒之意此太和之治所以在虞周也舜與臯陶之賡歌為三百篇之權輿豈不信歟書義矜式卷一
