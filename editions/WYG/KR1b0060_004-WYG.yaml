body:
  text: 書義矜式卷四元王充耘撰周書泰誓惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方聖徳之著既無間於逺邇故王業之開亦無間於逺邇盖有聖人之徳者然後可以開興王之業徳無不著則業亦無不廣焉昔在文王其聖徳之光輝如日月之照臨也以言其逺則光于四方矣以言其邇則顯于西土焉文王之地雖止于百里而多方之受則皆在於有周夫文王非有期於徳之著而其盛自有所不容揜文王雖無心於多方之受而其歸自有所不容辭文王之天命人心既如此而文王則未嘗一日有之焉宜武王所以拳拳述之於誓師之際也嘗謂文王由方百里起何以其徳之著於天下哉文王為諸侯於西土而又何有於多方之受哉盖文王之心知所以修徳而不期於聖徳之著也知所以治其國而不期於王業之興也然其昭升敷聞自有所不能掩而天命民歸自有所不容辭者矣人徒知伐殷之舉在我武王而不知多方之衆文王已有以受之也人徒知多方之受在於文王而不知耿光之著者皆文王之徳也武王誓師而及乎此良有以歟今夫天之懸象莫大於日月也惟我文考之徳則與日月合其明也照臨下土莫大於日月之明也惟我文考之徳則如日月之無不照臨也逺而四方此徳之光無不被近而西土此徳之光為甚顯廸見冐聞于上文王之徳光于四方也惟時怙冐文王之徳尤顯于西土也是則文王之居岐雖不過於百里之地而文徳之光顯則無間於逺邇之殊地有逺邇也而徳無逺邇也文王之徳如斯其盛則有周之興其不基於此於是多方之受非我有周而誰哉是以大邦畏其力小邦懷其徳近而虞芮之質成逺而化行於江漢則所謂修和有夏不止於岐豐之百里矣受有殷命不惟三分天下有二矣則是殷之功雖成於武王而多方之歸實受於文王矣聖徳之著既有以為王業之本而王業之興則莫非聖徳之效也故武王誓師不曰受命文考則曰其承厥志則多方之師信在於文王而武王特卒其伐功而已抑又論之建邦啓土則后稷之封殖也克篤前烈肇基王迹則有公劉太王焉其勤王家則又有王季焉我周之興明徳逺矣多方之受盖有自來矣夫以積累之勤非一朝根本之深厚非一世又有文王之聖以繼之而文王則守其事君之小心未嘗一日有之焉此文王所以為至徳也至於武王則天命之歸人心之懷雖欲却之而有不可得者矣此武王所以善繼志述事也此武王所以為逹孝矣嗚呼盛哉牧誓武成惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懷其徳王業基於前而有積累之盛聖徳興於後而兼威徳之著夫論國家興王之業而必述其祖宗之勤則天命人心之歸固有自來矣昔武王之告羣后盖謂我周之建邦啓土則后稷之封殖也克篤前烈則公劉其人也至于肇基王迹而其勤王家則又有太王王季也是王業之開固非一人而積累之功固非一世矣我文考文王則又克成厥勲焉大受天命以撫方夏大邦小邦莫不畏其力而懷其徳焉則聖人之繼於後者又得其盛也不有前王之迭興無以開興王之業不有聖人之嗣興無以成興王之業則我周之有天下夫豈偶然哉嘗觀三代王業之興而有知天命之不易矣則稷契皆興於唐虞之佐而契之後十四傳而有湯稷之後十四傳而有文王後世推論王業之所由而配之廟有𤣥王先王之追稱以明積累之基於前又必盛陳威徳之著以見聖人之嗣興於後其意深逺矣當武功告成而有周廟之祀侯甸男邦采衛暨百工受命之初而武王之言至此又首以嗚呼之辭則我周之興明徳逺矣豈無故而然耶且唐虞之時棄為后稷則周之建邦啓土記后稷之始則於邰也公劉乃后稷之曽孫故謂之克篤前烈其所謂能修后稷之業者乎至于太王實始翦商則太王雖未始有翦商之志而王迹之基實肇於此矣王季繼乎太王而又能其勤王家焉則王迹之肇基日益盛矣自后稷而公劉自太王而王季非一世也既建之而後篤之既基之而復勤之則積累之功有自來而王業之開亦可見矣至我文考文王則積累之功乃克成之焉其命維新即文王之誕膺天命修和有夏即文王之以撫方夏也既伐于崇作邑于豐則大邦有不畏其力者乎虞芮質成化行江漢則小邦有不懷其徳者乎畏其力則不敢放肆矣懷其徳則得自立矣然文王由方百里起以至三分天下有其二曷嘗一日而有得天下之心哉故不期於受天命而撫方夏也天命之歸方夏之撫自有不期而然者矣文王之克成厥勲有如此哉然則人徒知伐殷之功在於武王而不知王業之成乃文王之威徳也人徒知王業之成在於文王而不知王業之開乃積累之功非一世也武王拳拳以是告于羣后良有以歟抑又論之中庸言武王纉太王王季文王之緒則不及乎后稷公劉也武王之誓師而言惟我文考則又不及乎太王王季也盖即其近而言之則王迹之基實始於太王王季至於武王之有天下則實文王已成之功故一則曰其承厥志一則曰受命文考則文王又非特如太王王季而已也至此而歴叙之則又以明其封殖之始在於唐虞歴夏商而王業之基已乆至商之季則天命人心之歸周者益盛武王之有天下豈有一毫之私哉亦以天命人心之不可辭而累世之功不可不卒之而已也合而觀之益以見三代有道之長而非後世所可及也洪範天乃錫禹洪範九疇彝倫攸敘道之出於天者若有異數道之由於人者則無異理道一而已善言天者必有徴於人非彛倫之外復有所謂洪範洪範之數雖有九而其理則不異於常道也且禹所敘而言則謂之彛倫彛倫之實雖不出於常道而其理則一本於洪範也然則錫之者雖於天而敘之者則在禹禹之有功於人道乃所以有功於天道也云云夫聖人者繼天而立極者也繼天者何天以是理示於人非聖人為𤼵揮則大法無自而明也立極者何人得是理以生非聖人立之標凖則常道無由而行也是聖人一身上以承天之托付下以為人之則效凡其所以明乎人道乃所以闡乎天道也人徒見錫於天者為洪範故謂洪範為大法敘於禹者為彛倫又謂彛倫為常理殊不知分而言之曰數曰理若見其異融而通之曰天曰人初無二致凡其出於天而秩然者即其付於人之本然者也凡其錫於範而隱然者即其敘於倫之顯然者也曽謂聖人之立極也而非所以繼天者乎何以明之道之大原出於天天雖無聲無臭㝠㝠之表必有黙為之主宰者也夫主宰是道不錫之他人而以錫之禹者是非禹不足以當天之付托也禹既足以當天之托付則神龜之負文而出於洛者乃所以黙啓其心也豈必諄諄命之而後謂錫哉然而龜背之文前一後三左七右四前七後六右八後左二前九者人見其為數也而禹則見其為理人見其為異也而禹則見其為常於是因其自然之數而明夫當然之理自初一以至次九或自天而之人或以人而参天因其一二三四之數而敘之則五行五事八政五紀之制明矣因其六七八九之數而敘之則三徳稽疑庶徵福極之理著矣由五行以至五紀各得其用而皇極之用以行是則所謂彛倫攸敘也然不曰敘夫彛倫者禹不過因其自然而不泊其理由其當然而不乖其宜使不至於拂乎人之天而已非有所勉强矯飾而為之也是則所謂彛倫之敘也是即所謂洪範之疇也自天而言則謂之理自禹而言則謂之敘曽謂人道之外復有所謂天道者乎方禹之時堯舜在上彛倫未嘗不敘而敘之者又何待於禹耶殊不知當時洪水為患昏墊蕩析使斯人不得以遂其生萬物不得以遂其性者是彛倫之攸斁也五行居九疇之首禹之所治者雖不過五行之一事然地以之平天以之成而六府三事以之而治是又彛倫之再造也然則彛倫之敘在於治水之時者禹之所以替夫天也洪範之錫在於治水之後者此天之所以眷闕禹禹闕是道以示諸人者豈徒闕於萬世也奈何由夏而闕平者箕子也其功不在禹下一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘舉造化之綱而列其目者有其序推造化之藴而著其用者非一端夫天生五行民並用之明疇君子茍惟順其序而數之不推其藴而申言之何以致造化之妙用哉箕子為武王陳洪範因九疇之次第首之以五行焉其以水火木金土屬乎一二三四五者盖順造化自然之序也然特即其綱以列其目耳若夫水火也而潤下炎上木金也而曲直從革此以其性言也土之於稼穯又以生之徳言矣其曰鹹苦酸辛甘者五行之味也所以作之則自潤而下豈一端而止乎箕子所以反覆屢言之而不厭也大哉五行之造化乎其隂陽之殊體人物之統宗乎何其妙運不已而致用無方也即其垂象於天則麗乎七政即其具貢於地則修乎六府而氣運之推遷則成功於四時開闢以來未之能改也龜書出洛神禹第之以五行當初一之疇標九數之首豈偶然之故哉然而不言用者以其無適而非用也箕子而推衍為範提綱挈目其足以析其藴奥必也探徳性之淵微舉民用之􅋀近互文申義次第以陳之然後聖人所以著造化之至妙者可知矣今夫箕子所謂一五行者因乎禹疇之先後而異乎洛書之本文也總而揚扵上以見造化之綱分而列於下以備五行之目一至五皆係之以曰者猶云其名若此也五行之數求之天地生數既無不合参之物體微著之漸又無不然何則天一所生者水也地二所生者火也而物生之體水最微而居一火漸著而居二固其序也天三生木而木之形實而以三居之地四生金而金之體固乃以四居之及其天五生土而土之質極其大扵是乎次以五終焉是盖造化一定不易之序非可以安排布置於其間也安得不順而别之乎然而造化之藴極乎自然之神妙者即此而𤼵則有以見五材之實為民用矣此所以不容列其目而遂已也由是以五行之性而言則其潤澤滋溢而就下莫禦者非水性乎炎燥灼爍而氣燄騰上者非火之性乎其或曲而盤錯也或直而森竦也與夫鍜礪之而皆從器使之而可草又非木金之性乎謂之曰者猶言其性然爾也至於土何獨不然盖其性不一非可專名而其生物之徳則莫盛於稼穡也播種之謂稼斂穫之謂穯不系以曰而以爰者言土之徳於是乎稼而穯也然則造化之妙將止於此乎曰未也五行有聲色氣味甚不一也箕子又申言其味者特以其切於民用而有取焉耳夫潤下之水非固鹹也凝結之乆遂作鹹矣炎上之火非本苦也焦灼之乆遂作苦矣曲直之酸亦非木之初生者然也從草之辛又非金之初鑛者然也至於稼穯之自苗而秀既秀而實然後甘之味以成故皆謂之作者即其變化而言也五行有定體而變化則無方茍指一物而求一味則不足以達其造化之妙用矣嗟夫箕子敘列五行之後一言其徳性以𤼵其微再言其致味以著其實一五行之造化武王尚有未䆒者乎雖然合九疇而觀之以人而参乎天則貎言視聽思之分配已不越於五行稽疑卜兆之分屬無非徵休咎之類應又不越於五行宜乎世之説洪範者有曰五行㪚見於九疇而皇極則以五行之理而統㑹之也大哉造化之功用乎三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司冦七曰賓八曰師君子陳八政之疇而有緩急之序此可見為政有先後之宜矣此君子之論政所以深得其要也洪範九疇皆天人之大法而八政之疇實居其三君子以為政非徒政也而又有其序也夫食貨以養生祭祀以報本此政之所當先也故一曰食二曰貨三曰祀焉司空以安居司徒以成其性司冦以治其姦此亦政之不可後者也故四曰司空五曰司徒六曰司宼焉至若往來交際而賓之禮不可缺除殘禁暴而師之威不可無此亦政之不可已者也故七曰賓八曰師焉洪範九疇皆天人之大法而備治天下之本末八政一疇又皆為治之具則莫詳於八政之一疇矣何者皇極聖人有為於斯世其所以為政者緩急先後必有其序矣推其序之不紊然後政可得而行焉昔在有虞則九官之所總者皆在八政之所事也其目有不同而其所以為政之事則不異焉箕子之論亦必有以兼帝王之制矣是故洪範之疇而八政實居其三次乎五行五事之後而居於五紀皇極之先誠以養民之務莫大於政也君子豈徒陳乎政而已哉其所以為政之目則有其序焉食者民之所急貨者民之所資而祭祀者又所以教其報本也分田制産教之樹畜而食之政修懋遷有無通功易事則貨之政修郊祀之禮禘嘗之義而祀之政無不舉矣為政莫先於養生尤莫大於報本也此一曰食二曰貨而即以三曰祀繼之也司空掌土所以安其居司徒掌教所以成其性司㓂掌禁所以治其姦自民居之既安五品之教行五刑之禁明而三卿之政又無不修矣有養必有教教之不行然後從而刑焉此四曰司空五曰司徒而後六曰司㓂以繼之也往來交際不可無其禮朝聘以時厚往薄來而賓之禮修矣除殘禁暴不可無其制九伐之法掌於司馬而師之政修矣盖交際之禮不可以不厚而師旅之用甚非聖人之得已此七曰賓而終之以八曰師也八政之目緩急有其序先後有其宜審於此者天下國家可得而理矣嘗考此章之㫖食貨祀賓師皆以事言司空司徒司㓂則以官言盖官之所掌者無非事而事之所屬必有其官互文以見其意而非有異義也箕子不徒陳其目而又次其先後緩急之序厥有㫖哉古今論治其有易此者乎此箕子所以不得不詳之也然則如之何亦曰農用八政而已五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極君子即中數以明皇極惟君道立於上既有以福斯民而無間斯民興於下自有以守斯道於無窮夫建極在聖人保極在天下箕子所以於五皇極之疇而極論之夫列於次五者皇極之疇建其有極者人君之責明疇之君子掲其名於先而詳其實於下夫豈無意哉人君以身立極斂五福以錫庶民使天下之人無不被其賜則斯民由嚮化以獲福咸相與保君之極而一人之徳教雖歴乆而長存民之極非君無以建君之極非民無以保君民相與之盛惟於大明皇極之世見之洛書九數而五居中洪範九疇而皇極居五五為天地之中數而極者人君之要道也人君中天下而立定四海之民其道豈有他哉亦建其有極而已且建極非求以集福也而福自歸於聖人斂福非期以錫民也而福自溥於民庶及庶人之蒙其福也初非有心於保極而民舍是道而不由則道自不容冺於天下然則錫民以五福固本於建極之君頼君以保極終見於歸極之民君有以建之民有以保之福有相感之機而君民有相須之勢論皇極者要不可不審乎此且洛書之數自一至九而五居中洪範之疇自五行至福極而皇極居乎中前乎此者皆其體之所以立後乎此者皆其體之所以行所以主衆數而莫不為之賔君八疇而莫不為之臣此皇極所以配乎五而中處也極者何至極之義標準之名中立而四方之所取正者也而所以建之實在於君焉為人君者養於中者純而行於外者至自五常百行之大以至應事接物之微無不極其義理之當然而無一毫過不及之差則道備於吾身而極建於天下矣極者福之本福者極之效極之所建福之所集也以聖人而建極於上則足以致一身之休祥以庶民而從化於下則足以納羣生於仁壽福而謂之斂非有所作為於性分之外也大徳而得禄得位得壽得名凡天下之所福者皆萃於一人之身也庶民而謂之錫者非有所畀付而増益之也羣黎百姓而徧為爾徳而富壽安逸而四方所同盖能以一己之福㪚而為千萬人之福也向也斯民惟知教之當從今焉又舉之有福之可慕則偏陂不萌而惟王道之是遵好惡不作而惟王路之是由于汝之極盖冇不期然而然者矣且非徒循之而不敢違背亦且保之而不敢失墜盖化成俗美雖沒世而猶存流風善政尚乆逺而不泯當時之民保君之極守而不失世世子孫永保之則聖道之在天下雖千載猶一日也此非所謂錫汝保極者歟夫謂之敷錫庶民則舉天下之大皆囿於聖化之内而見皇極無棄人也謂之錫汝保極則雖百世之逺尚存忠厚之風而見彛倫無時而斁也非箕子其孰能明之抑皇極固為九疇之綱矣然敬用五事者建極之要道嚮用五福者建極之效騐此二疇者於皇極為尤􅋀也箕子此言固見皇極君民相與之盛矣而實則言君民之係於天下者如此其重也武王聞之為民作極迄於成康之世家禮樂而人詩書忠厚渾慤之風傳八百年則民之保極也亦至矣嗚呼懿哉凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極隨其才而取之固所以成其材進於善而養之尤所以勸其善夫聖人之於民皆欲納之於皇極之中也故因其才之可取則取之因其善之可進則勸之而斯民皆有以成善行矣夫有猷有為有守人之有才者也則念之而弗忘未合於善不陷於惡所謂中人也則受之而勿拒所謂因其才之可取而取之也斯人也及其見於外而有安和之色𤼵於中而有好徳之言則其所修己進乎前矣於是而錫之以福而養其善心焉斯民其有不歸於皇極者乎此皇極所以無棄人也天下之人品有不齊而聖人之於人則無不欲其入於善故凡可以用其力者盖無所不用其極也信則人才之在天下此知而彼愚彼賢而此不肖不有聖人者出因其材而篤焉則夫有才者未必能進於善未善者亦終陷於惡而已矣倉廪實而知禮節恒産定而有恒心茍救死而恐不贍則奚睱治禮義人情皆然而况於官乎其進於善者已色徵於辭色之間矣而廩禄之賜所以厚其養者或不給求其惟皇作極也不亦難乎聖人始也必因其才之可取而教之以善終也必因其善之有進而養之以福而後大以成大小以成小而昏明强弱之不齊者悉歸於大公至正之域今夫智慮可以方人出謀有猷者也設施可以建政立事有為者也踐履之純一而操守之不貳有守者也几民之中有若人焉則必念兹在兹而不可以或忘也不協于極未能入於善也不罹于咎未至犯於惡也此中人之才進之則可以為善退之則流於為惡者也庶民之中有若人焉則必歸斯受之不可以或拒也念之受之既隨其才而輕重以成就之及其見於外而有安和之色𤼵於中而有好徳之言則吾知其進有加于前矣何也容貎辭氣乃徳之符其外如此則其中所存可知矣於是而錫之以福焉福者爵禄之位也盖聖人設教必富之以禄而後可以責之以善也斯世斯民蒙聖人教養之恩頼聖人造就之則夫有為有守者其進善之效豈特徵於色𤼵於聲而已哉必將于汝極而錫汝保極也不協于極不罹于咎者其好善之誠豈特見於面形於言而已哉必將㑹其有極而歸其有極也所入之塗雖異所至之域則同昔也猶未免扵凡民終也遂同歸於皇極聖人之建極其有功於天下者如此夫當商之季皇極之道不明而民皆自暴自棄矣武王下車之初卽訪道於箕子而箕子所以吿之者獨拳拳於皇極之一疇而尤致意於納民皇極之説盖欲舉斯世之大無一民不歸於皇極之域而後人君之責始盡也嗚呼箕子其賢矣哉無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極私慾有累於王化故禁戒之於先天理不外扵人心故開導之於後夫聖人設教無非所以遏人欲而存天理而已然直言以致其意故偏陂好惡之私勿使之生於心孰若歌詠之入心者深乎此皇極之敷言所以反覆言之而不置也故偏陂好惡之私勿使之生於心而所遵者王之義王之路而已矣偏陂反側之私勿使之見於事而所知者王之道蕩蕩平平正直而已矣其所以禁止而開導之者至矣然猶以為未也又申之以㑹極歸極之説盖禁之為彼者固將導其為此也道曰王道見教出於君在人不可以不從極曰有極見理根於心乃衆人之所固有聖人所以納天下民俗於皇極者盖如此昔者大禹有九歌之勸后夔有典樂之教聲詩之訓其來乆矣然示以君道之當然誠未若要人心之自然者為親且􅋀也盖凡人君躬行心得之教夫豈出於民生日用彛倫之外哉彼其氣禀習俗之不齊而人之陷其良心者皆是也於是聖人之教有不容廢矣教之誠是也然始焉不戒之以私則人不知欲之不可縱而無以懲創其邪思終焉不訓之以極則人不知理本固有而無以感𤼵其善性理慾之辨不明聲詩之教不作而欲化行而俗美不亦難乎此皇極之敷言所以不容已也夫其不中之謂偏不平之謂陂好惡而加之意謂之作其事雖殊其所以為私則一而已義者理之宜道者理之正而路則出入往來所必由者其名雖殊其所以為理則一而已於私則戒之以無無者禁止之辭於理則教之以遵遵者由行之意此無他天理人慾不容兩立出乎此則入乎彼禁其為彼所以導其為此也道本大公也而狥於偏黨則失之道本至正也而流於反側則違之夫豈知洞然八荒皆在我闥王之道盖蕩蕩乎其廣逺而平平乎其平易也而何以偏黨為哉周道如砥其直如矢王之道盖正而無邪直而無曲也又何以反側為哉夫欲其無偏陂矣而又曰無偏黨焉既曰無作好惡矣而又曰無反側焉其為訓非不詳且明矣然猶以為未也所謂王道則所從者上之教而未知極固人心之所自有也故要其終而告之以會其有極歸其有極焉盖皇極之理原於降衷秉彛之初人同此心心同此理也遵義遵道遵路非他會其固有之極而已蕩蕩平平正直者非他亦歸其固有之極而已會者合而來始焉雖殊途而同歸歸者來而至終焉知深造而自得聖人所以納天下民俗於皇極者夫豈有所付畀而增益之哉亦因其所固有而去其所本無背其所至難而從其所甚易如斯而已耳抑嘗論之此章盖詩之體所以使人吟詠而得其性情之正者也夫歌詠以叶其音反覆以致其意使人恍然而悟悠然而得忘其傾邪狹小之念達乎公平正大之理人慾消息天理流行會極歸極有不知其所以然者其功用深切盖與周禮大司樂教以六詩同一機而尤要者也後世君師之道不立皇極之訓不明而興於詩者盖寡矣建其有極能不有望於聖人也哉無有作好遵王之道無有作惡遵王之路能窒其欲則所循者皆正理能懲其忿則所措者亦此理盖喜怒人情之所不能無者也特患出於作為之私耳茍去其所本無而存其所固有則何往而非王者之公哉何則好者人情之所固有也然有時而流於私欲知其為欲而有以窒之則能好所當好而所循者皆王者之道矣惡亦人情之所不能無者也然有時而出於私忿知其為忿而有以懲之則惡所當惡而所循者亦王者之路矣是知不可有者一己之好惡不可無者王者之好惡箕子之於武王安得不勉其戒一己之作為而遵王者之道路也歟故皇極云云盖嘗論人惟一心耳惻隱此心忮害亦此心也羞惡此心賤惡亦此心也天理人欲同行異情私好不可有也而此心之好可無乎私惡不可遂也而義理之惡可去乎而况王者之好惡所闗甚大若𤼵而不中節則賞必僣而刑必濫𤼵而中節則善有勸而惡有懲不徒一身而已也或者徒見人君以一己之偏私而廢天下之中正遂以為好惡之真不可有者彼特見乎人欲之不可有而不知天理之不可無也嗟夫使人君而果無所好則為善者無所勸矣使人君而果無惡則為惡者無所懲矣此箕子安得不戒之如此而勉其如彼哉自今而觀善言之好王者之道也而不能不甘於諂諛緇衣之好王者之道也而不能不溺於便佞使夫君人者知𤼵於形氣為人欲而不可有根於性命者為天理而不可無則凡所以窒其欲而循夫理者無往而非大公至正之道矣安得不戒其所作為而遂其所固有者乎雖然好所當好可也惡所不當惡不可也何哉惡而知其美者公也而惡之欲其死則私矣惡惡如惡臭者公也而􅎱疾以惡人之技則非矣使夫人君者知出於一己之使然者不當有合乎人之同然者不可無則凡所以懲其忿而循夫理者亦無往而非大公至正之道矣安得不戒其作為而遂去其所當為乎大抵人情不能無喜怒不能無邪正出於正則為王者之道路失其正則為一己之作為惟不汨於情而亦不滅其性情不流於喜怒哀樂則粹然一出於正而作威作福之權不假他取矣吾觀武王之初是時克商而大賚四海一怒而安天下之民其好惡不可謂不公於天下矣而箕子之陳洪範不徒以作好作惡為戒而復以王道王路為勉者則好惡之𤼵雖微而忿慾之害實大前乎禹之所傳者此也後乎禹之所當道者亦此也豈可以武王之所已能而廢天下萬世所當戒者乎宜其反覆言之而不以為凟也或者謂好之與惡既不同情則道之與路亦宜異㫖而並言之豈箕子之意歟吁是特未喻反覆吟咏之㫖爾夫道若大路道無異於路也道者適治之路路之無異於道也特以好之於道惡之於路取其音韻之叶而無害於義理之同也讀書者兼詩之體而吟咏之則思過半矣皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王人君敷言而純乎理者固必本諸天下民因言而行其教者尤必頌乎君盖極之敷言人君所以代天而教民者也民能行君之教則自能形諸言而極其尊親之意者矣昔者箕子之陳洪範謂夫人君以極之理而反覆推衍以為言者是天下之常理也是天下之大訓也然豈君之訓哉無非本諸天也盖理出乎天言純乎理則亦純乎天矣且天子之於庶民其性未始有異也庶民於極之敷言是訓而是行焉則可以近乎天子道徳之光華矣其曰作民父母者指其恩育而言此盖極其親之之意也謂之為天下王者指其君長而言此盖極其尊之之意也吁箕子賛敷言之妙而述其所以感民之深非皇極之盛世其孰能與於此嘗謂夫道之大原出於天而天不能自以教諸民也必頼夫人君推是理以為言而後能施其教於天下且天下之民其分雖殊而其性之善則一而已由乎至極之理而近乎道徳之光則其尊君親上之意盖有不期而然者矣茍人君於極之敷言而不純乎理則非本諸天矣又豈能為法於天下哉庶民於極之敷言而不能行其道則自絶於君矣又豈能歸功於其上者哉是故非敷言之妙固不足以感民之深非感民之深亦不足以見敷言之妙矣箕子為武王而詳言之者其知道乎今夫所謂皇極之敷者何也即上文敷衍之言也始焉戒之以私而懲創其邪思終焉訓之以極而感𤼵其善性人君以至極之理反覆推衍以為言而盡其教民之道者是豈一己之私見焉所謂天下之常理者也是豈一人之私言哉盖所謂天下之大訓者也本天下之常理施天下之大訓非建極之君則不足以語此矣然則訓也非君之訓也天之訓也盖理出乎天而人君修道以為教者無非欲盡其代天之責而已矣言純乎天則為天之言故曰于帝其訓也然所謂帝者亦不過以其主宰而言之耳帝之與天又豈有二哉箕子賛敷言之妙至此始無餘藴矣且天子之於庶民性一而已庶民於皇極之道而吾君敷衍以為言者立則見其參於前是訓而不敢違焉在輿則見其倚於衡是行而不敢倍焉此所謂無所不用其極者也夫如是則能不自絶逺於君而有以親被其道徳之光華者矣人徒見夫君焉在上而民焉在下其分若懸絶而不能以相通也又豈知乎其分雖有尊卑之殊而其理則未始有二也其等雖有貴賤之别而其性未始不一也遵乎皇極之理而近乎天子之光則其稱頌之詞未有不極其至者矣其曰天子作民父母者盖指其恩育於我者而言之也其親之之意為何如哉其曰為天下王者盖指其君長於我者而言之也其尊之之意為何如哉斯民之意盖以為人君能立至極之標準所以能作億兆之父母而為天下之王也不然則有其位無其徳不足以首出庶物卓冠羣倫而居天下之極尊矣由是論之君能以理為教故其代天之責無不盡民能從君之教故其頌君之詞無不至雖然微箕子之深明乎皇極之理者孰能為武王陳之抑考之經洛書九數而五居中洪範九疇而皇極居五盖皇極一疇為衆疇之綱領也箕子於五皇極之下又焉得不詳言之哉曰皇建其有極又曰惟皇作極者盖深言乎極者人君之所當建者也至此而復賛敷言之妙以為人君之言純乎理則君即天天即君矣會極歸極之民忘乎人欲之私而達乎天理之正又焉得不歸功於其上哉論至於此則知君之所以建其極與夫民之所以用其極者又豈有他道哉亦曰本諸天而已矣皇極之敷言是彝是訓于帝其訓知聖人之教本乎理則知聖人之教純於天盖天者理之所從以出者也人君代天以敷教必即夫天之理以為教是君之訓即天之訓豈有二乎哉人徒見極之言敷於君孰不以為教之出於君也豈知是教也乃天下之常理而無一之不本於天乃天下之大訓而無一之少戾乎天審如是則訓非君之訓也乃天之訓也教之理出於天而君之教純乎理純乎理即統乎天矣此聖人所以與天為一歟云云夫聖人有所繼天立極叙典秩禮必歸之天命徳討罪必歸之天聖人豈神道設教者哉無他天者理而已矣聖人之舉動教詔無往而不純乎天矣然則皇極之敷言謂其出於聖人可也謂其出於天亦可也且自是理之主宰而言謂之帝且自是理之賦予於人則謂之彛自其品節防範於聖人則謂之訓自其可為標準於天下則謂之極初非有二道也然天能賦人以極至之理而不能使之不失其彛常之性君能教人以極致之訓而不能外夫彛常之理天有此理而君有是訓訓之出於君即理之出於天者為之也又烏可岐而二之哉今夫皇者君之稱極者標準之義極而謂之皇極者明人君當以身立極而使四方有取正也故以是極至之理敷之為訓焉非有甚髙難行之事驚世絶俗之言也偏陂好惡不使存諸心偏黨反側不使見於事遵義遵道遵路以由乎人倫日用之常蕩蕩平平正直以不失大公至正之理所以開其精微𤼵其藴奥者非聖王别立一道以為訓也語父子而訓之以極其仁仁即天所賦之理也語君臣而訓之以極其義義亦天所賦之理也是理也乃天下之常理而無一之少戾乎天則是訓也乃天下之大訓而無一之少拂乎天聖人盖與天渾然而無間矣君之訓獨非帝之訓乎吾今而後知天命之性人不能不禀之於天而修道之教天亦不能不有待於聖人也人徒見正五典而使之益厚用五禮而使之有常君之責也而不知五典出於天敘五禮出於天秩人君特因而惇庸之耳是豈有待於人為而亦豈人所得為哉昔者成湯以克綏厥猷為君后之責矣而原其所自亦不外乎上帝所降之𠂻豈不以天能賦是理以為人之性君能明是理以復人之性君之所為無異乎天之所為也箕子所明天人一貫之道哉曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡惟庶徵既無不順則微物亦無不盛夫徵出於天而驗於物者即其在物者觀之而在天者可得而見要皆原於天之順也昔箕子推衍庶徵之疇謂夫雨𤾉燠寒風之在天者不一今皆以時而至無一之或缺無一之或紊故宜物類之微如庶草者皆極其生意之盛庶草且然則物之大者從可知矣然則在天雖有五者之徴而主於順時則一也易有之曰風以散之雨以潤之日以暄之故萬物不可以無風之散雨之潤亦何可無日之暄哉又曰寒往則暑來暑往則寒來寒暑相推而嵗成焉是萬物固不可暑之不來亦何可寒之常往哉故天之生物必備夫五者而後足以成生物之功然五者有一之不得其時則在天為不順而在物亦不遂矣今宜雨而雨宜𤾉而𤾉是雨𤾉之應夫時也當燠而燠當寒而寒當風而風是燠寒風之應乎時也時者不先不後適當其可乃庶徴之俱不可失者庶徴之時大矣哉然或有𤾉而無雨有寒而無燠有寒燠而無風是不可謂之備常雨而不暘常𤾉而不雨常寒常燠而常風是不可謂之敘今也合五者而論未嘗有一之偏勝皆來備而俱有其應分五者而論未嘗有一之愆期皆以敘而各得其宜也天之運行既見於庶徴者如此孰謂生物之機有或息者乎萬物之生意也有不盛者乎夫物之在天地間惟草為至微之物而間不期根本之衆無不至於勃然而長蔚然而盛天道庶徴之順其時於此可見矣盖舉草而言則凡天下之物生機暢茂自勾萌甲折而至於枝葉華實無一不盛者皆不待言而知也向使當𤾉而雨則雨非其時而大水無麥矣當燠而寒則寒非其時而雹凍穀矣推類而論茍一或極備一或極其無應亦猶是也故箕子於此五者之下總以時之一字者足以見其為休徴也甚矣天道之庶徴不休則咎二者必有於此而已矣故箕子於下文五者之目皆係之以恒之一字者又可見其為咎徴也咎徴既見則庶草之不蕃蕪不待言矣然在天為五行雨𤾉燠寒風於五行各有所屬在人則為五事五事之或得或失而休咎各以類應是人事有闗於天道且休咎不同又有以係於一嵗之利害一月之利害一日之利害者亦驗於王與卿士之職也使嵗月日時無易則百榖用成百穀用成則庶草蕃蕪矣非徒是也乂用明俊民用章家用平康是天道驗於人事矣豈徒見之物哉王省惟嵗卿士惟月師尹惟日嵗月日時無易百穀用成乂用明俊民用章家用平康君臣之職驗於天時者有不同天道之順驗於人事者皆有序此君臣之皆盡其道而休徵之所感也且王者之得失其徵以嵗卿士之得失其徵以月師尹之得失其徵以日是君臣職任有大小而驗於天時者有不同矣今嵗月日之間而雨𤾉燠寒風各以時而至於是百穀用是而成政治用是而明俊民用是而章顯而家用是而平康則天道之順有以驗於人事矣故即人事之順而念其感於天道之本則君臣之得失可見矣洪範九疇皆天人之大法而箕子尤詳於庶徵者何哉盖五行五事八政五紀皆所以立皇極之體而未言其效三徳推皇極之用而稽疑則决之於天庶徵則以其感應之自然者驗之於人也人事有得失之殊則天道有休咎之徵若形影之不違若桴鼓之相應於此有以見天心之甚可畏而皇極之建不建皆在是而决矣然則為君臣者可不恐懼修省乎然彼時之適然而不加意又豈足以言天人之際哉今夫王統卿士卿士統師尹猶嵗之統乎月月之統乎日也尊有以統乎卑大有以統乎小故王取象於嵗其得失徵於一嵗之休咎焉卿士取象於月其得失徵於一月之休咎焉師尹取象於日其得失徵於一日之休咎焉今也雨𤾉燠寒風之應見於嵗月日之間皆以時而至則必無所謂愆陽伏隂也則必無所謂凄風苦雨也太和流行𤼵育萬物黍稷穜穋之得宜如京如坻之富積而百穀有以用成矣禮樂政刑之明備紀綱法度之振舉而乂有以用明矣君子之彚進也黎獻之願臣也而俊民皆用章室家之相慶也天下之和平也而家之平康又何如哉然則人事之序又皆本於天道之順而天道之順非君臣之盡其職乎職尊者所理者大而要職卑者所理者小而詳𤼵於心術者雖精微而不可知著於天道人事者則昭章而不掩天人感應之際真可畏矣昔夏之方懋厥徳則罔有天災其子孫弗率則皇天降災矣天豈有意於降災降祥哉所以致是災祥者在於吾君臣而不在於天也箕子陳洪範之疇以王與卿士師尹分象乎嵗月日而其下以休徵咎徵對言之且又先以省之一字焉其垂訓之義逺矣故自稽疑庶徵福極皆以皇極之效言之所以推其用稽疑之有吉有㐫庶徵之有咎有休而九疇之終則以福極對言之皆所以極天人交際之理而示天下後世者無餘藴矣嗟夫君相造命者也妖孽災異未嘗不因乎人而休嘉百祥未必皆本於天也詩云永言配命自求多福其此之謂矣旅􅋙王乃昭徳之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟徳其物明王頒分器以勸下者有其序諸侯寶分器以尊上者無異心盖王者之施仁雖有親踈之殊而諸侯之尊君則豈有親踈之間哉召公之告武王其亦審於此矣謂夫王者昭徳所致之方物于異姓之邦固以勸之無廢其職而分寶玉之器于同姓之國又以勸之益厚其親是王者之頒分器無親踈之别矣然王者所頒之分器非徒物也實徳之致也諸侯又豈敢輕易其物哉故皆以徳視其物焉則所以寶是器而尊上者曷嘗有親踈之間乎此古昔盛時所以懷諸侯之道也昔者明王有天下列為五等之爵親親之恩尊賢之義棊布星列環衛京師所以公天下之意厚矣而又有分器之頒以益盡其懷之之恩於是伯叔甥舅無間於親踈之殊水木本原咸盡其翼戴之心徳被於逺而方物之舉至徳洽於邇而分器之是寶明王之天下其盛固如此哉且方物之來君徳之所致也而王者不敢私其物焉乃昭示其徳之所致以及于異姓之邦如分陳以肅慎氏之矢是也寶玉之器又方物之貴者矣王者亦不敢自私焉必頒賜于伯叔之國如分魯以夏后氏之璜是也昭徳之致固所以示其錫予之恩而所以勸之者使之無廢其職而謹其服命寶玉之分雖所以寓親親之意而所以勸之者夫必使之時庸展親以厚同姓異姓之邦伯叔之國其分固有親踈也而方物之昭寶玉之分亦各有其禮也王者施恩之序固如此當時諸侯被王靈之寵光承分器之錫予皆曰是器也吾王盛徳之所致也則即物以戴其君者又當何如哉盖以物視其物則易其物必思所以敬其徳矣仰休明之盛徳以鎮撫其國家莫不秉流水朝宗之心而盡其維藩維翰之職者又曷嘗有同姓異姓之分哉則諸侯尊君者固無間矣觀夫王者施恩之有序諸侯之尊君無異心則其上下相與之盛為何如哉昔者西旅貢􅋙而召公用訓於武王既以明王慎徳而逺邇畢獻方物言之復以王者之錫物以勸于侯邦而侯邦即物以戴聖君者言之且反覆於昭徳之致惟徳其物之辭良有以歟嗟夫封建之制莫備於有周懐諸侯之道亦莫盛於有周列爵分土即見於武王下車之初而分器之頒又陳於太保之訓其立法之詳仁之至義之盡焉奈何周轍既東王綱觧紐齊以甥舅之國而首開専霸之圖晉以伯叔之親而繼以世霸之業於是王靈不足以寵諸侯雖魯以周公之後秉禮之國寶玉大弓不能寶之其視先公之惟徳其物者為何如仲尼傷之故書於䇿其意深逺矣反覆觀之益有感於明王之盛不寶逺物則逺人格所寶惟賢則邇人安人君惟能賤貨而貴徳則近者悦而逺者來矣夫茍玩物而棄賢則近者且有所不安而况於逺人之懐服者乎召公知其然故能告武王也謂夫人君之道不患人之逺者不服而患以物之難得者為貴不患人之邇者不安而患不以人之有徳者為貴誠能賤彼而貴此則逺人不期而自至邇人不期而自安矣夫惟君心之好尚雖微而民心之趨向何頼其可忽而不知省乎其曰人君以心而率天下之心亦惟謹其所好而已矣如好以其道則人同此心不以四方萬里而有間也而况於邇者乎如所樂不出於正則人各有心雖近之人猶胡越也而况於逺者乎由此而觀逺人之不服非難格也由徳柔之無其道也邇人之不服非難安也猶撫循之無其人也反而求之近悦逺來特在人君之趨向何如耳嗟夫犬馬之畜若未害也而逺人得以窺吾之藴珍竒之玩若無妨也而逺人得以測吾之中如使吾之所寶者不在於此則雖未嘗語人以賤貨之事而民必知吾之所好者在於斯民矣人雖逺也如之何而不格哉然逺人之所愛慕也雖賢者有愛之之心非人君用之則無以遂其心賢者雖有善俗之道非人君尊之則無以行其道如使吾之所寶者不在於賢則吾欲安乎民而亦無頼以安民矣人雖邇如之何而能安之哉大抵地雖有逺近而人心無彼此人雖有貴賤而天理無間隔觀君之所寶不在於物則尊賢之意可見矣觀人之格者不格於逺則安民之效可知矣曽謂以武王之聖而有待於召公之警戒哉然而一念之不謹聖狂之判也細行不矜大徳之累也夫以舜之大聖而禹猶以怠慢傲虐告戒之而况不及於大舜者乎此召公老成之政所以不能已於言也雖然能遵召公之戒者武王也而不能守武王之戒者穆王也白狼之既得而荒服因以不至盖至於此而召公之言信矣然則寶賢不寶物吾因為武王喜寶物不保賢吾因為穆王惜康誥汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌人君命諸侯守法以安民使其戒懼之心無愧於前王則能盡人臣之職而無負於其君矣夫謹罰以安民此固人臣之職分而亦人君之所屬望者也故武王之扵康叔欲其謹守常法而求以裕民而裕民之道無出於文王之敬忌康叔果能於存心之敬忌而思有以企及於文王則可以無負於其君之所以屬望者矣豈不足以深慰其心乎傳曰明徳慎罰文王所以造周也文王治岐以徳為化民之本而不能不假刑以輔之而非恃之以求逞也是以慎室家者必勤於垣墉卑曰垣髙曰墉以此防外患也然垣墉勤矣無以塗墍茨焉則葺理之不周覆䕶之不宻風雨為之飄摇而棟折榱崩者有之矣是塗墍之功不可廢也作梓材者必勤於樸斵其粗曰樸致巧曰斵所以成其質也然樸斵勤矣無以塗丹雘焉則質雖成而文未足稱器雖成而飾未之全亦非所以成材矣是塗丹雘之功又不可缺也為諸侯而知乎此則君能除惡於其前不猶稽田而勤敷菑者乎吾能為之隄防於其後亦猶陳修而為疆畎可也君能除惡於其前不猶作室家而勤垣墉者乎吾能維持之使勿壞亦猶塗墍茨可也君能立制度於其前不猶作梓材而勤樸斵者乎吾能潤色之使勿疵亦猶塗丹雘可也武王以是而吿康叔其意豈不在兹乎康叔以武王之弟而撫新造之衛凡其開剏積累之勤者武王固已任之於先至於維持修飾於不壞不廢之地康叔之責也故其吿戒之際反覆譬喻至於再至於三焉為康叔者宜服膺勿失而孜孜不怠可也不然則父作室而子不肯堂父作菑而子不肯播其不隳先人之績而棄垂成之功者幾希先儒以此篇為脫簡自此以上為武王告康叔之書愚故明其説而申之焉書義矜式卷四
